repos:
  - repo: local
    hooks:
      - id: fervis-docs-index
        name: Fervis docs index allowlist
        entry: scripts/check-staged-docs.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: fervis-verify
        name: Fervis verification
        entry: scripts/verify-fervis-repo.sh
        language: system
        pass_filenames: false
        always_run: true
