id: source_binding_excludes_time_scope_literals
description: Source-binding memory values do not turn remembered time scopes into string literals.
migrates:
  - api/tests/fervis/lookup/memory/test_available_values.py::test_active_memory_source_binding_values_do_not_turn_time_scope_into_string_literal
kind: algorithm
algorithm: memory.available_values
input:
  active_memory_ids: [prior_question.value.grounded_input_1]
  values:
    - id: prior_question.value.grounded_input_1
      value: yesterday
      value_type: time_scope
expect:
  result_contains:
    source_binding_values: []

