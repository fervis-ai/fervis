id: source_binding_excludes_relation_literals
description: Source-binding memory values do not expand scalar literals from an active relation.
migrates:
  - api/tests/fervis/lookup/memory/test_available_values.py::test_active_memory_source_binding_values_do_not_expand_relation_literals
kind: algorithm
algorithm: memory.available_values
input:
  active_memory_ids: [prior_sales_rows]
  values:
    - id: prior_sales_rows.value.row_1.amount
      value: "2468.00"
      value_type: decimal
      source_relation_id: prior_sales_rows
      source_row_id: row_1
      source_field_id: amount
expect:
  result_contains:
    source_binding_values: []

