id: operation_values_include_relation_literals
description: Operation planning memory values can use scalar literals from an active relation privately.
migrates:
  - api/tests/fervis/lookup/memory/test_available_values.py::test_active_memory_operation_values_keep_relation_literals_for_private_planning
kind: algorithm
algorithm: memory.available_values
input:
  active_memory_ids: [prior_sales_rows]
  values:
    - id: prior_sales_rows.value.row_1.amount
      value: "2468.00"
      value_type: decimal
      source_relation_id: prior_sales_rows
      source_row_id: row_1
      source_field_id: amount
expect:
  result_contains:
    operation_values:
      - id: prior_sales_rows.value.row_1.amount
        kind: literal
