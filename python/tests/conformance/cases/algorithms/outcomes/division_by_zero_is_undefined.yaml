id: division_by_zero_is_undefined
description: Division by zero is an undefined factual outcome, not an engine failure.
migrates:
  - api/tests/fervis/lookup/outcomes/test_results.py::test_division_by_zero_is_undefined_not_engine_failure
kind: algorithm
algorithm: outcomes.classify
input:
  mode: answer
  operations:
    - id: ratio
      output_relation: ""
      spec:
        kind: compute
        expression:
          operator: divide
          left:
            value: {input_ref: current, value: 10}
          right:
            value: {input_ref: previous, value: 0}
        output_scalar: ratio
  result_outputs: []
expect:
  result_contains:
    outcome_kind: undefined
    undefined:
      operation_id: ratio
      reason_code: division_by_zero
      input_refs: [current, previous]
