id: ambiguous_binding_candidates_need_clarification
description: Multiple binding candidates produce multiple-matching-entities clarification.
migrates:
  - api/tests/fervis/lookup/outcomes/test_results.py::test_binding_candidate_cardinality_classifies_terminal_results
kind: algorithm
algorithm: outcomes.classify
input:
  mode: binding_candidates
  requested_fact_id: rf_staff
  binding_target_id: staff
  known_input_id: alice
  display_fields: [first_name, last_name]
  relations:
    - id: staff_candidates
      rows:
        - {staff_id: "1"}
        - {staff_id: "2"}
      completeness: {status: complete, source_kind: api_read, set_kind: unknown, proof_refs: [read:staff_candidates]}
expect:
  result_contains:
    outcome_kind: needs_clarification
    clarifications:
      - id: clarify_staff
        need: target_reference
        reason: multiple_matching_entities
        requestedFactId: rf_staff
        subjects:
          - kind: question_input
            id: alice
            label: reference
            sourceText: staff
        evidence:
          - kind: known_input
            id: known_input:alice
          - kind: candidate
            id: staff_candidates:1
          - kind: candidate
            id: staff_candidates:2
          - kind: proof_ref
            id: read:staff_candidates
