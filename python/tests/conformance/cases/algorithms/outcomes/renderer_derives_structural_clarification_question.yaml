id: renderer_derives_structural_clarification_question
description: Structural binding ambiguity renders a clarification question.
migrates:
  - api/tests/fervis/lookup/outcomes/test_results.py::test_renderer_derives_clarification_question_from_structural_missing_data
kind: algorithm
algorithm: outcomes.classify
input:
  mode: binding_candidates
  requested_fact_id: rf_staff
  binding_target_id: staff
  known_input_id: alice
  relations:
    - id: staff_candidates
      rows:
        - {staff_id: "1"}
        - {staff_id: "2"}
      completeness: {status: complete, source_kind: api_read, set_kind: unknown, proof_refs: [read:staff_candidates]}
expect:
  result_contains:
    rendered_text: Which staff do you mean?
    rendered_details:
      clarifications:
        - basis: multiple_matching_entities
          knownInputId: alice
