id: renderer_includes_all_clarification_questions
description: Renderer includes every clarification question in terminal text.
migrates:
  - api/tests/fervis/lookup/outcomes/test_results.py::test_renderer_includes_all_clarification_questions
kind: algorithm
algorithm: outcomes.classify
input:
  mode: clarification
  clarifications:
    - id: clarify_location
      requestedFactId: rf_answer
      need: catalog_input
      reason: catalog_requires_choice
      owner: question_contract
      continuation:
        kind: question_contract
        missingItemId: location
        expectedValueKind: entity
      question: Which location should I use?
      subjects:
        - kind: catalog_choice
          id: location
          label: location
          sourceText: ""
          options: []
      evidence: []
    - id: clarify_metric
      requestedFactId: rf_answer
      need: catalog_input
      reason: catalog_requires_choice
      owner: question_contract
      continuation:
        kind: question_contract
        missingItemId: metric
        expectedValueKind: metric
      question: Which metric should I use?
      subjects:
        - kind: catalog_choice
          id: metric
          label: metric
          sourceText: ""
          options: []
      evidence: []
expect:
  result_contains:
    rendered_message: "Which location should I use?\nWhich metric should I use?"
