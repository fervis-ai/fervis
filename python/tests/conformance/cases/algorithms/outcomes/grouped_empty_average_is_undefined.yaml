id: grouped_empty_average_is_undefined
description: Grouped average over empty rows remains undefined rather than no-data.
migrates:
  - api/tests/fervis/lookup/outcomes/test_results.py::test_grouped_empty_average_is_undefined_not_no_data
kind: algorithm
algorithm: outcomes.classify
input:
  mode: engine
  relations:
    - id: rows
      rows: []
      completeness: {status: complete, source_kind: api_read, set_kind: unknown, proof_refs: [read:rows]}
  operations:
    - id: avg_rows
      output_relation: result
      spec:
        kind: aggregate
        input_relation: rows
        group_by: [group_id]
        aggregations:
          - {function: avg, input_field: amount, output_field: avg_amount}
  render_outputs:
    - {id: avg_amount, relation_id: result, field_id: avg_amount}
expect:
  result_contains:
    undefined: {reason_code: empty_average}
