id: dependency_can_resolve_unselected_frame_referent
description: A dependency may resolve a referent even when context frames are not selected for the clause value frame.
migrates:
  - api/tests/fervis/lookup/conversation_resolution/test_parser.py::test_parser_allows_dependency_to_resolve_unselected_context_frame_referent
  - api/tests/fervis/lookup/test_conversation_resolution_outcomes.py::test_clause_resolution_scalar_followup_keeps_prior_shape_out_of_referent
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: How much is that in total sales?
  context_sources:
    - source_id: prior_1
      kind: prior_user_question
      text: Which products did Alice sell today? Group them by sale.
      source_card_ids: [card_1]
      source_memory_ids: [mem_1]
      meaning_anchors:
        - memory_id: mem_1
          text: Which products did Alice sell today?
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_1]
      requested_frame: the products sold
      prior_answer_fact: products sold by Alice today
    - frame_id: context_frame_2
      source_ids: [prior_1]
      requested_frame: the sale grouping for each product
      prior_answer_fact: products grouped by sale
  payload:
    kind: conversation_resolution
    current_question_text: How much is that in total sales?
    clause_resolutions:
      - current_clause_text: How much is that in total sales?
        occurrence: 1
        requested_value_frame:
          current_value_surface: {text: total sales, kind: self_sufficient_current_value}
          context_frame_choices:
            - {frame_id: context_frame_1, choice: not_for_this_clause, current_conflict_quotes: []}
            - {frame_id: context_frame_2, choice: not_for_this_clause, current_conflict_quotes: []}
        dependencies:
          - anchor_text: that
            occurrence: 1
            kind: reference
            meaning_components:
              - kind: other
                source_id: prior_1
                source_text: Which products did Alice sell today?
                memory_id: mem_1
                resolved_text: Which products did Alice sell today?
            resolved_text: the products sold by Alice today
            must_preserve_terms: [the products sold by Alice today]
        resolved_clause_text: How much is the total sales amount for the products sold by Alice today?
    unresolved: {unresolved_kind: none, why_unresolved: "", candidate_interpretations: []}
expect:
  result_contains:
    used_source_card_ids: [card_1]
    clause_resolutions:
      - resolved_clause_text: How much is the total sales amount for the products sold by Alice today?
