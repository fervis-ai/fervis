id: schema_exposes_prior_question_continuation_contract
description: Conversation resolution schema exposes bounded continuation frame and replacement ids.
kind: algorithm
algorithm: conversation_resolution.schema
input:
  context_sources:
    - source_id: prior_1
      kind: prior_user_question
      text: How many sales did we make on July 9th?
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_1]
      requested_frame: count
      prior_answer_fact: sales count on July 9th
      replaceable_parts:
        - part_id: q_time
          kind: time_scope
          text: July 9th
expect:
  result_contains:
    tool_names: [submit_conversation_resolution]
    has_continuation: true
    continuation_frame_ids: [context_frame_1]
    continuation_part_ids: [q_time]
