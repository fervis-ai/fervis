id: needs_clarification_uses_supporting_evidence
description: Needs-clarification outcomes can cite complete candidate interpretations from visible context evidence.
migrates:
  - api/tests/fervis/lookup/conversation_resolution/test_parser.py::test_parser_accepts_needs_clarification_with_complete_interpretations
  - api/tests/fervis/lookup/test_conversation_resolution_outcomes.py::test_ambiguity_requires_complete_candidate_interpretations
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: How much did that one make?
  context_sources:
    - source_id: prior_1
      kind: prior_fervis_answer
      text: "Product A\nProduct B"
      source_card_ids: [card_1]
      source_memory_ids: [mem_1]
  payload:
    kind: conversation_resolution
    current_question_text: How much did that one make?
    clause_resolutions: []
    unresolved:
      unresolved_kind: multiple_meanings
      why_unresolved: Two prior answers are plausible.
      candidate_interpretations:
        - integrated_question: How much did Product A make?
          supporting_evidence:
            - source_id: prior_1
              exact_source_texts: [Product A]
        - integrated_question: How much did Product B make?
          supporting_evidence:
            - source_id: prior_1
              exact_source_texts: [Product B]
expect:
  result_contains:
    resolution: needs_clarification
    used_source_card_ids: [card_1]
