id: temporal_followup_uses_prior_question_context
description: Temporal follow-up resolution can use a prior question time anchor and report the backing memory ids.
migrates:
  - api/tests/fervis/lookup/test_conversation_resolution_outcomes.py::test_clause_resolution_temporal_followup_uses_prior_question_context
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: How about the day before?
  context_sources:
    - source_id: prior_turn_1_user
      kind: prior_user_question
      text: How much money did we make yesterday?
      source_card_ids: [card_time]
      source_memory_ids: [mem_time]
      meaning_anchors:
        - memory_id: mem_time
          text: yesterday
          occurrence: 1
          kind: time_scope
          label: time scope
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_turn_1_user]
      requested_frame: money made
      prior_answer_fact: money made yesterday
  payload:
    kind: conversation_resolution
    current_question_text: How about the day before?
    clause_resolutions:
      - current_clause_text: How about the day before
        occurrence: 1
        requested_value_frame:
          current_value_surface: {text: How about, kind: broad_current_value}
          context_frame_choices:
            - frame_id: context_frame_1
              choice: use_frame
              current_conflict_quotes: []
        dependencies:
          - anchor_text: the day before
            occurrence: 1
            kind: scope
            meaning_components:
              - kind: other
                source_id: prior_turn_1_user
                source_text: yesterday
                memory_id: mem_time
                resolved_text: yesterday
            resolved_text: the day before yesterday
            must_preserve_terms: [the day before yesterday]
        resolved_clause_text: How much money made the day before yesterday
    unresolved: {unresolved_kind: none, why_unresolved: "", candidate_interpretations: []}
expect:
  result_contains:
    resolution: resolved
    used_source_card_ids: [card_time]
    used_memory_ids: [mem_time]

