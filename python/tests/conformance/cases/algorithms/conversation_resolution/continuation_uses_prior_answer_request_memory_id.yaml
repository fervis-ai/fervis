id: continuation_uses_prior_answer_request_memory_id
description: A continuation over a prior request activates the prior-answer-request memory id.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_prior_answer_request_owns_backing_number_and_limit_slots_for_continuations
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: What about yesterday?
  context_sources:
    - source_id: source_top_products
      kind: prior_user_question
      text: What are the top 5 products Staff One sold?
      source_card_ids: [card_top_products]
      source_memory_ids: [turn_top_products.prior_request.fact_1]
      meaning_anchors:
        - memory_id: turn_top_products.prior_request.fact_1
          text: top 5 products Staff One sold
          occurrence: 1
          kind: prior_answer_request
          label: prior request
  context_frames:
    - frame_id: frame_top_products
      source_ids: [source_top_products]
      requested_frame: top 5 products Staff One sold
      prior_answer_fact: top 5 products Staff One sold
  payload:
    kind: conversation_resolution
    status: resolved
    current_question_text: What about yesterday?
    clause_resolutions:
      - current_clause_text: What about yesterday
        occurrence: 1
        requested_value_frame:
          current_value_surface: {text: What, kind: broad_current_value}
          context_frame_choices:
            - {frame_id: frame_top_products, choice: use_frame, current_conflict_quotes: []}
        dependencies:
          - anchor_text: What
            occurrence: 1
            kind: reference
            meaning_components:
              - kind: other
                source_id: source_top_products
                source_text: top 5 products Staff One sold
                memory_id: turn_top_products.prior_request.fact_1
                resolved_text: top 5 products Staff One sold
            resolved_text: top 5 products Staff One sold
            must_preserve_terms: [top 5 products Staff One sold]
        resolved_clause_text: What are the top 5 products Staff One sold yesterday?
    unresolved: {unresolved_kind: none, why_unresolved: "", candidate_interpretations: []}
expect:
  result_contains:
    used_memory_ids: [turn_top_products.prior_request.fact_1]
