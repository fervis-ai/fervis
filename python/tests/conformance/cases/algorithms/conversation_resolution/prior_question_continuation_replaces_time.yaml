id: prior_question_continuation_replaces_time
description: Conversation resolution parses a prior-question continuation replacement.
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: sorry, meant July 8th
  context_sources:
    - source_id: prior_1
      kind: prior_user_question
      text: How many sales did we make on July 9th?
      source_card_ids: [card_1]
      source_memory_ids: [mem_1]
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_1]
      requested_frame: count
      prior_answer_fact: sales count on July 9th
      replaceable_parts:
        - part_id: q_time
          kind: time_scope
          text: July 9th
  payload:
    kind: conversation_resolution
    current_question_text: sorry, meant July 8th
    clause_resolutions:
      - current_clause_text: sorry, meant July 8th
        occurrence: 1
        requested_value_frame:
          current_value_surface:
            text: July 8th
            kind: broad_current_value
          context_frame_choices:
            - frame_id: context_frame_1
              choice: use_frame
              current_conflict_quotes: []
        continuation:
          kind: continue_prior_question
          frame_id: context_frame_1
          replacements:
            - part_id: q_time
              current_text: July 8th
        dependencies: []
        resolved_clause_text: How many sales did we make on July 8th?
    unresolved:
      unresolved_kind: none
      why_unresolved: ""
      candidate_interpretations: []
expect:
  result_contains:
    resolution: resolved
    used_source_card_ids: [card_1]
    used_memory_ids: [mem_1]
    clause_resolutions:
      - resolved_clause_text: How many sales did we make on July 8th?
        continuation:
          kind: continue_prior_question
          frame_id: context_frame_1
          replacements:
            - part_id: q_time
              current_text: July 8th
        dependencies: []
