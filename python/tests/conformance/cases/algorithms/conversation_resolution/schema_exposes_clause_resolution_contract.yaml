id: schema_exposes_clause_resolution_contract
description: Conversation resolution schema exposes the clause-resolution contract and source-id enums.
migrates:
  - api/tests/fervis/lookup/conversation_resolution/test_parser.py::test_schema_exposes_single_clause_resolution_tool
kind: algorithm
algorithm: conversation_resolution.schema
input:
  context_sources:
    - source_id: prior_1
      kind: prior_user_question
      text: How much money did we make last week?
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_1]
      requested_frame: money made
      prior_answer_fact: money made last week
expect:
  result_contains:
    tool_names: [submit_conversation_resolution]
    status_values: [standalone, resolved, needs_clarification]
    has_clause_resolutions: true
    dependency_source_ids: [prior_1]
    unresolved_evidence_source_ids: [current_question, prior_1]
    no_context_dependency_max_items: 0
