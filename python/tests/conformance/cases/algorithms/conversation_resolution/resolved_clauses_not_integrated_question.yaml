id: resolved_clauses_not_integrated_question
description: Parser keeps each resolved clause as a separate resolved question.
migrates:
  - api/tests/fervis/lookup/conversation_resolution/test_parser.py::test_parser_keeps_resolved_clauses_without_assembling_integrated_question
kind: algorithm
algorithm: conversation_resolution.parse
input:
  current_question: How about yesterday and where?
  context_sources:
    - source_id: prior_1
      kind: prior_user_question
      text: How much money did we make last week?
      source_card_ids: [card_1]
      source_memory_ids: [mem_1]
  context_frames:
    - frame_id: context_frame_1
      source_ids: [prior_1]
      requested_frame: money did we make
      prior_answer_fact: money did we make last week
  payload:
    kind: conversation_resolution
    current_question_text: How about yesterday and where?
    clause_resolutions:
      - current_clause_text: How about yesterday
        occurrence: 1
        requested_value_frame:
          current_value_surface: {text: How about, kind: broad_current_value}
          context_frame_choices:
            - {frame_id: context_frame_1, choice: use_frame, current_conflict_quotes: []}
        dependencies: []
        resolved_clause_text: How much money did we make yesterday?
      - current_clause_text: and where
        occurrence: 1
        requested_value_frame:
          current_value_surface: {text: where, kind: self_sufficient_current_value}
          context_frame_choices:
            - {frame_id: context_frame_1, choice: not_for_this_clause, current_conflict_quotes: []}
        dependencies: []
        resolved_clause_text: Where did we make that money yesterday?
    unresolved: {unresolved_kind: none, why_unresolved: "", candidate_interpretations: []}
expect:
  result_contains:
    clause_resolutions:
      - resolved_clause_text: How much money did we make yesterday?
      - resolved_clause_text: Where did we make that money yesterday?
