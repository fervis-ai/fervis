      "result=\"area:primary_key\"": true
      "<resolver option_id=\"bind_qi1_rs_7de03e00183c6709_area_primary_key\">": true
      "<api_read read=\"list_area_list\" endpoint=\"list_area_list\" resources=\"area\">": true
      "<param name=\"kind\" source=\"query\" type=\"choice\"": true
      "<choice value=\"CITY\" />": true
      "<field name=\"kind\" path=\"data.kind\" type=\"choice\">": true
      "<request_value param_ref=\"list_area_list.query.name\" value=\"London\" />": true
      "<match_field path=\"data.name\" />": true
      "<canonical_result entity_kind=\"area\" key_id=\"primary_key\">": true
      "interpret each named input": true
      'write the `because` field as: "{input} denotes one {entity kind} because {requested-fact and resolver-card evidence}."': true
