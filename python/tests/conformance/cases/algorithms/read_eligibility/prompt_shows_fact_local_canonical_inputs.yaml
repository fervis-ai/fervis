id: prompt_shows_fact_local_canonical_inputs
description: Read eligibility renders canonical interpretation before fixed-identity read assessment.
kind: algorithm
algorithm: read_eligibility.prompt
input:
  request_fixture: stores_in_grounded_area
  contains:
    - "<read_eligibility_context>"
    - "<known_inputs>"
    - "id=\"london_qi_1\""
    - "<source_text>London</source_text>"
    - "<interpretation_question>"
    - "<canonical_options>"
    - "id=\"london_qi_1.list_area_list.bind_qi1_rs_7de03e00183c6709_area_primary_key\""
    - "result=\"area:primary_key\""
    - "<resolver option_id=\"bind_qi1_rs_7de03e00183c6709_area_primary_key\">"
    - "<api_read read=\"list_area_list\" endpoint=\"list_area_list\" resources=\"area\">"
    - "<param name=\"kind\" source=\"query\" type=\"choice\""
    - "<choice value=\"CITY\" />"
    - "<field name=\"kind\" path=\"data.kind\" type=\"choice\">"
    - "<request_value param_ref=\"list_area_list.query.name\" value=\"London\" />"
    - "<match_field path=\"data.name\" />"
    - "<canonical_result entity_kind=\"area\" key_id=\"primary_key\">"
    - "interpret each named input"
    - 'write the `because` field as: "{input} denotes one {entity kind} because {requested-fact and resolver-card evidence}."'
    - "whose result has the entity kind stated in because"
    - "Assess every candidate read under the selected canonical interpretations."
    - "Text match fields are evidence for that identity; they are not computation values."
  excludes:
    - "<applicable_known_inputs>"
    - "<input_binding_options>"
expect:
