id: parser_compiles_canonical_selection_and_read_target
description: Read eligibility selects canonical meaning once before retaining candidate reads.
kind: algorithm
algorithm: read_eligibility.parse
input:
  request_fixture: stores_in_grounded_area
  payload:
    requested_fact_assessments:
      fact_1:
        read_candidate_reviews:
          source_1:
            relevant_row_path_tokens: [source_1.row.data]
            relevant_field_tokens: [source_1.field.data.type]
            retention_basis: The read provides location rows whose type can establish the requested store population.
            retention_decision: RETAIN
        canonical_inputs:
          london_qi_1:
            interpretation_question: Which shown canonical result represents what London denotes in requested fact count of stores in London?
            canonical_option_assessments:
              london_qi_1.list_area_list.bind_qi1_rs_7de03e00183c6709_area_primary_key: "area:primary_key: list_location_list exposes the Area identity needed to constrain the requested store population."
            because: London denotes the area constraining the requested store population, and the Area result represents that area directly.
            canonical_option_id: london_qi_1.list_area_list.bind_qi1_rs_7de03e00183c6709_area_primary_key
expect:
  result_contains:
    canonical_inputs:
      - known_input_id: qi1
        canonical_option_id: london_qi_1.list_area_list.bind_qi1_rs_7de03e00183c6709_area_primary_key
        interpretation_question: Which shown canonical result represents what London denotes in requested fact count of stores in London?
        canonical_option_assessments:
          london_qi_1.list_area_list.bind_qi1_rs_7de03e00183c6709_area_primary_key: "area:primary_key: list_location_list exposes the Area identity needed to constrain the requested store population."
        because: London denotes the area constraining the requested store population, and the Area result represents that area directly.
    read_assessments:
      - read_id: list_location_list
