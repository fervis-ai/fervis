id: schema_rejects_dropped_review_with_evidence
description: Schema requires dropped reviews to cite no row or field evidence.
migrates:
  - api/tests/fervis/lookup/test_read_eligibility_contract.py::test_read_eligibility_schema_requires_dropped_reviews_to_cite_no_evidence
kind: algorithm
algorithm: read_eligibility.schema_validate
input:
  request_fixture: sales_count
  payload:
    requested_fact_assessments:
      fact_1:
        canonical_inputs: {}
        read_candidate_reviews:
          source_1:
            known_input_uses: {}
            relevant_row_path_tokens: [source_1.row.root]
            relevant_field_tokens: [source_1.field.data.count]
            retention_basis: The read exposes sales count evidence.
            retention_decision: RETAIN
          source_2:
            relevant_field_tokens: [source_2.field.data.amount]
            retention_basis: This invalid payload drops a read while citing evidence.
            retention_decision: DROP
expect:
  result_contains:
    status: rejected
