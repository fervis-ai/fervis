id: dedupes_repeated_field_tokens
description: Parser deduplicates repeated relevant field tokens while preserving first-seen order.
migrates:
  - api/tests/fervis/lookup/test_read_eligibility_contract.py::test_read_eligibility_dedupes_repeated_relevant_field_tokens
kind: algorithm
algorithm: read_eligibility.parse
input:
  request_fixture: sales_count
  payload:
    requested_fact_assessments:
      - requested_fact_id: fact_1
        read_candidate_reviews:
          - source_candidate_id: source_1
            read_id: list_sales_summary
            relevant_row_path_tokens: [source_1.row.root]
            relevant_field_tokens:
              - source_1.field.data.count
              - source_1.field.data.count
              - source_1.field.meta.sale_type
            retention_basis: The read exposes sales count evidence.
            retention_decision: RETAIN
          - source_candidate_id: source_2
            read_id: list_payment_list
            relevant_row_path_tokens: []
            relevant_field_tokens: []
            retention_basis: Payments are not sales evidence.
            retention_decision: DROP
expect:
  result_contains:
    read_assessments:
      - relevant_field_refs:
          - field.summary.data.count
          - field.summary.meta.sale_type
