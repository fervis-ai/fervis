id: retains_candidate_with_useful_evidence
description: Read eligibility retains a candidate with useful row and field evidence and drops unrelated reads.
migrates:
  - api/tests/fervis/lookup/test_read_eligibility_contract.py::test_read_eligibility_retains_candidates_with_potentially_useful_evidence
kind: algorithm
algorithm: read_eligibility.parse
input:
  request_fixture: sales_count
  payload:
    requested_fact_assessments:
      - requested_fact_id: fact_1
        read_candidate_reviews:
          - source_candidate_id: source_1
            read_id: list_sales_summary
            relevant_row_path_tokens: [source_1.row.root]
            relevant_field_tokens:
              - source_1.field.data.count
              - source_1.field.meta.sale_type
            retention_basis: The read exposes a sales count and sale_type field that may help answer the requested sales count.
            retention_decision: RETAIN
          - source_candidate_id: source_2
            read_id: list_payment_list
            relevant_row_path_tokens: []
            relevant_field_tokens: []
            retention_basis: Payments are not sales evidence for this requested fact.
            retention_decision: DROP
expect:
  result_contains:
    retained_read_ids_by_requested_fact:
      fact_1: [list_sales_summary]
    read_assessments:
      - relevant_row_path_ids: [root]
        relevant_field_refs:
          - field.summary.data.count
          - field.summary.meta.sale_type
