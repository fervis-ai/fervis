id: schema_keeps_source_candidates_fact_local
description: Schema keeps source candidates local to the requested fact that showed them.
migrates:
  - api/tests/fervis/lookup/test_read_eligibility_contract.py::test_read_eligibility_schema_keeps_source_candidates_fact_local
kind: algorithm
algorithm: read_eligibility.schema_validate
input:
