id: schema_keeps_source_candidates_fact_local
description: Schema keeps source candidates local to the requested fact that showed them.
migrates:
  - api/tests/fervis/lookup/test_read_eligibility_contract.py::test_read_eligibility_schema_keeps_source_candidates_fact_local
kind: algorithm
algorithm: read_eligibility.schema_validate
input:
  request_fixture: two_fact
  payload:
    requested_fact_assessments:
      - requested_fact_id: fact_sales
        read_candidate_reviews:
          - source_candidate_id: source_2
            read_id: list_payment_list
            relevant_row_path_tokens: [source_2.row.root]
            relevant_field_tokens: [source_2.field.data.amount]
            retention_basis: This candidate belongs to fact_payments, not fact_sales.
            retention_decision: RETAIN
      - requested_fact_id: fact_payments
        read_candidate_reviews:
          - source_candidate_id: source_1
            read_id: list_sales_summary
            relevant_row_path_tokens: [source_1.row.root]
            relevant_field_tokens: [source_1.field.data.count]
            retention_basis: This candidate belongs to fact_sales, not fact_payments.
            retention_decision: RETAIN
expect:
  result_contains:
    status: rejected
