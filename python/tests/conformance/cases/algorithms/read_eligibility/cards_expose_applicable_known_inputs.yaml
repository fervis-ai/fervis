id: cards_expose_applicable_known_inputs
description: Read-eligibility cards expose grounded known inputs that apply to candidate read fields.
kind: algorithm
algorithm: read_eligibility.cards
input:
  request_fixture: stores_in_grounded_area
  request:
    available_values:
      - id: value_area_nairobi
        kind: identity
        identity_type: area
        identity_field: area_id
        value: area-london
        display_value: London
        proof_refs: [known_input:qi1]
        applies_to_requested_fact_ids: [fact_1]
expect:
  result_contains:
    applicable_known_inputs_by_read:
      list_location_list:
        - known_input_id: qi1
          display_value: London
          identity_type: area
          applies_via_field: data.area.area_id
          role: POPULATION_SCOPE
