id: grounded_input_overrides_source_default_endpoint_param
description: A grounded input value overrides an endpoint parameter default.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_grounded_input_overrides_source_default_endpoint_param
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.status
            name: status
            source: query
            type: choice
            choices: [PLACED, COMPLETED]
            default: COMPLETED
            semantics: population_filter
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
  values:
    - id: status
      kind: literal
      literal_type: string
      value: PLACED
  grounded_input_uses:
    - id: grounded_use_status_status_value
      value_id: status
      row_source: {read_id: records, row_path_id: root}
      param_id: status
      value_component: value
expect:
  result_contains:
    endpoint_args:
      - relation_id: records_rows
        read_id: records
        param_ref: records.query.status
        value: PLACED
