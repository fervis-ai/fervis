id: duplicate_grounded_time_values_compile_once
description: Duplicate grounded values for the same endpoint param compile to one endpoint argument.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_duplicate_grounded_time_values_compile_to_one_endpoint_param
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.start_date
            name: start_date
            source: query
            type: date
  relations:
    - id: records_rows
      source: {kind: api_read, read_id: records}
  values:
    - id: jan_1_revenue
      kind: time
      expression: January 1
      resolved_start: "2030-01-01"
      resolved_end: "2030-01-01"
      granularity: day
    - id: jan_1_average_ticket
      kind: time
      expression: January 1
      resolved_start: "2030-01-01"
      resolved_end: "2030-01-01"
      granularity: day
  grounded_input_uses:
    - id: grounded_use_jan_1_revenue_start_date_start
      value_id: jan_1_revenue
      row_source: {read_id: records, row_path_id: root}
      param_id: start_date
      value_component: start
    - id: grounded_use_jan_1_average_ticket_start_date_start
      value_id: jan_1_average_ticket
      row_source: {read_id: records, row_path_id: root}
      param_id: start_date
      value_component: start
expect:
  result_contains:
    endpoint_args:
      - param_ref: records.query.start_date
        value: "2030-01-01"
