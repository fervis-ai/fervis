id: conflicting_grounded_time_values_do_not_compile_param
description: Conflicting grounded values for the same endpoint param fail closed.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_conflicting_grounded_time_values_do_not_compile_endpoint_param
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.start_date
            name: start_date
            source: query
            type: date
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
        param_bindings:
          - param_id: start_date
            value_id: jan_1
            value_component: start
          - param_id: start_date
            value_id: jan_2
            value_component: start
  values:
    - id: jan_1
      kind: time
      expression: January 1
      resolved_start: "2030-01-01"
      resolved_end: "2030-01-01"
      granularity: day
    - id: jan_2
      kind: time
      expression: January 2
      resolved_start: "2030-01-02"
      resolved_end: "2030-01-02"
      granularity: day
expect:
  result_contains:
    status: rejected
