id: source_default_compiles_to_endpoint_param
description: A response-shape field requirement produces the source default endpoint argument.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_source_default_compiles_to_endpoint_param
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.group_by
            name: group_by
            source: query
            type: choice
            required: true
            choices: [date, location]
            semantics: response_shape
        fields:
          - ref: records.field.location_total
            path: data.location_total
            type: number
            requirements:
              - param_ref: records.query.group_by
                value: location
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
      fields:
        - field_id: data_location_total
          roles: [output]
  values: []
expect:
  result_contains:
    endpoint_args:
      - relation_id: records_rows
        read_id: records
        param_ref: records.query.group_by
        value: location
    row_filters: []
    scalar_inputs: []
