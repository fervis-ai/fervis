id: relation_param_binding_dedupes_matching_grounded_value
description: Relation param bindings and matching grounded values compile to one endpoint argument per param.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_source_binding_matching_grounded_value_does_not_duplicate_endpoint_param
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.start_date
            name: start_date
            source: query
            type: date
          - ref: records.query.end_date
            name: end_date
            source: query
            type: date
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
        param_bindings:
          - param_id: start_date
            value: "2026-05-01"
          - param_id: end_date
            value: "2026-05-10"
  values:
    - id: this_month
      kind: time
      expression: this month
      resolved_start: "2026-05-01"
      resolved_end: "2026-05-10"
      granularity: day
  grounded_input_uses:
    - id: grounded_use_this_month_start_date_start
      value_id: this_month
      row_source: {read_id: records, row_path_id: root}
      param_id: start_date
      value_component: start
    - id: grounded_use_this_month_end_date_end
      value_id: this_month
      row_source: {read_id: records, row_path_id: root}
      param_id: end_date
      value_component: end
expect:
  result_contains:
    endpoint_args:
      - param_ref: records.query.start_date
        value: "2026-05-01"
      - param_ref: records.query.end_date
        value: "2026-05-10"
