id: literal_value_cannot_filter_an_identity_field
description: A scalar literal cannot be compiled as an identity-field row filter.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_literal_value_does_not_compile_to_row_filter
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        fields:
          - ref: field.data.entity_id
            path: data.entity_id
            type: uuid
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
        row_filters:
          - field_id: data_entity_id
            operator: equals
            value_id: threshold
      fields:
        - field_id: data_entity_id
          roles: [identity]
  values:
    - id: threshold
      kind: literal
      literal_type: number
      value: "5"
expect:
  result_contains:
    status: rejected
