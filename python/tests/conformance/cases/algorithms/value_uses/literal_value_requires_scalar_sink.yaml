id: literal_value_requires_scalar_sink
description: A literal value cannot be compiled as a row filter and must use a scalar sink.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_literal_value_does_not_compile_to_row_filter
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        fields:
          - ref: field.data.entity_id
            path: data.entity_id
            type: uuid
  relations:
    - id: records_rows
      source: {kind: api_read, read_id: records}
      fields:
        - field_id: data_entity_id
          roles: [identity]
  values:
    - id: threshold
      kind: literal
      literal_type: number
      value: "5"
  value_uses:
    - id: use_threshold_filter
      value_id: threshold
      target:
        kind: row_filter
        relation_id: records_rows
        field_id: data_entity_id
        operator: equals
expect:
  error_contains: requires scalar sink
