id: grounded_value_compiles_to_endpoint_param
description: A grounded named value compiles to the endpoint argument for the selected relation source.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_grounded_value_compiles_to_endpoint_param
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_grounded_input_use_targets_plan_row_source_not_catalog_read_id
kind: algorithm
algorithm: planning.value_uses
input:
  catalog:
    reads:
      - id: records
        endpoint_name: list_records
        params:
          - ref: records.query.selector
            name: selector
            source: query
            type: string
        fields:
          - ref: field.data.entity_id
            path: data.entity_id
            type: uuid
  relations:
    - id: records_rows
      source:
        kind: api_read
        read_id: records
        param_bindings:
          - param_id: selector
            value_id: alpha
      fields:
        - field_id: data_entity_id
          roles: [identity]
  values:
    - id: alpha
      kind: named
      text: Alpha
expect:
  result_contains:
    endpoint_args:
      - relation_id: records_rows
        read_id: records
        param_ref: records.query.selector
        value: Alpha
