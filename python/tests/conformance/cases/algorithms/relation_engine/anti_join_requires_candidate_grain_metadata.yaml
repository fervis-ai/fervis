id: anti_join_requires_candidate_grain_metadata
description: Anti-join requires candidate relation grain metadata.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_coverage_set_algebra.py::test_anti_join_rejects_missing_grain_metadata
kind: algorithm
algorithm: execution.relation_engine
input:
  scalar_inputs: [{id: zero, value: 0}]
  relations:
    - id: candidate_rows
      rows: [{entity_id: a, display: Alpha}]
      grain_keys: []
      completeness: {status: complete, source_kind: api_read, set_kind: universe}
    - id: observed_rows
      rows: []
      grain_keys: [observed_id]
      completeness: {status: complete, source_kind: api_read, set_kind: observation}
  operations:
    - id: missing_entities
      output_relation: answer_rows
      spec:
        kind: anti_join
        candidate:
          relation_id: candidate_rows
          role: anti_join.candidate
          required_identity_fields: [entity_id]
        observed:
          relation_id: observed_rows
          role: anti_join.observed
          required_identity_fields: [observed_id]
        join_keys: [{left: entity_id, right: observed_id}]
        output_fields: [{source: display, output: name}]
expect:
  error_contains: candidate grain
