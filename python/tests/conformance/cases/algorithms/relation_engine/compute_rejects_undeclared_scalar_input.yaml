id: compute_rejects_missing_prior_output
description: Compute cannot read a scalar that was not produced by the named prior operation.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_relation_engine_operations.py::test_compute_cannot_read_undeclared_scalar_inputs
kind: algorithm
algorithm: execution.relation_engine
input:
  operations:
    - id: invalid
      output_relation: ""
      spec:
        kind: compute
        expression:
          output: {node_id: missing, output_id: hidden}
        output_scalar: result
expect:
  result_contains:
    status: rejected
