id: rank_requires_unique_ordering_keys
description: Limited rank fails closed when ordering keys are not unique and no tie-breaker exists.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_relation_engine_operations.py::test_rank_requires_unique_ordering_keys_for_limited_results
kind: algorithm
algorithm: execution.relation_engine
input:
  relations:
    - id: items
      rows:
        - {item_id: a, amount: "100"}
        - {item_id: b, amount: "100"}
        - {item_id: c, amount: "50"}
      grain_keys: [item_id]
      completeness: {status: complete, source_kind: api_read, set_kind: unknown}
  operations:
    - id: ranked
      output_relation: top_item
      spec:
        kind: rank
        input_relation: items
        order_by: [{field: amount, direction: desc}]
        tie_policy: field
        tie_breakers: []
        limit: 1
expect:
  error_contains: unique ordering keys
