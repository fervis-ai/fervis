id: project_preserves_grain_when_full_input_grain_survives
description: Project preserves grain and identity type when the full input grain survives.
kind: algorithm
algorithm: execution.relation_engine
input:
  relations:
    - id: sales
      rows:
        - {sale_id: sale_1, amount: 10}
        - {sale_id: sale_2, amount: 20}
      grain_keys: [sale_id]
  operations:
    - id: project_sales
      output_relation: answer_rows
      spec:
        kind: project
        input_relation: sales
        fields:
          - {source: sale_id}
          - {source: amount}
expect:
  result_contains:
    answer_rows:
      grain_keys: [sale_id]
