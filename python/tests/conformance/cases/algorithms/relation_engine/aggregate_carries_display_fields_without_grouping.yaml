id: aggregate_carries_display_fields_without_grouping
description: Aggregate may carry stable display fields without adding them to the grouping grain.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_relation_engine_operations.py::test_aggregate_carries_display_fields_without_grouping_by_them
kind: algorithm
algorithm: execution.relation_engine
input:
  relations:
    - id: items
      rows:
        - {location_id: loc_1, label: ABC Mall, amount: "10"}
        - {location_id: loc_1, label: ABC Mall, amount: "5"}
      grain_keys: [location_id]
      completeness: {status: complete, source_kind: api_read, set_kind: unknown}
  operations:
    - id: totals
      output_relation: totals_by_location
      spec:
        kind: aggregate
        input_relation: items
        group_by: [location_id]
        carry_fields:
          - {source: label}
        aggregations:
          - {function: sum, input_field: amount, output_field: total}
expect:
  result_contains:
    totals_by_location:
      grain_keys: [location_id]
      rows:
        - {location_id: loc_1, label: ABC Mall, total: 15}
