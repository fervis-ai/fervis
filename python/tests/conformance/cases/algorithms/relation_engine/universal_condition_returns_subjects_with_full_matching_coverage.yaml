id: universal_condition_returns_subjects_with_full_matching_coverage
description: Universal condition returns only subjects whose coverage rows match every required dimension.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_relation_engine_operations.py::test_universal_condition_returns_subjects_where_all_coverage_rows_match
kind: algorithm
algorithm: execution.relation_engine
input:
  scalar_inputs: [{id: zero, value: 0}]
  relations:
    - id: candidate_subjects
      rows: [{subject_id: a}, {subject_id: b}]
      grain_keys: [subject_id]
      completeness: {status: complete, source_kind: api_read, set_kind: universe}
    - id: required_dimensions
      rows: [{dimension_id: x}, {dimension_id: y}]
      grain_keys: [dimension_id]
      completeness: {status: complete, source_kind: api_read, set_kind: universe}
    - id: observations
      rows:
        - {obs_subject_id: a, obs_dimension_id: x, quantity: 0}
        - {obs_subject_id: a, obs_dimension_id: y, quantity: 0}
        - {obs_subject_id: b, obs_dimension_id: x, quantity: 0}
        - {obs_subject_id: b, obs_dimension_id: y, quantity: 3}
      grain_keys: [obs_subject_id, obs_dimension_id]
      completeness: {status: complete, source_kind: api_read, set_kind: observation}
  operations:
    - id: all_match
      output_relation: result
      spec:
        kind: universal_condition
        candidate_subject:
          relation_id: candidate_subjects
          role: universal_condition.candidate_subject
          required_identity_fields: [subject_id]
        required_dimension:
          relation_id: required_dimensions
          role: universal_condition.required_dimension
          required_identity_fields: [dimension_id]
        observation:
          relation_id: observations
          role: universal_condition.observation
          required_identity_fields: [obs_subject_id, obs_dimension_id]
        subject_keys: [{left: subject_id, right: obs_subject_id}]
        dimension_keys: [{left: dimension_id, right: obs_dimension_id}]
        predicate: {left: quantity, operator: lte, right_scalar: zero}
        output_fields: [{source: subject_id}]
expect:
  result_contains:
    result:
      rows:
        - {subject_id: a}
