id: rank_declared_string_lexically
kind: algorithm
algorithm: execution.relation_engine
description: Ranking uses lexical ordering for a field declared as string even when its values look numeric.
input:
  relations:
    - id: codes
      rows: [{code: "10"}, {code: "2"}]
      field_types: {code: string}
  operations:
    - id: rank
      output_relation: ranked
      spec:
        kind: rank
        input_relation: codes
        order_by: [{field: code, direction: asc}]
        tie_policy: field
        tie_breakers: [{field: code, direction: asc}]
        limit: 2
expect:
  result_contains:
    ranked:
      rows: [{code: "10"}, {code: "2"}]
