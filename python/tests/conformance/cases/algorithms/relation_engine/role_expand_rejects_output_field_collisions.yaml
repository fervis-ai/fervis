id: role_expand_rejects_output_field_collisions
description: Role expansion fails closed when generated fields collide with carried output fields.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_relation_engine_operations.py::test_role_expand_rejects_output_field_collisions
kind: algorithm
algorithm: execution.relation_engine
input:
  relations:
    - id: records
      rows:
        - {record_id: r1, role: existing, owner_id: u1}
      grain_keys: []
  operations:
    - id: roles
      output_relation: result
      spec:
        kind: role_expand
        input_relation: records
        carry_fields: [record_id, role]
        mappings:
          - {role: owner, source_field: owner_id, output_field: record_id}
        output_fields: [record_id, role]
expect:
  error_contains: field conflict
