id: scripted_pattern_ordered_rows_take
description: Lookup runtime orders source rows and applies the explicit typed result limit before projection.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: What were the first two event codes?
  question_contract:
    fact_description: first two event codes
    subject_text: events
    answer_expression_family: list_rows
    ordering: {basis: event chronology, direction: ascending}
    selection: {kind: take}
    answer_outputs:
      - {description: event code, role: ANSWER_VALUE}
    resource_terms: [event]
    known_inputs:
      - kind: literal_text
        source: question_context
        text: two
        resolved_value_text: '2'
        role: result_limit
  catalog:
    reads:
      - id: event_read
        endpoint_name: event_read
        resource_names: [event]
        row_paths:
          - {id: data, path: data, cardinality: many}
        fields:
          - {ref: field.event_code, path: data.event_code, row_path_id: data, type: string}
          - {ref: field.started_at, path: data.started_at, row_path_id: data, type: datetime}
        candidate_keys:
          - id: event_code_key
            entity_kind: event
            components: [{id: event_code, field_ref: field.event_code}]
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
        - requested_fact_id: fact_1
          answer_output_ids: [answer_1]
          pattern: list_rows
          source: {kind: read, read_id: event_read}
          output_fields: [{field_id: event_code}]
          ordering_field:
            selection_basis: started_at establishes chronological order.
            field_id: started_at
  responses:
    event_read:
      data:
        - {event_code: C, started_at: '2026-07-03T08:00:00Z'}
        - {event_code: A, started_at: '2026-07-01T08:00:00Z'}
        - {event_code: B, started_at: '2026-07-02T08:00:00Z'}
  read_eligibility:
    - requested_fact_id: fact_1
      read_id: event_read
      answer_value_fields: [event_code]
expect:
  result_contains:
    status: COMPLETED
    rendered_rows:
      - answer_1:
          entityKind: event
          keyId: event_code_key
          components: {event_code: A}
      - answer_1:
          entityKind: event
          keyId: event_code_key
          components: {event_code: B}
