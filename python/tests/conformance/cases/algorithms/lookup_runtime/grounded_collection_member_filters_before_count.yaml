id: grounded_collection_member_filters_before_count
description: A grounded scalar member uses collection containment before counting matching rows.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many flows are tagged operations?
  question_contract:
    fact_description: count of flows tagged operations
    subject_text: flows
    answer_expression_family: scalar_aggregate
    answer_outputs: [count]
    resource_terms: [flow]
    support_role: ROW_COUNT
    entity_target_catalog_search_terms:
    - target_id: input_1
      catalog_search_terms:
      - basis: flow records expose the tag values used to constrain flows.
        term: flow
    known_inputs:
    - input_ref: input_1
      kind: literal_text
      text: operations
      operand_text: operations
      field_label_text: tag
      value_meaning_hint: tag label
      role: reference_value
  grounding:
    compatible_resolver_reads:
      input_1: [list_flows]
    result_kinds:
      input_1: matched_value
    matched_field_refs:
      input_1: field.tags
  catalog:
    reads:
    - id: list_flows
      endpoint_name: list_flows
      resource_names: [flow]
      row_paths:
      - {id: data, path: data, cardinality: many}
      fields:
      - {ref: field.id, path: data.id, row_path_id: data, type: uuid}
      - {ref: field.name, path: data.name, row_path_id: data, type: string}
      - {ref: field.tags, path: data.tags, row_path_id: data, type: array}
      candidate_keys:
      - id: primary_key
        entity_kind: flow
        primary: true
        components: [{id: id, field_ref: field.id}]
      context_field_refs: [field.name]
    - id: list_flow_summaries
      endpoint_name: list_flow_summaries
      resource_names: [flow]
      row_paths:
      - {id: data, path: data, cardinality: many}
      fields:
      - {ref: field.id, path: data.id, row_path_id: data, type: uuid}
      - {ref: field.tags, path: data.tags, row_path_id: data, type: array}
      candidate_keys:
      - id: primary_key
        entity_kind: flow
        primary: true
        components: [{id: id, field_ref: field.id}]
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
      - requested_fact_id: fact_1
        answer_output_ids: [answer_1]
        pattern: aggregate_scalar
        source: {kind: read, read_id: list_flow_summaries}
        metric:
          kind: count_records
          count_basis:
            kind: row_population
            row_path_id: data
            row_cardinality: many
          label: count
  read_eligibility:
  - requested_fact_id: fact_1
    read_id: list_flow_summaries
    row_path_ids: [data]
    population_scope_fields: [tags]
  responses:
    list_flows:
      data:
      - {id: flow_1, name: Inventory Monitor, tags: [operations, inventory]}
      - {id: flow_2, name: Shipment Tracker, tags: [operations, shipping]}
      - {id: flow_3, name: Demo, tags: [examples]}
    list_flow_summaries:
      data:
      - {id: flow_1, tags: [operations, inventory]}
      - {id: flow_2, tags: [operations, shipping]}
      - {id: flow_3, tags: [examples]}
expect:
  result_contains:
    status: COMPLETED
    rendered_rows:
    - count: 2
