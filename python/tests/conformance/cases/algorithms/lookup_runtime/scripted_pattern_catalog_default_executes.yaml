id: scripted_pattern_catalog_default_executes
description: An explicit source-binding choice to use a catalog default compiles and executes with that default.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many records happened?
  question_contract:
    fact_description: count of records that happened
    subject_text: records
    answer_expression_family: scalar_aggregate
    answer_outputs: [count]
    resource_terms: [record]
  catalog:
    reads:
      - id: records_read
        endpoint_name: records_read
        resource_names: [record]
        params:
          - ref: records_read.query.channel
            name: channel
            source: query
            type: choice
            choices: [STORE, ONLINE]
          - ref: records_read.query.granularity
            name: granularity
            source: query
            type: choice
            choices: [day, month]
            default: day
        row_paths:
          - id: data
            path: data
            cardinality: many
        fields:
          - ref: field.record_id
            path: data.record_id
            row_path_id: data
            type: uuid
            identity: {entity_ref: record, identity_field: record_id, primary_key: true, stable: true}
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
        - requested_fact_id: fact_1
          answer_output_ids: [answer_1]
          pattern: aggregate_scalar
          source: {kind: read, read_id: records_read}
          metric:
            kind: count_records
            count_basis:
              kind: row_population
              row_path_id: data
              row_cardinality: many
            record_id_field_id: record_id
            label: count
  source_binding:
    - requested_fact_id: fact_1
      default_params: [granularity]
      param_value_choices:
        channel:
          population_intent: store records that happened
          basis: Store records use the STORE channel.
          selected_values: [STORE]
          all_values: [STORE, ONLINE]
  responses:
    records_read:
      data:
        - {record_id: record_1}
        - {record_id: record_2}
expect:
  result_contains:
    status: COMPLETED
    endpoint_args:
      records_read:
        records_read.query.channel: STORE
        records_read.query.granularity: day
    rendered_rows:
      - count: 2
