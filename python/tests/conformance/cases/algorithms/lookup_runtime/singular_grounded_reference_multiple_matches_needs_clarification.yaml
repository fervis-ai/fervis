id: singular_grounded_reference_multiple_matches_needs_clarification
description: Singular lookup stops with actionable clarification when one named input resolves to multiple canonical entities.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many locations are in London?
  question_contract:
    fact_description: count of locations in London
    subject_text: locations
    answer_expression_family: scalar_aggregate
    answer_outputs:
    - count
    resource_terms:
    - location
    support_role: ROW_COUNT
    entity_target_catalog_search_terms:
    - target_id: input_1
      catalog_search_terms:
      - basis: area can resolve London to the API identity used by location rows.
        term: area
    known_inputs:
    - kind: literal_text
      text: London
      resolved_value_text: London
      value_meaning_hint: area
      role: reference_value
  catalog:
    reads:
    - id: list_location_list
      endpoint_name: list_location_list
      resource_names:
      - location
      row_paths:
      - id: data
        path: data
        cardinality: many
      fields:
      - ref: field.location_id
        path: data.location_id
        row_path_id: data
        type: uuid
      - ref: field.area_id
        path: data.area.area_id
        row_path_id: data
        type: uuid
      candidate_keys:
      - {id: primary_key, entity_kind: location, primary: true, components: [{id: location_id, field_ref: field.location_id}]}
      entity_references:
      - {id: area_reference, target_entity_kind: area, target_key_id: primary_key, components: [{target_component_id: area_id, local_field_ref: field.area_id}]}
    - id: list_area_list
      endpoint_name: list_area_list
      resource_names:
      - area
      params:
      - ref: list_area_list.query.name
        name: name
        source: query
        type: string
      row_paths:
      - id: data
        path: data
        cardinality: many
      fields:
      - ref: field.area_resolver_id
        path: data.area_id
        row_path_id: data
        type: uuid
      - ref: field.area_name
        path: data.name
        row_path_id: data
        type: string
      candidate_keys:
      - {id: primary_key, entity_kind: area, primary: true, components: [{id: area_id, field_ref: field.area_resolver_id}], context_field_refs: [field.area_name]}
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
      - requested_fact_id: fact_1
        answer_output_ids:
        - answer_1
        pattern: aggregate_scalar
        source:
          kind: read
          read_id: list_location_list
        metric:
          kind: count_records
          count_basis:
            kind: row_population
            row_path_id: data
            row_cardinality: many
          label: count
  read_eligibility:
  - requested_fact_id: fact_1
    read_id: list_location_list
    row_path_ids:
    - data
  responses:
    list_area_list:
      data:
      - area_id: area_nairobi_1
        name: London
      - area_id: area_nairobi_2
        name: London
    list_location_list:
      data:
      - location_id: loc_1
        area:
          area_id: area_nairobi_1
      - location_id: loc_2
        area:
          area_id: area_nairobi_2
      - location_id: loc_3
        area:
          area_id: area_mombasa
expect:
  result_contains:
    status: NEEDS_CLARIFICATION
    outcome_kind: needs_clarification
    clarifications:
    - question: Which matching area should I use?
      need: target_reference
      reason: multiple_matching_entities
      subjects:
      - kind: question_input
        options:
        - id: 'area:primary_key:{"area_id":"area_nairobi_1"}'
        - id: 'area:primary_key:{"area_id":"area_nairobi_2"}'
      evidence:
      - kind: known_input
        id: known_input:input_1
      - kind: candidate
        id: 'area:primary_key:{"area_id":"area_nairobi_1"}'
      - kind: candidate
        id: 'area:primary_key:{"area_id":"area_nairobi_2"}'
