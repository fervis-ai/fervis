id: used_known_input_must_be_proven_by_fulfillment
description: Lookup must fail closed when no eligible read can prove a question input marked use_input=true.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many records are in Target Area?
  question_contract:
    fact_description: count of records in Target Area
    subject_text: records
    answer_expression_family: scalar_aggregate
    answer_outputs:
    - count
    resource_terms:
    - record
    support_role: ROW_COUNT
    entity_target_catalog_search_terms:
    - target_id: input_1
      catalog_search_terms:
      - basis: area can resolve Target Area to an API identity.
        term: area
    known_inputs:
    - kind: literal_text
      text: Target Area
      resolved_value_text: Target Area
      value_meaning_hint: area
      role: reference_value
  catalog:
    reads:
    - id: list_record_list
      endpoint_name: list_record_list
      resource_names:
      - record
      row_paths:
      - id: data
        path: data
        cardinality: many
      fields:
      - ref: field.record_id
        path: data.record_id
        row_path_id: data
        type: uuid
      - ref: field.area_id
        path: data.area_id
        row_path_id: data
        type: uuid
      candidate_keys:
      - {id: primary_key, entity_kind: record, primary: true, components: [{id: record_id, field_ref: field.record_id}]}
    - id: list_area_list
      endpoint_name: list_area_list
      resource_names:
      - area
      params:
      - ref: list_area_list.query.name
        name: name
        source: query
        type: string
      row_paths:
      - id: data
        path: data
        cardinality: many
      fields:
      - ref: field.area_id
        path: data.area_id
        row_path_id: data
        type: uuid
      - ref: field.area_name
        path: data.name
        row_path_id: data
        type: string
      candidate_keys:
      - {id: primary_key, entity_kind: area, primary: true, components: [{id: area_id, field_ref: field.area_id}], context_field_refs: [field.area_name]}
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
      - requested_fact_id: fact_1
        answer_output_ids:
        - answer_1
        pattern: aggregate_scalar
        source:
          kind: read
          read_id: list_record_list
        metric:
          kind: count_records
          count_basis:
            kind: row_population
            row_path_id: data
            row_cardinality: many
          label: count
  read_eligibility:
  - requested_fact_id: fact_1
    read_id: list_record_list
    row_path_ids:
    - data
  responses:
    list_area_list:
      data:
      - area_id: area_a
        name: Target Area
    list_record_list:
      data:
