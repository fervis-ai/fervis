id: callable_prior_frame_executes_saved_program
description: A model-selected prior frame rebinds one typed argument and invokes the saved program directly.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: callable_prior_frame
  question: What about Pivot Mall?
  run_id: run_pivot
  base_run_id: run_base
  conversation_id: conversation_1
  tenant_id: tenant_1
  base_program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/invocation}
  base_invocation:
    bindings: {$ref: ../../../fixtures/answer_program_v1.yaml#/binding_sets/invocation}
  memory_artifacts:
  - artifact_id: run_base
    outcome: answered
    source_question: How many sales did we make at Acacia Mall?
    provenance:
      runId: run_base
      programRequestedFactIds: [fact_1]
      question_contract:
        kind: question_contract
        answer_requests_count: 1
        question_inputs:
        - id: store_ids
          kind: literal_text
          source: question_context
          role: reference_value
          text: Acacia Mall
          resolved_value_text: Acacia Mall
          field_label_text: mall
          value_meaning_hint: mall identity
        answer_requests:
        - id: fact_1
          answer_fact: sales for a store
          answer_expression: {family: list_rows}
          answer_subject:
            subject_text: sales
            instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
          answer_outputs:
          - {id: answer_1, description: answer_1}
          used_question_inputs: [store_ids]
  conversation_resolution:
    kind: conversation_resolution
    current_question_text: What about Pivot Mall?
    outcome:
      kind: resolved
      resolution_basis: Current meaning and retained prior meaning form the resolved question.
      contextualized_question: How many sales did we make at Pivot Mall?
      clauses:
      - current_clause_text: What about Pivot Mall?
        occurrence: 1
        resolved_text: How many sales did we make at Pivot Mall?
        retained_frame_parts: []
        values:
        - value_id: pivot_mall
          resolved_text: Pivot Mall
          sources:
          - {kind: current_span, text: Pivot Mall, occurrence: 1}
        - value_id: complete_question_meaning
          resolved_text: How many sales did we make at Pivot Mall?
          sources:
          - {kind: frame_part, frame_id: request:1, part_id: input:entity_identity:1}
      frame_call:
        kind: call
        frame_id: request:1
        arguments:
        - kind: resolved_value
          parameter_id: question.store_ids
          value_id: pivot_mall
  question_contract:
    fact_description: sales for a store
    subject_text: sales
    answer_expression_family: list_rows
    answer_outputs: [answer_1]
    resource_terms: [sale]
    entity_target_catalog_search_terms:
    - target_id: store_ids
      catalog_search_terms:
      - {basis: A mall is resolved through the store resource., term: store}
  grounding:
    compatible_resolver_reads:
      store_ids: [stores]
  catalog:
    reads:
    - id: stores
      endpoint_name: list_store_list
      resource_names: [store, mall]
      params:
      - {ref: stores.query.name, name: name, source: query, type: string}
      row_paths:
      - {id: results, path: results, cardinality: many}
      fields:
      - ref: stores.field.store_id
        path: results.store_id
        row_path_id: results
        type: uuid
        identity: {entity_ref: store, identity_field: store_id, primary_key: true}
      - ref: stores.field.name
        path: results.name
        row_path_id: results
        type: string
    - id: sales
      endpoint_name: list_sale_list
      resource_names: [sale]
      params:
      - ref: sales.query.store_id
        name: store_id
        source: query
        type: uuid
        identity: {entity_ref: store, identity_field: store_id, primary_key: true}
      row_paths:
      - {id: results, path: results, cardinality: many}
      fields:
      - ref: sales.field.sale_id
        path: results.sale_id
        type: uuid
        identity: {entity_ref: sale, identity_field: sale_id, primary_key: true}
      - ref: sales.field.store_id
        path: results.store_id
        type: uuid
        identity: {entity_ref: store, identity_field: store_id, primary_key: true}
  responses:
    list_store_list:
      results:
      - {store_id: store_2, name: Pivot Mall}
    list_sale_list:
      results:
      - {sale_id: sale_2, store_id: store_2}
expect:
  result_contains:
    status: COMPLETED
    error: ''
    endpoint_args:
      list_store_list: {}
      list_sale_list: {sales.query.store_id: store_2}
    tool_names:
    - submit_conversation_resolution
    - submit_query_enrichment
    - submit_grounding
    invocation_kind: continue_prior_request
    base_invocation_id: pi_f7ae88fc4df1a333b15d115507743f856eb93c2116c74a702ab6f08af7eb8b60
