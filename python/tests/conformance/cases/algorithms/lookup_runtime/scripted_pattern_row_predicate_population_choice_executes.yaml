id: scripted_pattern_row_predicate_population_choice_executes
description: A source-bound row-predicate population choice compiles and filters the invoked relation.
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many current records are there?
  question_contract:
    fact_description: count of current records
    subject_text: records
    answer_expression_family: scalar_aggregate
    answer_outputs: [count]
    resource_terms: [record]
  catalog:
    reads:
      - id: records_read
        endpoint_name: records_read
        resource_names: [record]
        row_paths:
          - id: data
            path: data
            cardinality: many
        fields:
          - ref: field.record_id
            path: data.record_id
            row_path_id: data
            type: uuid
            identity: {entity_ref: record, identity_field: record_id, primary_key: true, stable: true}
          - ref: field.is_deleted
            path: data.is_deleted
            row_path_id: data
            type: boolean
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
        - requested_fact_id: fact_1
          answer_output_ids: [answer_1]
          pattern: aggregate_scalar
          source: {kind: read, read_id: records_read}
          metric:
            kind: count_records
            count_basis:
              kind: row_population
              row_path_id: data
              row_cardinality: many
            record_id_field_id: record_id
            label: count
  read_eligibility:
    - requested_fact_id: fact_1
      read_id: records_read
      row_path_ids: [data]
      population_scope_fields: [is_deleted]
  source_binding:
    - requested_fact_id: fact_1
      row_predicate_choices:
        is_deleted: ["false"]
  responses:
    records_read:
      data:
        - {record_id: current_1, is_deleted: false}
        - {record_id: deleted_1, is_deleted: true}
        - {record_id: current_2, is_deleted: false}
expect:
  result_contains:
    status: COMPLETED
    rendered_rows:
      - count: 2
