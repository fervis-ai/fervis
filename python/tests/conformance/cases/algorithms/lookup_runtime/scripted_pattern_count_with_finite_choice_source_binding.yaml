id: scripted_pattern_count_with_finite_choice_source_binding
description: Source-binding finite-choice reviews become endpoint query params before count-record execution.
migrates:
  - api/tests/fervis/lookup/test_pattern_fact_plan_contract.py::test_pattern_contract_binds_choice_params_as_single_decisions_end_to_end
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: How many store records happened?
  question_contract:
    fact_description: count of store records that happened
    subject_text: records
    answer_expression_family: scalar_aggregate
    answer_outputs: [count]
    resource_terms: [record]
  catalog:
    reads:
      - id: records_read
        endpoint_name: records_read
        resource_names: [record]
        params:
          - ref: records_read.query.channel
            name: channel
            source: query
            type: choice
            choices: [STORE, ONLINE]
          - ref: records_read.query.status
            name: status
            source: query
            type: choice
            choices: [PLACED, COMPLETED]
          - ref: records_read.query.start_date
            name: start_date
            source: query
            type: date
        row_paths:
          - id: data
            path: data
            cardinality: many
        fields:
          - ref: field.record_id
            path: data.record_id
            row_path_id: data
            type: uuid
        candidate_keys:
          - id: primary_key
            entity_kind: record
            primary: true
            components: [{id: record_id, field_ref: field.record_id}]
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
        - requested_fact_id: fact_1
          answer_output_ids: [answer_1]
          pattern: aggregate_scalar
          source: {kind: read, read_id: records_read}
          metric:
            kind: count_records
            count_basis:
              kind: row_population
              row_path_id: data
              row_cardinality: many
            label: count
  source_binding:
    - requested_fact_id: fact_1
      param_value_choices:
        channel:
          population_intent: store records that happened
          basis: Store records use the STORE channel.
          selected_values: [STORE]
          all_values: [STORE, ONLINE]
        status:
          population_intent: store records that happened
          basis: Happened records are completed records.
          selected_values: [COMPLETED]
          all_values: [PLACED, COMPLETED]
  responses:
    records_read:
      data:
        - {record_id: completed_1}
        - {record_id: completed_2}
expect:
  result_contains:
    status: COMPLETED
    endpoint_args:
      records_read:
        records_read.query.channel: STORE
        records_read.query.status: COMPLETED
    rendered_rows:
      - count: 2
