id: scripted_pattern_direct_field_value
description: Lookup runtime executes a scripted direct-field-value fact plan over a one-row API response.
migrates:
  - api/tests/fervis/lookup/test_pattern_fact_plan_contract.py::test_pattern_contract_executes_direct_field_value_end_to_end
  - api/tests/fervis/lookup/test_conversation_resolution_pipeline.py::test_pipeline_skips_resolution_when_no_memory_cards_exist
kind: algorithm
algorithm: lookup.orchestration
input:
  scenario: scripted_pattern
  question: What is the location name?
  question_contract:
    fact_description: location name
    subject_text: location
    answer_expression_family: scalar_value
    answer_outputs: [location]
    resource_terms: [metric]
    support_role: ANSWER_VALUE
  catalog:
    reads:
      - id: metric_read
        endpoint_name: metric_read
        resource_names: [metric]
        row_paths:
          - id: data
            path: data
            cardinality: one
        fields:
          - ref: field.location_name
            path: data.location_name
            row_path_id: data
            type: string
          - ref: field.metric_total
            path: data.metric_total
            row_path_id: data
            type: number
  fact_plan:
    outcome:
      kind: fact_plan
      answers:
        - requested_fact_id: fact_1
          answer_output_ids: [answer_1]
          pattern: direct_field_value
          source: {kind: read, read_id: metric_read}
          output_field: {field_id: location_name}
  responses:
    metric_read:
      data:
        location_name: Location Alpha
        metric_total: "125.00"
expect:
  result_contains:
    status: COMPLETED
    rendered_rows:
      - answer_1: Location Alpha
    tool_names:
      - submit_answer_request_contract
      - submit_query_enrichment
      - submit_read_eligibility
      - submit_source_alignment_reviews
      - submit_source_binding
      - submit_pattern_fact_plan
