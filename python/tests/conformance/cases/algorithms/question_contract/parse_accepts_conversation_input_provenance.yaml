id: parse_accepts_conversation_input_provenance
description: Question-contract parser accepts conversation-resolution inputs only through canonical CR input provenance.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: What about Mombasa?
  conversation_input_provenance:
    question_context_kind: prior_question_continuation
    resolved_request_text: How many sales did we make in Mombasa on Tuesday?
    inputs:
      - input_ref: q_place
        kind: literal_text
        value_source_text: Mombasa
        resolved_value_text: Mombasa
        value_meaning_hint: location
        role: reference_value
        sources:
          - kind: continuation_replacement
            part_id: q_place
            prior_text: Nairobi
            current_text: Mombasa
      - input_ref: q_time
        kind: literal_text
        value_source_text: Tuesday
        resolved_value_text: Tuesday
        value_meaning_hint: time scope
        role: time_value
        sources:
          - kind: continuation_carried
            part_id: q_time
            prior_text: Tuesday
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs:
      - input_ref: place
        kind: literal_text
        source: question_context
        value_source_text: Mombasa
        resolved_value_text: Mombasa
        value_meaning_hint: location
        role: reference_value
        inventory_check:
          why_this_is_an_input: Mombasa replaces the prior location input.
      - input_ref: period
        kind: literal_text
        source: conversation_resolution
        value_source_text: Tuesday
        resolved_input_ref: q_time
        resolved_value_text: Tuesday
        value_meaning_hint: time scope
        role: time_value
        inventory_check:
          why_this_is_an_input: Tuesday is carried from the prior request.
    answer_requests:
      - answer_fact: sales count in Mombasa on Tuesday
        answer_expression:
          family: scalar_aggregate
        answer_subject:
          subject_text: sales
          instance_interpretation:
            kind: NORMAL_BUSINESS_INSTANCE
        answer_population:
          population_label: sales in Mombasa on Tuesday
          counted_unit: sale
          membership_tests:
            - test_id: subject_identity
              kind: SUBJECT_IDENTITY
              polarity: MUST_PASS
              test_question: Is this a sale?
              owned_question_input_refs: []
            - test_id: place_scope
              kind: EXPLICIT_USER_CONSTRAINT
              polarity: MUST_PASS
              test_question: Is this sale in Mombasa?
              owned_question_input_refs: [place]
            - test_id: time_scope
              kind: EXPLICIT_USER_CONSTRAINT
              polarity: MUST_PASS
              test_question: Is this sale on Tuesday?
              owned_question_input_refs: [period]
        answer_outputs:
          - description: sales count
            role: ROW_POPULATION
        used_question_inputs: [place, period]
    question_input_inventory_check:
      all_input_like_phrases_declared: true
expect:
  result_contains:
    question_inputs:
      - id: place
        source: question_context
        text: Mombasa
      - id: period
        source: conversation_resolution
        text: Tuesday
        resolved_input_ref: q_time
    requested_facts:
      - description: sales count in Mombasa on Tuesday
        input_refs: [place, period]
