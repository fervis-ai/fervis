id: read_context_reference_duplicate_removed
description: Question-contract parser removes a named-reference input that duplicates the answer subject.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_removes_answer_subject_named_reference_duplicate
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many unverified cash deposits are there?
  answer_fact: count of unverified cash deposits
  answer_subject:
    subject_text: cash deposits
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_population:
    population_label: cash deposits
    counted_unit: cash deposits
    membership_tests:
      - test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent cash deposits?
  answer_outputs:
    - description: number of unverified cash deposits
  question_inputs:
    - input_ref: subject
      source: question_context
      kind: named_reference_text
      reference_text: cash deposits
      target_meaning: cash deposits
      lookup_text: cash deposits
      inventory_check: {why_this_is_an_input: cash deposits is a named reference}
  used_input_refs: [subject]
expect:
  result_contains:
    question_inputs: []
    requested_facts:
      - input_refs: []
        known_inputs: []

