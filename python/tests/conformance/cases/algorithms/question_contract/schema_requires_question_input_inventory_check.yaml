id: schema_requires_question_input_inventory_check
description: Question-contract parsing fails closed when the root input inventory check is missing.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_schema_requires_question_input_inventory_check
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many sales happened today?
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs: []
    answer_requests:
      - answer_fact: sales at ABC Mall
        answer_expression: {family: scalar_aggregate}
        question_input_uses: []
        answer_subject:
          subject_text: sales
          instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
        answer_population:
          membership_tests:
        answer_outputs:
          - description: sales total
            role: ANSWER_VALUE
expect:
  result_contains:
    status: rejected
