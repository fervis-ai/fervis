id: separate_complete_answer_facts
description: Separate complete answer requests remain separate requested facts.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_keeps_separate_complete_answer_facts
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: What was the total sales amount for products Alice Smith sold yesterday, and where did Alice Smith work yesterday?
  answer_requests_count: 2
  question_inputs:
  - input_ref: staff
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: Alice Smith is a named reference
    value_source_text: Alice Smith
    resolved_value_text: Alice Smith
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: period
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: yesterday is a time scope
    value_source_text: yesterday
    resolved_value_text: yesterday
    role: time_value
  answer_requests:
  - answer_fact: total sales amount for products Alice Smith sold yesterday
    answer_expression:
      family: scalar_aggregate
    answer_subject:
      subject_text: products
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: products
      counted_unit: products
      membership_tests:
      - test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent products?
        owned_question_input_refs: []
    answer_outputs:
    - description: the total sales amount
      role: ANSWER_VALUE
    used_question_inputs:
    - staff
    - period
  - answer_fact: work location where Alice Smith worked yesterday
    answer_expression:
      family: scalar_value
    answer_subject:
      subject_text: work location
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: work location
      counted_unit: work location
      membership_tests:
      - test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent a work location?
        owned_question_input_refs: []
    answer_outputs:
    - description: the place she worked
      role: ANSWER_VALUE
    used_question_inputs:
    - staff
    - period
expect:
  result_contains:
    requested_facts:
    - description: total sales amount for products Alice Smith sold yesterday
    - description: work location where Alice Smith worked yesterday
  result_exact_fields:
    question_inputs:
    - id: staff
      kind: literal_text
      source: question_context
      text: Alice Smith
      resolved_input_ref: ''
      resolved_value_text: Alice Smith
      field_label_text: ''
      value_meaning_hint: staff member
      role: reference_value
    - id: period
      kind: literal_text
      source: question_context
      text: yesterday
      resolved_input_ref: ''
      resolved_value_text: yesterday
      field_label_text: ''
      value_meaning_hint: ''
      role: time_value
    requested_fact_input_handoff:
    - id: fact_1
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
    - id: fact_2
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
