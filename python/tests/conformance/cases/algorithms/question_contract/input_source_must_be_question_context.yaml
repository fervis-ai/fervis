id: input_source_must_be_question_context
description: Parser rejects question-contract inputs that claim a non-question-context source.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_requires_question_context_source
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How much sales yesterday?
  question_inputs:
    - input_ref: period
      kind: time_text
      source: current_question
      reference_text: yesterday
      inventory_check: {why_this_is_an_input: yesterday is a time scope}
  used_input_refs: [period]
expect:
  error_contains: must be question_context
