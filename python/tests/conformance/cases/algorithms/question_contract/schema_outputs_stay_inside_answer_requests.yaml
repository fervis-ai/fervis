id: schema_outputs_stay_inside_answer_requests
description: Question-contract schema keeps answer outputs inside answer requests.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_schema_keeps_outputs_inside_answer_requests
kind: algorithm
algorithm: question_contract.schema
input: {}
expect:
  result_contains:
    answer_expression_schema_kind: oneOf
    answer_expression_one_of_branch_count: 9
    grouped_answer_expression_branch:
      required: [family, selection, group_key]
      properties: [family, group_key, selection]
      family_enum: [grouped_aggregate]
      allows_group_key: true
      additional_properties: false
      group_key_schema_kind: oneOf
      group_key_branch_count: 2
    ordinary_answer_expression_branch:
      required: [family, selection]
      properties: [family, selection]
      family_enum: [list_rows]
      allows_group_key: false
      additional_properties: false
    answer_output_schema_kind: object
    answer_output_one_of_branch_count: 0
    answer_output_branch:
      required: [description]
      properties: [description, role]
      role_enum:
        - ROW_COUNT
        - ANSWER_VALUE
        - MEASURED_VALUE
        - POPULATION_SCOPE
      additional_properties: false
  result_exact_fields:
    answer_expression_schema_kind: oneOf
    answer_expression_one_of_branch_count: 9
    answer_output_schema_kind: object
    answer_output_one_of_branch_count: 0
