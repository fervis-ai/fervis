id: specified_inputs_grouped_by_different_key
description: Specified inputs can filter a grouped aggregate without becoming the group key.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many sales did staff A and staff B sell by store today?
  answer_requests_count: 1
  question_inputs:
  - input_ref: staff_a
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: staff A is the first specified staff reference
    value_source_text: staff A
    resolved_value_text: staff A
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: staff_b
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: staff B is the second specified staff reference
    value_source_text: staff B
    resolved_value_text: staff B
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: today
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: today is the requested time scope
    value_source_text: today
    resolved_value_text: today
    role: time_value
  answer_requests:
  - answer_fact: sales count by store for the specified staff members today
    answer_expression:
      family: grouped_aggregate
      group_key:
        description: store
        domain: SOURCE_RESULT_VALUES
    answer_subject:
      subject_text: sales
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales by specified staff members today
      counted_unit: sale
      membership_tests:
      - test_id: subject_identity
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Is this a sale?
        owned_question_input_refs: []
      - test_id: specified_staff
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this sale associated with one of the specified staff members?
        owned_question_input_refs: [staff_a, staff_b]
      - test_id: today_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this sale in the requested time scope?
        owned_question_input_refs: [today]
    answer_outputs:
    - description: sales count
      role: ROW_POPULATION
    used_question_inputs: [staff_a, staff_b, today]
expect:
  result_contains:
    requested_facts:
    - description: sales count by store for the specified staff members today
      answer_expression_family: grouped_aggregate
      input_refs: [staff_a, staff_b, today]
      answer_request:
        answer_expression:
          family: grouped_aggregate
          group_key:
            description: store
            domain: SOURCE_RESULT_VALUES
        answer_outputs:
        - description: sales count
          role: ROW_POPULATION
        answer_population:
          membership_tests:
          - test_id: subject_identity
            owned_question_input_refs: []
          - test_id: specified_staff
            owned_question_input_refs: [staff_a, staff_b]
          - test_id: today_scope
            owned_question_input_refs: [today]
  result_exact_fields:
    requested_fact_input_handoff:
    - id: fact_1
      input_refs: [staff_a, staff_b, today]
      known_input_refs: [staff_a, staff_b, today]
