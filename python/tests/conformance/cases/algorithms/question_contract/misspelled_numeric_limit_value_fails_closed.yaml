id: misspelled_numeric_limit_value_fails_closed
description: Numeric limit value source text must be backed by the declared reference text.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_rejects_misspelled_numeric_limit_value
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Show top eigt stores
  answer_subject:
    subject_text: stores
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_outputs:
    - description: sales total
  question_inputs:
    - input_ref: limit
      source: question_context
      kind: explicit_numeric_limit_text
      reference_text: top eigt
      numeric_value: 8
      value_source_text: eight
      inventory_check: {why_this_is_an_input: top eigt is a rank limit}
  used_input_refs: [limit]
expect:
  error_contains: limit value source text must come from reference_text
