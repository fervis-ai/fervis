id: take_owns_result_limit
description: An ordered fact owns one explicit result-limit question input.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Show the first two stores
  answer_fact: first two stores
  answer_expression:
    family: list_rows
    ordering: {basis: requested order, direction: ascending}
    selection: {kind: take}
  answer_subject:
    subject_text: stores
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_outputs:
    - {description: stores, role: ANSWER_VALUE}
  question_inputs:
    - input_ref: limit_1
      source: question_context
      kind: literal_text
      inventory_check:
        why_this_is_an_input: The explicit quantity limits the ordered result.
      value_source_text: first two
      resolved_value_text: '2'
      role: result_limit
  used_input_refs: [limit_1]
expect:
  result_contains:
    question_inputs:
      - {id: limit_1, role: result_limit, resolved_value_text: '2'}
    requested_facts:
      - answer_expression_family: list_rows
        answer_request:
          answer_expression:
            family: list_rows
            ordering:
              basis: requested order
              direction: ascending
            selection_kind: take
            limit_input_ref: limit_1
        input_refs: [limit_1]
