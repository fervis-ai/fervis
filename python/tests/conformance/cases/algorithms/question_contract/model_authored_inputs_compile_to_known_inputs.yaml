id: model_authored_literal_inputs_compile_to_known_inputs
description: Model-authored literal reference and result-limit inputs compile to requested-fact known inputs.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_compiles_model_authored_inputs
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Show first 2 stores at ABC Mall
  answer_subject:
    subject_text: stores
    instance_interpretation:
      kind: NORMAL_BUSINESS_INSTANCE
  answer_expression:
    family: list_rows
    ordering: {basis: display order, direction: ascending}
    selection: {kind: take}
  answer_outputs:
  - description: sales total
    role: ANSWER_VALUE
  question_inputs:
  - input_ref: store
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: ABC Mall is a named reference
    value_source_text: ABC Mall
    resolved_value_text: ABC Mall
    value_meaning_hint: store location
    role: reference_value
  - input_ref: limit
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: first 2 is a literal value
    value_source_text: first 2
    resolved_value_text: '2'
    role: result_limit
  used_input_refs:
  - store
  - limit
expect:
  result_contains:
    requested_facts:
    - known_inputs:
      - kind: literal_text
        text: ABC Mall
        resolved_value_text: ABC Mall
        role: reference_value
      - kind: literal_text
        text: first 2
        resolved_value_text: '2'
        role: result_limit
  result_exact_fields:
    question_inputs:
    - id: store
      kind: literal_text
      source: question_context
      text: ABC Mall
      resolved_input_ref: ''
      resolved_value_text: ABC Mall
      field_label_text: ''
      value_meaning_hint: store location
      role: reference_value
    - id: limit
      kind: literal_text
      source: question_context
      text: first 2
      resolved_input_ref: ''
      resolved_value_text: '2'
      field_label_text: ''
      value_meaning_hint: ''
      role: result_limit
    requested_fact_input_handoff:
    - id: fact_1
      input_refs:
      - store
      - limit
      known_input_refs:
      - store
      - limit
