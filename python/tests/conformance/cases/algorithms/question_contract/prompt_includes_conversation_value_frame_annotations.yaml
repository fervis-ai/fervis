id: prompt_includes_conversation_value_frame_annotations
description: Question-contract prompt includes role-specific CR value-frame annotations for broad follow-ups.
kind: algorithm
algorithm: question_contract.prompt
input:
  current_question: what about last month?
  conversation_resolution_overlay:
    current_question: what about last month?
    value_frames:
      - current_clause_text: what about last month?
        current_value_text: what about last month?
        current_value_kind: broad_current_value
        resolved_frame_text: count of completed in-person sales
        must_preserve_terms: [completed in-person sales]
        used_context_frame_ids: [context_frame_1]
    references:
      - current_clause_text: what about last month?
        anchor_text: last month
        occurrence: 1
        resolved_text: the prior month relative to this month
        must_preserve_terms: [last month]
        source_ids: [prior_1]
  contains:
    - Conversation resolution annotations
    - value_frames
    - resolved_frame_text
    - count of completed in-person sales
  excludes:
    - the prior month relative to this month
    - '"references"'
expect:
  result_contains:
    current_question_present: true
    contains:
      Conversation resolution annotations: true
      value_frames: true
      resolved_frame_text: true
      count of completed in-person sales: true
    excludes:
      the prior month relative to this month: true
      '"references"': true
