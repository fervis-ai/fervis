id: open_key_grouped_count_by_source_group
description: Open-key per-group questions are grouped aggregates with source-discovered group keys.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many sales per store this month?
  answer_requests_count: 1
  question_inputs:
  - input_ref: this_month
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: this month is the requested time scope
    value_source_text: this month
    resolved_value_text: this month
    role: time_value
  answer_requests:
  - answer_fact: sales count per store this month
    answer_expression:
      family: grouped_aggregate
      group_key:
        description: store
        domain: SOURCE_RESULT_VALUES
    question_input_uses:
    - {use_id: use_this_month, input_ref: this_month, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: sales
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales this month
      counted_unit: sale
      membership_tests:
      - question_input_use_refs: []
        test_id: subject_identity
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Is this a sale?
      - question_input_use_refs: [use_this_month]
        test_id: this_month_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this sale in the requested time scope?
    answer_outputs:
    - description: sales count
      role: ROW_COUNT
expect:
  result_contains:
    requested_facts:
    - description: sales count per store this month
      answer_expression_family: grouped_aggregate
      input_refs: [this_month]
      answer_request:
        answer_expression:
          family: grouped_aggregate
          group_key:
            description: store
            domain: SOURCE_RESULT_VALUES
        answer_outputs:
        - description: sales count
          role: ROW_COUNT
  result_exact_fields:
    requested_fact_input_handoff:
    - id: fact_1
      input_refs: [this_month]
      known_input_refs: [this_month]
