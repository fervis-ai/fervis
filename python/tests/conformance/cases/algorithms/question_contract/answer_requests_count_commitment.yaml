id: answer_requests_count_commitment
description: The declared answer request count determines how many requested facts are parsed.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_uses_answer_requests_count_commitment
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: What was the total sales amount for Alice yesterday, and what store was associated with Alice sales yesterday?
  answer_requests_count: 2
  question_inputs:
  - input_ref: staff
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: Alice is a named reference
    source_text: Alice
    resolved_value_text: Alice
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: period
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: yesterday is a time scope
    source_text: yesterday
    resolved_value_text: yesterday
    role: time_value
  answer_requests:
  - answer_fact: total sales amount for Alice yesterday
    answer_expression:
      family: scalar_aggregate
    answer_subject:
      subject_text: sales amount
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales amount
      counted_unit: sales amount
      membership_tests:
      - test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent sales amount?
    answer_outputs:
    - description: total sales amount
    used_question_inputs:
    - staff
    - period
  - answer_fact: store associated with Alice sales yesterday
    answer_expression:
      family: scalar_aggregate
    answer_subject:
      subject_text: store
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: store
      counted_unit: store
      membership_tests:
      - test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent store?
    answer_outputs:
    - description: store
    used_question_inputs:
    - staff
    - period
expect:
  result_contains:
    question_inputs:
    - id: staff
    - id: period
    requested_facts:
    - description: total sales amount for Alice yesterday
      input_refs:
      - staff
      - period
    - description: store associated with Alice sales yesterday
      input_refs:
      - staff
      - period
