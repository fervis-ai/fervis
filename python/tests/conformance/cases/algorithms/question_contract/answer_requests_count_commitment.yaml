id: answer_requests_count_commitment
description: The declared answer request count determines how many requested facts are parsed.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_uses_answer_requests_count_commitment
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: What was the total sales amount for Alice yesterday, and what store was associated with Alice sales yesterday?
  answer_requests_count: 2
  question_inputs:
  - input_ref: staff
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: Alice is a named reference
    value_source_text: Alice
    resolved_value_text: Alice
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: period
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: yesterday is a time scope
    value_source_text: yesterday
    resolved_value_text: yesterday
    role: time_value
  answer_requests:
  - answer_fact: total sales amount for Alice yesterday
    answer_expression:
      family: scalar_aggregate
    question_input_uses:
    - {use_id: use_staff, input_ref: staff, owner_kind: POPULATION_TESTS}
    - {use_id: use_period, input_ref: period, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: sales amount
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales amount
      counted_unit: sales amount
      membership_tests:
      - question_input_use_refs: []
        test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent sales amount?
      - question_input_use_refs: [use_staff]
        test_id: staff_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Does the sales amount belong to Alice?
      - question_input_use_refs: [use_period]
        test_id: period_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is the sales amount from yesterday?
    answer_outputs:
    - description: total sales amount
      role: ANSWER_VALUE
  - answer_fact: store associated with Alice sales yesterday
    answer_expression:
      family: scalar_aggregate
    question_input_uses:
    - {use_id: use_staff, input_ref: staff, owner_kind: POPULATION_TESTS}
    - {use_id: use_period, input_ref: period, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: store
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: store
      counted_unit: store
      membership_tests:
      - question_input_use_refs: []
        test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent store?
      - question_input_use_refs: [use_staff]
        test_id: staff_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is the store associated with Alice's sales?
      - question_input_use_refs: [use_period]
        test_id: period_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is the association from yesterday?
    answer_outputs:
    - description: store
      role: ANSWER_VALUE
expect:
  result_contains:
    question_inputs:
    - id: staff
    - id: period
    requested_facts:
    - description: total sales amount for Alice yesterday
      input_refs:
      - staff
      - period
    - description: store associated with Alice sales yesterday
      input_refs:
      - staff
      - period
  result_exact_fields:
    question_inputs:
    - id: staff
      kind: literal_text
      source: question_context
      text: Alice
      resolved_input_ref: ''
      resolved_value_text: Alice
      field_label_text: ''
      value_meaning_hint: staff member
      role: reference_value
    - id: period
      kind: literal_text
      source: question_context
      text: yesterday
      resolved_input_ref: ''
      resolved_value_text: yesterday
      field_label_text: ''
      value_meaning_hint: ''
      role: time_value
    requested_fact_input_handoff:
    - id: fact_1
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
    - id: fact_2
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
