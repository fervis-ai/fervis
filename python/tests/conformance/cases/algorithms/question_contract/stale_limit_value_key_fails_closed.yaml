id: stale_limit_value_key_fails_closed
description: Parser rejects stale numeric limit field names that are no longer in the contract.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_rejects_stale_limit_value_key
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Show top five stores
  answer_subject:
    subject_text: stores
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_outputs:
    - description: sales total
  question_inputs:
    - input_ref: limit
      source: question_context
      kind: explicit_numeric_limit_text
      reference_text: top five
      value_source_text: five
      value: 5
      inventory_check: {why_this_is_an_input: top five is a rank limit}
  used_input_refs: [limit]
expect:
  error_contains: "unsupported fields: value"
