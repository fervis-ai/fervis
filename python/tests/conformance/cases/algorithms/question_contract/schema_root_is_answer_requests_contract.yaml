id: schema_root_separates_answer_contract_and_clarification
description: Question-contract schema records one decision basis and keeps each outcome in a separate strict branch.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_schema_is_answer_requests_root
kind: algorithm
algorithm: question_contract.schema
input: {}
expect:
  result_contains:
    root_required: [decision_basis, outcome]
    root_properties: [decision_basis, outcome]
    has_outcome_one_of: true
    branch_kinds:
      - missing_requested_fact
      - question_contract
      - unresolved_prior_turn_references
    answer_contract_required:
      - kind
      - answer_requests_count
      - question_inputs
      - answer_requests
      - question_input_inventory_check
    answer_contract_kind_values: [question_contract]
    answer_contract_has_clarification_fields: false
    missing_fact_required:
      - kind
      - source_text
      - why_question_is_incomplete
    unresolved_required:
      - kind
      - references
    unresolved_reference_properties:
      - source_text
      - target_label
      - why_question_is_incomplete
    clarifications_have_answer_fields: false
    answer_request_required:
      - answer_fact
      - answer_expression
      - answer_subject
      - answer_population
      - answer_outputs
      - used_question_inputs
  result_exact_fields:
    root_required: [decision_basis, outcome]
    root_properties: [decision_basis, outcome]
    has_outcome_one_of: true
    branch_kinds:
      - missing_requested_fact
