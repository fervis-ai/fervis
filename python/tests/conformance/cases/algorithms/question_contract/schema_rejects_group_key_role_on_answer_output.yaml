id: schema_rejects_group_key_role_on_answer_output
description: Group keys belong on grouped answer expressions, not answer outputs.
kind: algorithm
algorithm: question_contract.schema_validate
input:
  question_context: How many sales did staff A and staff B sell each today?
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs:
    - input_ref: staff_a
      kind: literal_text
      source: question_context
      value_source_text: staff A
      operand_text: staff A
      role: reference_value
      inventory_check:
        why_this_is_an_input: staff A is a specified staff reference
    - input_ref: staff_b
      kind: literal_text
      source: question_context
      value_source_text: staff B
      operand_text: staff B
      role: reference_value
      inventory_check:
        why_this_is_an_input: staff B is a specified staff reference
    answer_requests:
    - answer_fact: sales count for each specified staff member
      answer_expression:
        family: grouped_aggregate
        group_key:
          description: specified staff member
          value_source:
            kind: specified_question_inputs
      question_input_uses:
      - {input_ref: staff_a, owner_kind: GROUP_KEY}
      - {input_ref: staff_b, owner_kind: GROUP_KEY}
      answer_subject:
        subject_text: sales
        instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
      answer_population:
        membership_tests:
      answer_outputs:
      - description: specified staff member
        role: GROUP_KEY
      - description: sales count
        role: ROW_COUNT
    question_input_inventory_check:
      all_input_like_phrases_declared: true
expect:
  result_contains:
    status: rejected
