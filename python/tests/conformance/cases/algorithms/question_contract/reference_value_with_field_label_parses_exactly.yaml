id: reference_value_with_field_label_parses_exactly
description: Question-contract parser preserves a literal reference value with a user-supplied field label.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many sales did staff_id 51515151-0000-0000-0002-000000000001 make today?
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs:
      - input_ref: staff
        kind: literal_text
        source: question_context
        value_source_text: staff_id 51515151-0000-0000-0002-000000000001
        field_label_text: staff_id
        operand_text: 51515151-0000-0000-0002-000000000001
        value_meaning_hint: staff member
        role: reference_value
        inventory_check: {why_this_is_an_input: staff_id identifies the staff member whose sales define the population}
      - input_ref: today
        kind: literal_text
        source: question_context
        value_source_text: today
        operand_text: today
        role: time_value
        inventory_check: {why_this_is_an_input: today is the time scope}
    answer_requests:
      - answer_fact: sales count for the specified staff member today
        answer_expression: {family: scalar_aggregate}
        question_input_uses:
          - {input_ref: staff, owner_kind: POPULATION_TESTS, use_id: staff_use}
          - {input_ref: today, owner_kind: POPULATION_TESTS, use_id: today_use}
        answer_subject:
          subject_text: sales
          instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
        answer_population:
          membership_tests:
            - polarity: MUST_PASS
              test_question: Is the sale by the specified staff member?
              population_use_refs: [staff_use]
            - polarity: MUST_PASS
              test_question: Is the sale today?
              population_use_refs: [today_use]
        answer_outputs:
          - description: number of sales
            role: ANSWER_VALUE
    question_input_inventory_check:
      all_input_like_phrases_declared: true
expect:
  result_contains:
    question_inputs:
      - id: staff
        kind: literal_text
        source: question_context
        text: staff_id 51515151-0000-0000-0002-000000000001
        resolved_input_ref: ""
        resolved_value_text: 51515151-0000-0000-0002-000000000001
        field_label_text: staff_id
        value_meaning_hint: staff member
        role: reference_value
      - id: today
        kind: literal_text
        source: question_context
        text: today
        resolved_input_ref: ""
        resolved_value_text: today
        field_label_text: ""
        value_meaning_hint: ""
        role: time_value
    requested_facts:
      - id: fact_1
        description: sales count for the specified staff member today
        answer_expression_family: scalar_aggregate
        answer_subject_text: sales
        input_refs: [staff, today]
        answer_request:
          answer_fact: sales count for the specified staff member today
          answer_expression:
            family: scalar_aggregate
          answer_subject:
            subject_text: sales
            instance_interpretation:
              kind: NORMAL_BUSINESS_INSTANCE
              short_label: ordinary business meaning of sales
              meaning: Answer over ordinary business instances of 'sales' as they are normally understood in business operations and reporting. Do not assume this includes every persisted representation the host API may expose for 'sales'.
          answer_population:
            counted_unit: sales
            membership_tests:
              - test_id: pop_test_1
                kind: SUBJECT_IDENTITY
                owned_question_input_refs: []
              - test_id: pop_test_2
                kind: NORMAL_INSTANCE_GUARD
                owned_question_input_refs: []
              - test_id: explicit_user_constraint_1
                kind: EXPLICIT_USER_CONSTRAINT
                owned_question_input_refs: [staff]
              - test_id: explicit_user_constraint_2
                kind: EXPLICIT_USER_CONSTRAINT
                owned_question_input_refs: [today]
  result_exact_fields:
    requested_fact_input_handoff:
      - id: fact_1
        input_refs: [staff, today]
        known_input_refs: [staff, today]
