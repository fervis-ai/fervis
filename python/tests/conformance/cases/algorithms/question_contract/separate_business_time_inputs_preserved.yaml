algorithm: question_contract.parse
input:
  question_context: How much sales today and yesterday? Show each separately.
  answer_fact: sales today and yesterday
  question_inputs:
  - input_ref: today
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: today is a time scope
    value_source_text: today
    resolved_value_text: today
