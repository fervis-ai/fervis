id: business_time_requirement_satisfied_by_input
description: Question-contract parser accepts a business-time requirement satisfied by a declared input.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_accepts_satisfied_business_time_requirement
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many shifts do we have today?
  payload:
    kind: question_contract
    answer_requests_count: 1
    answer_requests:
      - answer_fact: number of shifts today
        answer_expression: {family: scalar_aggregate}
        answer_subject:
          subject_text: shifts
          instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
        input_requirements:
          time_requirements:
            - requirement_id: time_req_1
              source_text: today
              why_required: "'today' constrains which shifts count."
        answer_population:
          population_label: shifts today
          counted_unit: shifts
          membership_tests:
            - test_id: pop_test_1
              kind: SUBJECT_IDENTITY
              polarity: MUST_PASS
              test_question: Does the row/value represent shifts?
            - test_id: pop_test_2
              kind: EXPLICIT_USER_CONSTRAINT
              polarity: MUST_PASS
              test_question: Does the shift fall within today?
        answer_outputs:
          - description: number of shifts
        input_decisions:
          - {input_ref: time_1, use_input: true}
    question_inputs:
      - input_ref: time_1
        source: question_context
        kind: time_text
        reference_text: today
        satisfies_requirement_id: time_req_1
        inventory_check: {why_this_is_an_input: today is a time scope}
    question_input_inventory_check: {all_input_like_phrases_declared: true}
expect:
  result_contains:
    requested_facts:
      - input_refs: [time_1]
        known_inputs:
          - kind: time_text
