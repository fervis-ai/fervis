id: interpreted_numeric_limit_value_with_source
description: Numeric limit values use copied source text plus canonical digit text.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_accepts_model_interpreted_limit_value_with_source
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Show top five stores
  answer_subject:
    subject_text: stores
    instance_interpretation:
      kind: NORMAL_BUSINESS_INSTANCE
  answer_expression:
    family: list_rows
    ordering: {basis: sales total, direction: descending}
    selection: {kind: take}
  answer_outputs:
  - description: sales total
    role: ANSWER_VALUE
  question_inputs:
  - input_ref: limit
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: top five is a rank limit
    value_source_text: top five
    resolved_value_text: '5'
    role: result_limit
  used_input_refs:
  - limit
expect:
  result_contains:
    question_inputs:
    - id: limit
      kind: literal_text
      source: question_context
      text: top five
      resolved_input_ref: ''
      resolved_value_text: '5'
      field_label_text: ''
      value_meaning_hint: ''
      role: result_limit
    requested_facts:
    - description: sales at ABC Mall
      answer_expression_family: list_rows
      answer_subject_text: stores
      input_refs: [limit]
      answer_request:
        answer_expression:
          family: list_rows
          ordering:
            basis: sales total
            direction: descending
          selection_kind: take
          limit_input_ref: limit
  result_exact_fields:
    requested_fact_input_handoff:
    - id: fact_1
      input_refs: [limit]
      known_input_refs: [limit]
