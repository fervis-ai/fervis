id: schema_exposes_literal_text_roles
description: Question-contract schema exposes literal_text with the immediate literal roles.
kind: algorithm
algorithm: question_contract.schema
input:
  projection: question_input_contract
expect:
  result_equals:
    question_input_kinds: [literal_text, row_set_reference]
    literal_text_role_values: [reference_value, result_limit, time_value]
    literal_text_properties:
      - field_label_text
      - input_ref
      - inventory_check
      - kind
      - occurrence
      - resolved_input_ref
      - resolved_value_text
      - role
      - source
      - value_meaning_hint
      - value_source_text
    row_set_reference_properties:
      - input_ref
      - inventory_check
      - kind
      - occurrence
      - reference_text
      - resolved_input_ref
      - source
    row_set_reference_required:
      - input_ref
      - source
      - reference_text
      - occurrence
      - resolved_input_ref
      - inventory_check
      - kind
