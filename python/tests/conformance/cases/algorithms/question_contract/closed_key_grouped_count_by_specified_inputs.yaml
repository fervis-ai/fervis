id: closed_key_grouped_count_by_specified_inputs
description: Closed-key each/per questions are one grouped aggregate keyed by the specified inputs.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many sales did staff A and staff B sell each today?
  answer_requests_count: 1
  question_inputs:
  - input_ref: staff_a
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: staff A is the first specified staff reference
    value_source_text: staff A
    resolved_value_text: staff A
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: staff_b
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: staff B is the second specified staff reference
    value_source_text: staff B
    resolved_value_text: staff B
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: today
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: today is the requested time scope
    value_source_text: today
    resolved_value_text: today
    role: time_value
  answer_requests:
  - answer_fact: sales count for each specified staff member today
    answer_expression:
      family: grouped_aggregate
      group_key:
        description: specified staff member
        domain: SPECIFIED_QUESTION_INPUTS
      selection: {kind: all_results}
    question_input_uses:
    - {input_ref: staff_a, owner_kind: GROUP_KEY}
    - {input_ref: staff_b, owner_kind: GROUP_KEY}
    - {use_id: use_today, input_ref: today, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: sales
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales by specified staff members today
      counted_unit: sale
      membership_tests:
      - question_input_use_refs: []
        test_id: subject_identity
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Is this a sale?
      - question_input_use_refs: [use_today]
        test_id: today_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this sale in the requested time scope?
    answer_outputs:
    - description: sales count
      role: ROW_COUNT
expect:
  result_contains:
    requested_facts:
    - description: sales count for each specified staff member today
      answer_expression_family: grouped_aggregate
      input_refs: [staff_a, staff_b, today]
      answer_request:
        answer_expression:
          family: grouped_aggregate
          group_key:
            description: specified staff member
            domain: SPECIFIED_QUESTION_INPUTS
            question_input_refs: [staff_a, staff_b]
          selection_kind: all_results
        answer_outputs:
        - description: sales count
          role: ROW_COUNT
        answer_population:
          membership_tests:
          - test_id: subject_identity
            owned_question_input_refs: []
          - test_id: today_scope
            owned_question_input_refs: [today]
  result_exact_fields:
    requested_fact_input_handoff:
    - id: fact_1
      input_refs: [staff_a, staff_b, today]
      known_input_refs: [staff_a, staff_b, today]
