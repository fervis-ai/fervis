id: answer_expression_family_preserved
description: Parser preserves the answer expression family selected by the question-contract turn.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_maps_answer_expression_family
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Which store had the highest sales?
  answer_expression:
    family: grouped_aggregate
    group_key:
      description: store
      domain: SOURCE_RESULT_VALUES
    ordering: {basis: total sales, direction: descending}
    selection: {kind: take_one}
expect:
  result_contains:
    requested_facts:
    - answer_expression_family: grouped_aggregate
  result_exact_fields:
    question_inputs: []
    requested_fact_input_handoff:
    - id: fact_1
      input_refs: []
      known_input_refs: []
