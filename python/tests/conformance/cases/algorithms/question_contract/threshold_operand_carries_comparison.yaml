id: threshold_operand_carries_comparison
description: A numeric population boundary is a threshold input and its fact predicate owns the ordered comparison.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many records have a measured value over 1000?
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs:
    - input_ref: boundary
      kind: literal_text
      source: question_context
      value_source_text: '1000'
      field_label_text: measured value
      operand_text: '1000'
      value_meaning_hint: numeric boundary
      role: threshold_value
      comparison_operator: gt
      inventory_check:
        why_this_is_an_input: It is the fixed boundary of the population predicate.
    answer_requests:
    - answer_fact: count of records above the supplied boundary
      answer_expression:
        family: scalar_aggregate
      question_input_uses:
      - {use_id: use_boundary, input_ref: boundary, owner_kind: POPULATION_TESTS}
      answer_subject:
        subject_text: records
        instance_interpretation:
          kind: NORMAL_BUSINESS_INSTANCE
      answer_population:
        population_label: records above the boundary
        counted_unit: records
        membership_tests:
        - test_id: subject_identity
          kind: SUBJECT_IDENTITY
          polarity: MUST_PASS
          test_question: Does the instance represent a record?
          question_input_use_refs: []
        - test_id: above_boundary
          kind: EXPLICIT_USER_CONSTRAINT
          polarity: MUST_PASS
          test_question: Is the measured value greater than the supplied boundary?
          question_input_use_refs: [use_boundary]
      answer_outputs:
      - description: record count
        role: ROW_COUNT
    question_input_inventory_check:
      all_input_like_phrases_declared: true
expect:
  result_contains:
    question_inputs:
    - id: boundary
      resolved_value_text: '1000'
      role: threshold_value
    requested_facts:
    - answer_request:
        answer_population:
          membership_tests:
          - test_id: subject_identity
          - test_id: above_boundary
            comparison_operator: gt
