id: population_predicate_operand_is_question_input
description: A concrete modifier value is a typed input owned by the population predicate, while the subject remains separate.
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How many priority jobs are there?
  payload:
    kind: question_contract
    answer_requests_count: 1
    question_inputs:
    - input_ref: priority
      kind: literal_text
      source: question_context
      value_source_text: priority
      field_label_text: priority
      operand_text: priority
      value_meaning_hint: job priority
      role: predicate_value
      inventory_check:
        why_this_is_an_input: It is the concrete operand of the population predicate.
    answer_requests:
    - answer_fact: count of priority jobs
      answer_expression:
        family: scalar_aggregate
      question_input_uses:
      - {input_ref: priority, owner_kind: POPULATION_TESTS, use_id: priority_use}
      answer_subject:
        subject_text: jobs
        instance_interpretation:
          kind: NORMAL_BUSINESS_INSTANCE
      answer_population:
        membership_tests:
        - polarity: MUST_PASS
          test_question: Does the job have the requested priority?
          population_use_refs: [priority_use]
      answer_outputs:
      - description: job count
        role: ROW_COUNT
    question_input_inventory_check:
      all_input_like_phrases_declared: true
expect:
  result_contains:
    question_inputs:
    - id: priority
      text: priority
      resolved_value_text: priority
      role: predicate_value
    requested_facts:
    - answer_subject_text: jobs
      input_refs: [priority]
