id: resolved_lookup_text_is_accepted
description: Lookup text for a pronoun reference is accepted when backed by context evidence.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_validation_accepts_typed_resolved_lookup_text
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: And how much did she make yesterday?
  question_context_texts: [amount made, Alice Smith]
  answer_fact: amount made by Alice yesterday
  answer_subject:
    subject_text: amount
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_outputs:
    - description: amount made
  question_inputs:
    - input_ref: staff
      source: question_context
      kind: named_reference_text
      reference_text: she
      target_meaning: staff member
      lookup_text: Alice Smith
      inventory_check: {why_this_is_an_input: she is a named reference}
    - input_ref: period
      source: question_context
      kind: time_text
      reference_text: yesterday
      inventory_check: {why_this_is_an_input: yesterday is a time scope}
  used_input_refs: [staff, period]
expect:
  result_contains:
    question_inputs:
      - id: staff
        text: she
        lookup_text: Alice Smith
