id: unused_inputs_are_dropped
description: Inputs not used by any answer request are removed from the parsed contract.
migrates:
  - api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_drops_inputs_unused_by_any_answer_request
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: Which staff has the highest calculated pay this month?
  answer_fact: staff with the highest calculated pay this month
  answer_subject:
    subject_text: staff
    instance_interpretation: {kind: NORMAL_BUSINESS_INSTANCE}
  answer_outputs:
    - description: staff with the highest calculated pay
    - description: calculated pay
  question_inputs:
    - input_ref: period
      source: question_context
      kind: time_text
      reference_text: this month
      inventory_check: {why_this_is_an_input: this month is a time scope}
    - input_ref: ranking
      source: question_context
      kind: time_text
      reference_text: highest
      inventory_check: {why_this_is_an_input: highest is a ranking phrase}
  used_input_refs: [period]
expect:
  result_contains:
    question_inputs:
      - id: period
        kind: time_text
        text: this month
    requested_facts:
      - input_refs: [period]
