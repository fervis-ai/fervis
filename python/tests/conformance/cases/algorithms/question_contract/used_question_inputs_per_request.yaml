id: used_question_inputs_per_request
description: Each answer request lists only the question inputs it uses.
migrates:
- api/tests/fervis/lookup/question_contract/test_canonicalization.py::test_question_contract_parser_accepts_positive_used_question_inputs
kind: algorithm
algorithm: question_contract.parse
input:
  question_context: How much was Alice's total sales amount yesterday, and where did Alice work yesterday?
  answer_requests_count: 2
  question_inputs:
  - input_ref: staff
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: Alice is a named reference
    value_source_text: Alice
    resolved_value_text: Alice
    value_meaning_hint: staff member
    role: reference_value
  - input_ref: period
    source: question_context
    kind: literal_text
    inventory_check:
      why_this_is_an_input: yesterday is a time scope
    value_source_text: yesterday
    resolved_value_text: yesterday
    role: time_value
  answer_requests:
  - answer_fact: Alice's total sales amount yesterday
    answer_expression:
      family: scalar_aggregate
    question_input_uses:
    - {use_id: use_staff, input_ref: staff, owner_kind: POPULATION_TESTS}
    - {use_id: use_period, input_ref: period, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: sales amount
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: sales amount
      counted_unit: sales amount
      membership_tests:
      - question_input_use_refs: []
        test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent sales amount?
      - question_input_use_refs: [use_staff]
        test_id: staff_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Does the sales amount belong to Alice?
      - question_input_use_refs: [use_period]
        test_id: period_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is the sales amount from yesterday?
    answer_outputs:
    - description: total sales amount
      role: ANSWER_VALUE
  - answer_fact: where Alice worked yesterday
    answer_expression:
      family: scalar_value
    question_input_uses:
    - {use_id: use_staff, input_ref: staff, owner_kind: POPULATION_TESTS}
    - {use_id: use_period, input_ref: period, owner_kind: POPULATION_TESTS}
    answer_subject:
      subject_text: work location
      instance_interpretation:
        kind: NORMAL_BUSINESS_INSTANCE
    answer_population:
      population_label: work location
      counted_unit: work location
      membership_tests:
      - question_input_use_refs: []
        test_id: pop_test_1
        kind: SUBJECT_IDENTITY
        polarity: MUST_PASS
        test_question: Does the row/value represent a work location?
      - question_input_use_refs: [use_staff]
        test_id: staff_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this Alice's work location?
      - question_input_use_refs: [use_period]
        test_id: period_scope
        kind: EXPLICIT_USER_CONSTRAINT
        polarity: MUST_PASS
        test_question: Is this the work location from yesterday?
    answer_outputs:
    - description: work location
      role: ANSWER_VALUE
expect:
  result_contains:
    requested_facts:
    - input_refs:
      - staff
      - period
    - input_refs:
      - staff
      - period
  result_exact_fields:
    question_inputs:
    - id: staff
      kind: literal_text
      source: question_context
      text: Alice
      resolved_input_ref: ''
      resolved_value_text: Alice
      field_label_text: ''
      value_meaning_hint: staff member
      role: reference_value
    - id: period
      kind: literal_text
      source: question_context
      text: yesterday
      resolved_input_ref: ''
      resolved_value_text: yesterday
      field_label_text: ''
      value_meaning_hint: ''
      role: time_value
    requested_fact_input_handoff:
    - id: fact_1
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
    - id: fact_2
      input_refs:
      - staff
      - period
      known_input_refs:
      - staff
      - period
