id: grouped_aggregate_choices_preserve_executable_group_keys
description: Grouped/ranked planning preserves the executable source-binding selected group key instead of narrowing to the source row primary identity.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_grouped_aggregate_choices_use_single_identity_group_candidates
kind: algorithm
algorithm: planning.grouped_aggregate_choices
input:
  requested_fact_id: fact_1
  plan_shape: aggregate_by_group
  source:
    id: sb_1
    requested_fact_id: fact_1
    read_id: list_sale_list
    fields:
      - field_id: sale_id
        type: uuid
        row_cardinality: many
      - field_id: staff_id
        type: uuid
        row_cardinality: many
      - field_id: staff_name
        type: string
        row_cardinality: many
      - field_id: sold_at
        type: datetime
        row_cardinality: many
      - field_id: status
        type: string
        row_cardinality: many
      - field_id: sale_type
        type: choice
        row_cardinality: many
      - field_id: amount
        type: decimal
        row_cardinality: many
    evidence:
      - {evidence_id: source_1.data.sale_id, field_id: sale_id, row_cardinality: many}
      - {evidence_id: source_1.data.staff_id, field_id: staff_id, row_cardinality: many}
      - {evidence_id: source_1.data.staff_name, field_id: staff_name, row_cardinality: many}
      - {evidence_id: source_1.data.sold_at, field_id: sold_at, row_cardinality: many}
      - {evidence_id: source_1.data.status, field_id: status, row_cardinality: many}
      - {evidence_id: source_1.data.sale_type, field_id: sale_type, row_cardinality: many}
      - {evidence_id: source_1.data.amount, field_id: amount, row_cardinality: many}
    fulfillments:
      - answer_output_id: answer_1
        entity_evidence:
          type: entity_reference
          reference_id: staff_reference
          target_key_id: staff_primary
          target_entity_kind: staff
          components:
            - {component_id: staff_id, field_evidence_id: source_1.data.staff_id, field_id: staff_id}
        metric_measure_evidence_ids:
          - source_1.data.amount
expect:
  result_contains:
    group_field_ids:
      - staff_id
    metric_field_ids: [amount]
    metric_allowed_functions:
      aggregate_field: [sum, min, max, avg]
