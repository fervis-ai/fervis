id: grouped_aggregate_choices_exclude_display_fields
description: Grouped/ranked planning uses the source-binding selected canonical group key instead of re-exposing display labels.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_grouped_aggregate_choices_do_not_include_display_fields_as_group_candidates
kind: algorithm
algorithm: planning.grouped_aggregate_choices
input:
  requested_fact_id: fact_1
  plan_shape: aggregate_by_group
  source:
    id: sb_1
    requested_fact_id: fact_1
    read_id: list_shift_compensation_list
    cardinality: many
    fields:
      - field_id: location_id
        type: uuid
        roles: [identity]
      - field_id: location_name
        type: string
      - field_id: calculated_pay
        type: decimal
    evidence:
      - {evidence_id: source_1.data.location_id, field_id: location_id, row_cardinality: many}
      - {evidence_id: source_1.data.location_name, field_id: location_name, row_cardinality: many}
      - {evidence_id: source_1.data.calculated_pay, field_id: calculated_pay, row_cardinality: many}
    fulfillments:
      - answer_output_id: answer_1
        entity_evidence:
          type: entity_reference
          reference_id: location_reference
          target_key_id: location_primary
          target_entity_kind: location
          components:
            - {component_id: location_id, field_evidence_id: source_1.data.location_id, field_id: location_id}
        metric_measure_evidence_ids:
          - source_1.data.calculated_pay
expect:
  result_contains:
    group_field_ids: [location_id]
    metric_field_ids: [calculated_pay]
