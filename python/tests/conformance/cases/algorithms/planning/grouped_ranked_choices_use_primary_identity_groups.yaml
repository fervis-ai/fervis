id: grouped_ranked_choices_use_primary_identity_groups
description: Grouped/ranked planning offers primary identity fields as group candidates and excludes display labels.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_grouped_ranked_choices_use_single_identity_group_candidates
kind: algorithm
algorithm: planning.grouped_ranked_choices
input:
  requested_fact_id: fact_1
  plan_shape: ranked_aggregate
  source:
    id: sb_1
    requested_fact_id: fact_1
    read_id: list_shift_compensation_list
    fields:
      - field_id: shift_compensation_id
        type: uuid
        row_cardinality: many
        identity: {entity_ref: shift_compensation, identity_field: shift_compensation_id, primary_key: true, stable: true}
      - field_id: shift_record_id
        type: uuid
        row_cardinality: many
        identity: {entity_ref: shift_record, identity_field: shift_record_id, primary_key: true, stable: true}
      - field_id: staff_id
        type: uuid
        row_cardinality: many
        identity: {entity_ref: staff, identity_field: staff_id, primary_key: true, stable: true}
      - field_id: staff_name
        type: string
        row_cardinality: many
      - field_id: location_id
        type: uuid
        row_cardinality: many
        identity: {entity_ref: location, identity_field: location_id, primary_key: true, stable: true}
      - field_id: location_name
        type: string
        row_cardinality: many
      - field_id: calculated_pay
        type: decimal
        row_cardinality: many
    evidence:
      - {evidence_id: source_1.data.shift_compensation_id, field_id: shift_compensation_id, row_cardinality: many}
      - {evidence_id: source_1.data.shift_record_id, field_id: shift_record_id, row_cardinality: many}
      - {evidence_id: source_1.data.staff_id, field_id: staff_id, row_cardinality: many}
      - {evidence_id: source_1.data.staff_name, field_id: staff_name, row_cardinality: many}
      - {evidence_id: source_1.data.location_id, field_id: location_id, row_cardinality: many}
      - {evidence_id: source_1.data.location_name, field_id: location_name, row_cardinality: many}
      - {evidence_id: source_1.data.calculated_pay, field_id: calculated_pay, row_cardinality: many}
    fulfillments:
      - answer_output_id: answer_1
        group_key_evidence_ids:
          - source_1.data.shift_compensation_id
          - source_1.data.shift_record_id
          - source_1.data.staff_id
          - source_1.data.staff_name
          - source_1.data.location_id
          - source_1.data.location_name
        metric_measure_evidence_ids:
          - source_1.data.calculated_pay
expect:
  result_contains:
    group_field_ids:
      - location_id
      - shift_compensation_id
      - shift_record_id
      - staff_id
    metric_field_ids: [calculated_pay]
    metric_allowed_functions:
      aggregate_field: [sum, min, max, avg]
