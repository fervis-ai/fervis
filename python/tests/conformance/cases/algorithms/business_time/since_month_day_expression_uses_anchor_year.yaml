id: since_month_day_expression_uses_anchor_year
description: Owned since month/day expression resolves from that date in the anchor year.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolver_parses_common_business_time_expressions
kind: algorithm
algorithm: business_time.resolve
input:
  expression: since Jan 13th
  anchor_date: "2026-04-11"
expect:
  result_contains:
    status: resolved
    start: "2026-01-13"
    end: "2026-04-11"
