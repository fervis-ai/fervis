id: relative_offset_requires_integer_value
description: Relative offsets fail closed when numeric values are strings.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_business_time_requires_integer_intent_numbers
kind: algorithm
algorithm: business_time.resolve
input:
  expression: today
  anchor_date: "2026-05-06"
  intent:
    kind: point
    precision: day
    relative:
      unit: day
      offset: "0"
expect:
  error_contains: offset requires integer value
