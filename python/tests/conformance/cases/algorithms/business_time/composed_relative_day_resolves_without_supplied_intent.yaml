id: composed_relative_day_resolves_without_supplied_intent
description: Owned composed relative day expression resolves without a model-authored intent.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolver_parses_composed_relative_day_expression_without_model_authored_intent
kind: algorithm
algorithm: business_time.resolve
input:
  expression: the day before yesterday
  anchor_date: "2026-04-11"
expect:
  result_contains:
    status: resolved
    start: "2026-04-09"
    end: "2026-04-09"
