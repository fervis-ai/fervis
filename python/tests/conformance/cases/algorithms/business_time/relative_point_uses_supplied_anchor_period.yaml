id: relative_point_uses_supplied_anchor_period
description: Local relative point intent uses the supplied anchor period.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_point_relative_uses_anchor_period
kind: algorithm
algorithm: business_time.resolve
input:
  expression: the previous day
  anchor_date: "2026-04-11"
  intent:
    kind: point
    precision: day
    relative:
      unit: day
      offset: -1
    anchor_period:
      unit: day
      start_date: "2026-03-26"
      end_date: "2026-03-26"
expect:
  result_contains:
    status: resolved
    start: "2026-03-25"
    end: "2026-03-25"
