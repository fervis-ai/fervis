id: q1_expression_resolves_full_quarter
description: Owned expression Q1 with a year resolves to the full quarter.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolver_parses_common_business_time_expressions
kind: algorithm
algorithm: business_time.resolve
input:
  expression: Q1 2026
  anchor_date: "2026-04-11"
expect:
  result_contains:
    status: resolved
    start: "2026-01-01"
    end: "2026-03-31"
