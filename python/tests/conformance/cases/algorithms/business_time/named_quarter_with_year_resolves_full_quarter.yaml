id: named_quarter_with_year_resolves_full_quarter
description: Named quarter period with a year resolves to that full quarter.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_period_named_quarter_abbreviation_intent
kind: algorithm
algorithm: business_time.resolve
input:
  expression: Q1 2026
  anchor_date: "2026-04-11"
  intent:
    kind: period
    unit: quarter
    named:
      value: 1
      year: 2026
    mode: full
expect:
  result_contains:
    status: resolved
    start: "2026-01-01"
    end: "2026-03-31"
