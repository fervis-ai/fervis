id: future_week_window_resolves_inclusive_window
description: Future week windows include the anchor day and requested future range.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_window_future_weeks
kind: algorithm
algorithm: business_time.resolve
input:
  anchor_date: "2026-04-11"
  intent:
    kind: window
    unit: week
    count: 2
    direction: future
expect:
  result_contains:
    status: resolved
    start: "2026-04-11"
    end: "2026-04-24"
