id: past_day_window_resolves_inclusive_window
description: Past day windows include the anchor day and the requested count.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_window_past_days
kind: algorithm
algorithm: business_time.resolve
input:
  anchor_date: "2026-04-11"
  intent:
    kind: window
    unit: day
    count: 7
    direction: past
expect:
  result_contains:
    status: resolved
    start: "2026-04-05"
    end: "2026-04-11"
