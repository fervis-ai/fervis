id: april_eighth_expression_resolves_exact_day
description: Owned explicit date expression resolves to that day.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolver_parses_common_business_time_expressions
kind: algorithm
algorithm: business_time.resolve
input:
  expression: April 8, 2026
  anchor_date: "2026-04-11"
expect:
  result_contains:
    status: resolved
    start: "2026-04-08"
    end: "2026-04-08"
