id: month_to_date_ends_at_anchor_day
description: To-date period mode clips the period end to the anchor day.
migrates:
  - api/tests/fervis/business_time/test_resolver.py::test_resolve_period_to_date
kind: algorithm
algorithm: business_time.resolve
input:
  anchor_date: "2026-04-11"
  intent:
    kind: period
    unit: month
    relative:
      offset: 0
    mode: to_date
expect:
  result_contains:
    status: resolved
    start: "2026-04-01"
    end: "2026-04-11"
