id: collection_param_uses_single_invocation
description: Identity-set bindings use one collection arg when the catalog declares collection support.
migrates:
  - api/tests/fervis/lookup/plan_execution/test_memory_identity_set_compilation.py::test_identity_set_binding_compiles_to_single_list_param_when_supported
kind: algorithm
algorithm: execution.identity_set_binding
input:
  param_type: array
  identity_values: [store_1, store_2]
  responses:
    - param_value: [store_1, store_2]
      body:
        results:
          - {sale_id: sale_1, store_id: store_1}
          - {sale_id: sale_2, store_id: store_2}
expect:
  result_contains:
    request_param_values:
      - [store_1, store_2]
    sale_ids: [sale_1, sale_2]
