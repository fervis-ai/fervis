id: out_of_bounds_quarter_intent_fails_validation
description: Time value validation rejects quarter values outside the calendar range.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_time_value_contract_rejects_out_of_bounds_calendar_intents
kind: algorithm
algorithm: planning.value_contract
input:
  values:
    - id: time_value
      kind: time
      expression: time
      intent:
        kind: period
        unit: quarter
        mode: full
        named: {value: 5}
expect:
  result_contains:
    status: rejected
