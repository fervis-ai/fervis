id: out_of_bounds_weekday_intent_fails_validation
description: Time value validation rejects weekday values outside the calendar range.
migrates:
  - api/tests/fervis/lookup/fact_planning/test_values.py::test_time_value_contract_rejects_out_of_bounds_calendar_intents
kind: algorithm
algorithm: planning.value_contract
input:
  values:
    - id: time_value
      kind: time
      expression: time
      resolved_start: "2026-01-01"
      resolved_end: "2026-01-01"
      granularity: day
      intent:
        kind: point
        precision: day
        named: {weekday: 9}
expect:
  result_contains:
    status: rejected
