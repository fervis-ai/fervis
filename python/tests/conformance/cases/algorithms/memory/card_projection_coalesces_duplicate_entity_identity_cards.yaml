id: card_projection_coalesces_duplicate_entity_identity_cards
description: Duplicate entity identity cards coalesce to one visible card while preserving durable private aliases.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_memory_card_projection_coalesces_duplicate_entity_identity_cards
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: How much did she make yesterday?
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: answered
        sourceQuestion: Which products did Staff One sell today?
        sourceAnswer: Staff One answer.
        provenance:
          question_contract:
            question_inputs: []
            answer_requests:
              - id: fact_1
                answer_fact: Which products did Staff One sell today?
                answer_outputs:
                  - id: answer_1
                    description: answer
                    role: ANSWER_VALUE
                used_question_inputs: []
        addresses:
          - address: entity.staff_1
            kind: entity
            resource: staff
            keyId: primary_key
            referenceText: Staff One
            identity: {staff_key: staff-1}
          - address: relation.answer_rows
            kind: relation
            source: {kind: api_read, read_id: staff_sales_read}
            grainKeys: [sale_key]
            fieldCoverage: {sale_key: answer_rows.sale_key}
            completeness: {status: complete, pagination: all_pages}
            rowAddresses: [row.answer_1]
          - address: row.answer_1
            kind: row
            relation: relation.answer_rows
            identity: {sale_key: turn_1-sale}
      - artifactId: turn_2
        outcome: answered
        sourceQuestion: How much is that in total sales?
        sourceAnswer: Staff One answer.
        provenance:
          question_contract:
            question_inputs: []
            answer_requests:
              - id: fact_1
                answer_fact: How much is that in total sales?
                answer_outputs:
                  - id: answer_1
                    description: answer
                    role: ANSWER_VALUE
                used_question_inputs: []
        addresses:
          - address: entity.staff_1
            kind: entity
            resource: staff
            keyId: primary_key
            referenceText: Staff One
            identity: {staff_key: staff-1}
          - address: relation.answer_rows
            kind: relation
            source: {kind: api_read, read_id: sales_total_read}
            grainKeys: [sale_key]
            fieldCoverage: {sale_key: answer_rows.sale_key}
            completeness: {status: complete, pagination: all_pages}
            rowAddresses: [row.answer_1]
          - address: row.answer_1
            kind: row
            relation: relation.answer_rows
            identity: {sale_key: turn_2-sale}
expect:
  result_contains:
    cards:
      - kind: prior_answer_request
      - kind: entity_identity
        display: Staff One
        memory_id: turn_2.entity.staff_1
    private_cards:
      turn_1.entity.staff_1:
        kind: entity_identity
      turn_2.entity.staff_1:
        kind: entity_identity
