id: lineage_memory_artifacts_reject_payload_id_mismatch
description: Memory artifact reads fail closed when row id and payload artifactId diverge.
kind: algorithm
algorithm: memory.lineage_memory_artifacts
input:
  selected_run_ids: [run_1]
  memory_artifacts:
    - memory_artifact_id: mem_row_id
      run_id: run_1
      produced_by_step_id: step_execute
      source_kind: fact_result
      fact_result_id: fact_result_1
      payload_schema: fervis.memory_artifact
      payload_schema_rev: 1
      payload_json:
        artifactId: mem_payload_id
        sourceKind: fact_result
        outcome: answered
        addresses:
          - address: value.answer_1
            kind: value
            value:
              type: number
              value: "1"
expect:
  result_contains:
    status: rejected
