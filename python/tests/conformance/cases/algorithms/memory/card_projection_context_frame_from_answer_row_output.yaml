id: card_projection_context_frame_from_answer_row_output
description: Prior answer-output frames can project context frames from answer rows without scalar addresses.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_prior_answer_output_frame_projects_context_frame_without_scalar_address
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: And how much did she make yesterday?
  conversation_context:
    factArtifacts:
      - artifactId: turn_total_sales_from_rows
        outcome: answered
        sourceQuestion: How much is that in total sales?
        sourceAnswer: "2468.00"
        provenance:
          question_contract:
            question_inputs: []
            answer_requests:
              - id: fact_1
                answer_fact: total sales for the referenced products
                answer_outputs:
                  - id: answer_output_1
                    description: total sales amount
                used_question_inputs: []
        addresses:
          - address: relation.answer_rows
            kind: relation
            source: {kind: operation_output}
            grainKeys: [sale_id]
            fieldCoverage: {amount: answer_rows.amount}
            completeness: {status: complete, pagination: all_pages}
            rowAddresses: [row.answer_1]
          - address: row.answer_1
            kind: row
            relation: relation.answer_rows
            identity: {sale_id: sale_1}
            values:
              amount: {type: decimal, value: "2468.00", answer_output_ids: [answer_output_1]}
expect:
  result_contains:
    context_frames:
      - requested_frame: total sales amount
        prior_answer_fact: total sales for the referenced products
