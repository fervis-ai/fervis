id: card_projection_exposes_ordered_prior_answer_items
description: Ordered prior answer-row items are exposed in context source text.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_memory_projection_exposes_ordered_prior_answer_items_from_answer_rows
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: Tell me about the last product's sales this month.
  conversation_context:
    factArtifacts:
      - artifactId: turn_products
        outcome: answered
        sourceQuestion: What are the top selling products this week?
        sourceAnswer: The top selling products this week are Alpha, Beta, and Cinder.
        provenance:
          question_contract:
            question_inputs: []
            answer_requests:
              - id: fact_1
                answer_fact: top selling products this week
                answer_outputs:
                  - id: answer_1
                    description: product name
                used_question_inputs: []
        addresses:
          - address: relation.answer_rows
            kind: relation
            source: {kind: operation_output}
            grainKeys: [product_id]
            fieldCoverage: {product_name: answer_rows.product_name}
            completeness: {status: complete, pagination: all_pages}
            rowAddresses: [row.answer_1, row.answer_2, row.answer_3]
          - address: row.answer_1
            kind: row
            relation: relation.answer_rows
            identity: {product_id: prod-1}
            values:
              product_name: {type: string, value: Alpha, answer_output_ids: [answer_1]}
          - address: row.answer_2
            kind: row
            relation: relation.answer_rows
            identity: {product_id: prod-2}
            values:
              product_name: {type: string, value: Beta, answer_output_ids: [answer_1]}
          - address: row.answer_3
            kind: row
            relation: relation.answer_rows
            identity: {product_id: prod-3}
            values:
              product_name: {type: string, value: Cinder, answer_output_ids: [answer_1]}
expect:
  result_contains:
    context_sources:
      - kind: prior_user_question
      - kind: prior_fervis_answer
        text: The top selling products this week are Alpha, Beta, and Cinder.
