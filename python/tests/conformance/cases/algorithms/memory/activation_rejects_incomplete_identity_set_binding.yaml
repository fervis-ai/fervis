id: activation_rejects_incomplete_identity_set_binding
description: Incomplete relation pagination cannot be activated as an identity-set binding.
migrates:
  - api/tests/fervis/memory/test_activation.py::test_activation_accepts_identity_set_binding_only_for_complete_relation
kind: algorithm
algorithm: memory.activate
input:
  conversation_context:
    factArtifacts:
      - artifactId: turn_2
        outcome: answered
        addresses:
          - address: relation.sales
            kind: relation
            source: {kind: api_read}
            completeness: {status: complete, pagination: truncated}
  requests:
    - id: current.sales
      from_artifact_id: turn_2
      from_address: relation.sales
      use_as: identity_set_binding
      target_binding_id: sales
expect:
  result_contains:
    status: rejected

