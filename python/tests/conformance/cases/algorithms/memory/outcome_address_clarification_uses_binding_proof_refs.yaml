id: outcome_address_clarification_uses_binding_proof_refs
kind: algorithm
algorithm: memory.outcome_address
migrates:
  - api/tests/fervis/interfaces/django_interface/test_conversation_memory.py::test_fact_result_terminal_projection_preserves_binding_proof_refs
input:
  fact_result:
    outcome:
      kind: needs_clarification
      clarifications:
        - id: which_staff
          requestedFactId: rf_staff
          need: target_reference
          reason: multiple_matching_entities
          question: Which matching staff member should I use?
          subjects:
            - kind: question_input
              id: staff_name
              label: staff member
              sourceText: Alice
              options:
                - {id: staff:1, label: Staff 1}
                - {id: staff:2, label: Staff 2}
          evidence:
            - {kind: known_input, id: known_input:staff_name}
            - {kind: proof_ref, id: resolve:alice}
expect:
  result_contains:
    address:
      evidence:
        stepIds: [known_input:staff_name, resolve:alice]
