id: activated_memory_expands_entity_identity
description: Selected entity memory cards expand to canonical entity identity.
migrates:
  - api/tests/fervis/memory/test_activated_memory.py::test_activated_memory_expands_entity_identity_from_used_memory_id
kind: algorithm
algorithm: conversation_memory.expand_activated
input:
  current_question: What about Jane Doe?
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: answered
        addresses:
          - address: entity.staff.jane
            kind: entity
            resource: staff
            keyId: primary_key
            referenceText: Jane Doe
            identity: {staff_key: staff-1}
  used_memory_ids: [turn_1.entity.staff.jane]
expect:
  result_contains:
    activatedMemory:
      turn_1.entity.staff.jane:
        kind: entity_identity
        entity_key:
          entity_kind: staff
          key_id: primary_key
          components: {staff_key: staff-1}
