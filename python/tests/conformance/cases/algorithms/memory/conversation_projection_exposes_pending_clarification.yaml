id: conversation_projection_exposes_pending_clarification
description: Pending clarification memory exposes only the clarification contract needed by planning.
migrates:
  - api/tests/fervis/memory/test_fact_memory.py::test_memory_index_exposes_pending_clarification_contract_only
kind: algorithm
algorithm: memory.project_conversation
input:
  conversation_context:
    factArtifacts:
      - artifactId: turn_clarify
        outcome: needs_clarification
        sourceQuestion: How much did that store make yesterday?
        addresses:
          - address: outcome.needs_clarification
            kind: outcome
            terminal: needs_clarification
            clarificationQuestions: ["Which store do you mean?"]
expect:
  result_contains:
    prompt_context:
      memoryIndex:
        items:
          - artifactId: turn_clarify
            address: outcome.needs_clarification
            kind: outcome
            terminal: needs_clarification
            clarificationQuestions: ["Which store do you mean?"]
            sourceQuestion: How much did that store make yesterday?
