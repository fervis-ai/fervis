id: card_projection_active_clarification_ranks_first
description: Active clarification cards rank before ordinary recent answer cards.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_memory_card_projection_ranks_active_clarification_before_recent_cards
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: Westlands
  conversation_context:
    factArtifacts:
      - artifactId: turn_recent
        outcome: answered
        sourceQuestion: How much money did we make yesterday?
        sourceAnswer: We made 100.
        provenance:
          question_contract:
            answer_requests:
              - id: fact_1
                answer_fact: money we made yesterday
                answer_outputs:
                  - description: total sales amount
                    requested_value_frame: total sales amount
        addresses:
          - address: value.total
            kind: value
            value: {type: decimal, value: "100.00"}
      - artifactId: turn_clarification
        outcome: needs_clarification
        addresses:
          - address: outcome.clarification
            kind: outcome
            terminal: needs_clarification
            clarificationQuestions: ["Which branch?"]
expect:
  result_contains:
    card_kinds: [clarification_answer]

