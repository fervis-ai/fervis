id: card_projection_preserves_result_limit_slot_bindings
description: Prior answer request cards preserve result-limit slot bindings with source lineage.
migrates:
- api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_prior_answer_request_card_preserves_number_and_limit_slot_bindings
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: What about yesterday?
  conversation_context:
    factArtifacts:
    - artifactId: turn_top_products
      outcome: answered
      sourceQuestion: What are the top 5 products Staff One sold?
      sourceAnswer: Five products.
      provenance:
        question_contract:
          question_inputs:
          - id: fact_1_limit_1
            kind: literal_text
            source: question_context
            text: top 5
            resolved_value_text: '5'
            role: result_limit
          answer_requests:
          - id: fact_1
            answer_fact: top 5 products Staff One sold
            answer_outputs:
            - id: answer_1
              description: product names
              role: ANSWER_VALUE
            used_question_inputs: [fact_1_limit_1]
      addresses:
      - address: value.grounded_fact_1_limit_1
        kind: value
        value:
          type: integer
          value: 5
        display: top 5
        evidence:
          stepIds:
          - known_input:fact_1_limit_1
expect:
  result_contains:
    cards:
    - kind: prior_answer_request
      details:
        prior_slot_bindings:
          fact_1_limit_1:
            value_kind: limit
            value: 5
            display: top 5
            source_lineage:
            - turn_top_products.value.grounded_fact_1_limit_1
