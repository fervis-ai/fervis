id: activation_accepts_complete_identity_set_binding
description: Complete relation addresses can be activated as identity-set bindings.
migrates:
  - api/tests/fervis/memory/test_activation.py::test_activation_accepts_identity_set_binding_only_for_complete_relation
kind: algorithm
algorithm: memory.activate
input:
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: answered
        addresses:
          - address: relation.sales
            kind: relation
            source: {kind: api_read}
            completeness: {status: complete, pagination: terminal}
  requests:
    - id: current.sales
      from_artifact_id: turn_1
      from_address: relation.sales
      use_as: identity_set_binding
      target_binding_id: sales
expect:
  result_contains:
    activated:
      activatedInputs:
        - id: current.sales
          useAs: identity_set_binding

