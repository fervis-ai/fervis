id: activated_memory_expands_clarification_answer
description: Selected clarification-answer memory cards expand to clarification activation payloads.
migrates:
  - api/tests/fervis/memory/test_activated_memory.py::test_activated_memory_expands_clarification_answer_from_used_memory_id
kind: algorithm
algorithm: conversation_memory.expand_activated
input:
  current_question: Which store?
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: needs_clarification
        sourceQuestion: How much sales did we make yesterday?
        addresses:
          - address: outcome.needs_clarification
            kind: outcome
            terminal: needs_clarification
            clarificationQuestions: ["Which store do you mean?"]
  used_memory_ids: [turn_1.outcome.needs_clarification]
expect:
  result_contains:
    activatedMemory:
      turn_1.outcome.needs_clarification:
        kind: clarification_answer
        clarification_chain_id: turn_1
        clarification_question: Which store do you mean?
        pending_integrated_question: How much sales did we make yesterday?
        activation_fact_refs: [outcome.needs_clarification]
