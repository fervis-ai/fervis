        question_contract:
          answer_requests:
          - id: fact_1
            answer_fact: total sales for products Staff One sold today
            answer_outputs:
            - description: answer
              requested_value_frame: answer
            known_inputs:
            - id: fact_1_entity_1
              kind: literal_text
              source: question_context
              text: Staff One
              resolved_value_text: Staff One
