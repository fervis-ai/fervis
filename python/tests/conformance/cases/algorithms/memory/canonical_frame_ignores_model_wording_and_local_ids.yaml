id: canonical_frame_ignores_model_wording_and_local_ids
description: Equivalent typed prior requests produce one canonical frame control shape despite model wording and local identifier variation.
kind: algorithm
algorithm: conversation_memory.frame_equivalence
input:
  current_question: What about the previous day?
  conversation_contexts:
    - factArtifacts:
        - artifactId: setup_a
          outcome: answered
          sourceQuestion: How many sales did we make today?
          sourceAnswer: "10"
          provenance:
            question_contract:
              question_inputs:
                - {id: q1, kind: literal_text, role: time_value, text: today, resolved_value_text: today}
              answer_requests:
                - id: fact_1
                  answer_fact: sales made today
                  answer_expression: {family: scalar_aggregate}
                  answer_subject: {subject_text: sales}
                  answer_population:
                    population_label: sales made today
                    counted_unit: sale
                    membership_tests:
                      - {test_id: subject, kind: SUBJECT_IDENTITY, polarity: MUST_PASS, test_question: "Is this a sale?", owned_question_input_refs: []}
                      - {test_id: normal_instance_guard, kind: NORMAL_INSTANCE_GUARD, polarity: MUST_PASS, test_question: "Is this an ordinary sale?", owned_question_input_refs: []}
                  answer_outputs:
                    - {id: answer_1, description: count of sales, role: ROW_COUNT}
                  used_question_inputs: [q1]
          addresses:
            - address: value.time
              kind: value
              value: {type: time_scope, value: today, expression: today, resolvedStart: "2026-07-10", resolvedEnd: "2026-07-10", granularity: day}
              evidence: {stepIds: [known_input:q1]}
    - factArtifacts:
        - artifactId: setup_b
          outcome: answered
          sourceQuestion: How many sales did we make today?
          sourceAnswer: "10"
          provenance:
            question_contract:
              question_inputs:
                - {id: time_today, kind: literal_text, role: time_value, text: today, resolved_value_text: today}
              answer_requests:
                - id: request_sales
                  answer_fact: sales count for today
                  answer_expression: {family: scalar_aggregate}
                  answer_subject: {subject_text: sales}
                  answer_population:
                    population_label: today's sales
                    counted_unit: sale
                    membership_tests:
                      - {test_id: sale_identity, kind: SUBJECT_IDENTITY, polarity: MUST_PASS, test_question: "Does this represent a sale?", owned_question_input_refs: []}
                      - {test_id: normal_instance_guard_sales, kind: NORMAL_INSTANCE_GUARD, polarity: MUST_PASS, test_question: "Is this an ordinary sale?", owned_question_input_refs: []}
                  answer_outputs:
                    - {id: sales_total, description: count of sales made today, role: ROW_COUNT}
                  used_question_inputs: [time_today]
          addresses:
            - address: value.time
              kind: value
              value: {type: time_scope, value: today, expression: today, resolvedStart: "2026-07-10", resolvedEnd: "2026-07-10", granularity: day}
              evidence: {stepIds: [known_input:time_today]}
expect:
  result_equals:
    control_frames:
      - &canonical_frame
        - answer_shape:
            expression_family: scalar_aggregate
            output_roles: [ROW_COUNT]
          parts:
            - {part_id: subject, kind: answer_subject}
            - {part_id: "output:1", kind: answer_output}
            - {part_id: "input:time_scope:1", kind: time_scope}
            - {part_id: "population:normal_instance_guard:1", kind: population_constraint}
      - *canonical_frame
