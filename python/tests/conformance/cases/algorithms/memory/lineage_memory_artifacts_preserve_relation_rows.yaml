id: lineage_memory_artifacts_preserve_relation_rows
description: Persisted memory artifacts preserve relation and row addresses exactly as written at result synthesis.
kind: algorithm
algorithm: memory.lineage_memory_artifacts
input:
  selected_run_ids: [run_1]
  memory_artifacts:
    - memory_artifact_id: mem_run_1_fact_result_1
      run_id: run_1
      source_kind: fact_result
      payload_schema: fervis.memory_artifact
      payload_schema_rev: 1
      payload_json:
        artifactId: mem_run_1_fact_result_1
        sourceKind: fact_result
        outcome: answered
        sourceQuestion: Which staff earned the most this month?
        sourceAnswer: "Alice: 1200.00"
        addresses:
          - address: relation.answer_rows
            kind: relation
            source:
              kind: operation_output
              relationId: answer_rows
            grainKeys:
              - staff_id
            fieldCoverage:
              staff_id: answer_rows.staff_id
              total_pay: answer_rows.total_pay
            completeness:
              status: complete
              rowCount: 1
              setKind: derived
              pagination: terminal
            rowAddresses:
              - row.answer_rows.1
          - address: row.answer_rows.1
            kind: row
            relation: relation.answer_rows
            grain:
              staff_id: staff_9393
            identity:
              staff_id: staff_9393
            values:
              staff_id:
                type: string
                value: staff_9393
                answer_output_ids:
                  - answer_1
              total_pay:
                type: decimal
                value: "1200.00"
                answer_output_ids:
                  - answer_2
expect:
  result_contains:
    artifacts:
      - artifactId: mem_run_1_fact_result_1
        outcome: answered
        addresses:
          - address: relation.answer_rows
            kind: relation
            rowAddresses:
              - row.answer_rows.1
          - address: row.answer_rows.1
            kind: row
            identity:
              staff_id: staff_9393
