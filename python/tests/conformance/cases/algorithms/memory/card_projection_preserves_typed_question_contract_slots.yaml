id: card_projection_preserves_typed_question_contract_slots
description: Prior answer request cards preserve typed entity and time slots with bindings.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_prior_answer_request_card_preserves_typed_question_contract_slots
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: How about today?
  conversation_context:
    factArtifacts:
      - artifactId: turn_sales
        outcome: answered
        sourceQuestion: How much did Staff One sell yesterday?
        sourceAnswer: Staff One sold 100 yesterday.
        provenance:
          question_contract:
            question_inputs:
              - id: fact_1_entity_1
                kind: literal_text
                role: reference_value
                source: question_context
                text: Staff One
                resolved_value_text: Staff One
                value_meaning_hint: staff member
              - id: fact_1_time_1
                kind: literal_text
                role: time_value
                source: question_context
                text: yesterday
                resolved_value_text: yesterday
            answer_requests:
              - id: fact_1
                answer_fact: sales by Staff One yesterday
                answer_outputs:
                  - id: answer_1
                    description: total sales amount
                    role: ANSWER_VALUE
                used_question_inputs: [fact_1_entity_1, fact_1_time_1]
        addresses:
          - address: entity.grounded_fact_1_entity_1
            kind: entity
            resource: staff
            keyId: primary_key
            referenceText: Staff One
            identity: {staff_key: staff-1}
            evidence: {stepIds: [known_input:fact_1_entity_1]}
          - address: value.grounded_fact_1_time_1
            kind: value
            value:
              type: time_scope
              value: yesterday
              expression: yesterday
              resolvedStart: "2026-05-14"
              resolvedEnd: "2026-05-14"
              granularity: day
            evidence: {stepIds: [known_input:fact_1_time_1]}
          - address: value.answer_1
            kind: value
            value: {type: decimal, value: "100.00"}
            evidence: {stepIds: [turn_sales.answer]}
expect:
  result_contains:
    cards:
      - kind: prior_answer_request
        details:
          request_shape:
            answer_fact_template: sales by Staff One yesterday
            slots:
              - slot_id: fact_1_entity_1
                slot_kind: entity_identity
                text: Staff One
                resolved_value_text: Staff One
                value_meaning_hint: staff member
              - slot_id: fact_1_time_1
                slot_kind: time_scope
                text: yesterday
                resolved_value_text: yesterday
          prior_slot_bindings:
            fact_1_entity_1:
              value_kind: entity_identity
              entity_kind: staff
              key_id: primary_key
              display: Staff One
              canonical_values: {staff_key: staff-1}
              source_lineage: [turn_sales.entity.grounded_fact_1_entity_1]
            fact_1_time_1:
              value_kind: time_scope
              value: yesterday
              display: yesterday
              resolved_start: "2026-05-14"
              resolved_end: "2026-05-14"
              granularity: day
              source_lineage: [turn_sales.value.grounded_fact_1_time_1]
