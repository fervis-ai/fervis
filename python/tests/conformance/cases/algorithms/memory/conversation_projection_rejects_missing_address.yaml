id: conversation_projection_rejects_missing_address
description: Conversation memory projection rejects fact addresses without address.
migrates:
  - api/tests/fervis/memory/test_fact_memory.py::test_memory_projection_rejects_malformed_fact_address
kind: algorithm
algorithm: memory.project_conversation
input:
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: answered
        addresses:
          - kind: value
            value: {type: number, value: 12}
expect:
  result_contains:
    status: rejected
