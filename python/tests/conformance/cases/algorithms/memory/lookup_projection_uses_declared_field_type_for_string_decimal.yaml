id: lookup_projection_uses_declared_field_type_for_string_decimal
description: Lookup memory uses declared field type when the serialized API value is a string.
migrates:
  - api/tests/fervis/memory/test_fact_memory.py::test_answer_memory_uses_declared_field_type_when_api_decimal_is_string
kind: algorithm
algorithm: memory.lookup_projection
input:
  conversation_context:
    factArtifacts:
      - artifactId: turn_sales
        outcome: answered
        addresses:
          - address: relation.answer_rows
            kind: relation
            source:
              kind: operation_output
              relationId: answer_rows
              identityType: sale
            grainKeys: [sale_id]
            fieldCoverage:
              sale_id: answer_rows.sale_id
              amount: answer_rows.amount
            rowAddresses: [row.answer_rows.1]
          - address: row.answer_rows.1
            kind: row
            relation: relation.answer_rows
            grain: {sale_id: sale_1}
            values:
              sale_id: {type: uuid, value: sale_1}
              amount:
                type: decimal
                value: "4000.00"
                answer_output_ids: [answer_1]
expect:
  result_contains:
    relation_field_types:
      turn_sales.relation.answer_rows:
        amount: decimal
    relation_answer_outputs:
      turn_sales.relation.answer_rows:
        amount: [answer_1]

