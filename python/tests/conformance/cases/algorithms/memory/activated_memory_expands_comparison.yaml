id: activated_memory_expands_comparison
description: Selected scalar cards preserve comparison values and units.
migrates:
  - api/tests/fervis/memory/test_activated_memory.py::test_activated_memory_expands_comparison_from_used_memory_id
kind: algorithm
algorithm: conversation_memory.expand_activated
input:
  current_question: What about that comparison?
  conversation_context:
    factArtifacts:
      - artifactId: turn_1
        outcome: answered
        addresses:
          - address: value.comparison
            kind: value
            value: {type: comparison, value: "12.5", unit: percent}
  used_memory_ids: [turn_1.value.comparison]
expect:
  result_contains:
    activatedMemory:
      turn_1.value.comparison:
        kind: scalar_value
        value: "12.5"
        value_kind: comparison
        unit: percent
        value_fact_refs: [value.comparison]
        proof_refs: []
