id: outcome_address_needs_clarification
kind: algorithm
algorithm: memory.outcome_address
migrates:
  - api/tests/fervis/interfaces/django_interface/test_conversation_memory.py::test_fact_result_terminal_projection_preserves_structured_clarification
input:
  fact_result:
    outcome:
      kind: needs_clarification
      clarifications:
        - id: which_staff
          requestedFactId: rf_staff
          need: target_reference
          reason: multiple_matching_entities
          question: Which matching staff member should I use?
          subjects:
            - kind: question_input
              id: staff_name
              label: staff member
              sourceText: Alice
              options:
                - {id: staff:1, label: Staff 1}
                - {id: staff:2, label: Staff 2}
          evidence:
            - {kind: proof_ref, id: resolve:alice}
      proof_refs: [resolve:alice]
expect:
  result_contains:
    address:
      address: outcome.needs_clarification
      terminal: needs_clarification
      clarificationQuestions:
        - Which matching staff member should I use?
      evidence:
        stepIds: [resolve:alice]
