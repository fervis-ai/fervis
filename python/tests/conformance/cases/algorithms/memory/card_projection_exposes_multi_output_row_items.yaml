id: card_projection_exposes_multi_output_row_items
description: Multi-output answer rows expose row-level values in context source text.
migrates:
  - api/tests/fervis/lookup/memory/test_conversation_memory_projection.py::test_memory_projection_exposes_row_level_items_for_multi_output_answer_rows
kind: algorithm
algorithm: conversation_memory.card_projection
input:
  current_question: Tell me about the last item.
  conversation_context:
    factArtifacts:
      - artifactId: turn_products
        outcome: answered
        sourceQuestion: Which products sold best this week?
        sourceAnswer: "Alpha: 10, Beta: 8."
        provenance:
          question_contract:
            answer_requests:
              - id: fact_1
                answer_fact: products sold best this week
                answer_outputs:
                  - id: answer_1
                    description: product name
                  - id: answer_2
                    description: units sold
        addresses:
          - address: relation.answer_rows
            kind: relation
            source: {kind: operation_output}
            grainKeys: [product_id]
            fieldCoverage:
              product_name: answer_rows.product_name
              units_sold: answer_rows.units_sold
            completeness: {status: complete, pagination: all_pages}
            rowAddresses: [row.answer_1, row.answer_2]
          - address: row.answer_1
            kind: row
            relation: relation.answer_rows
            identity: {product_id: prod-1}
            values:
              product_name: {type: string, value: Alpha, answer_output_ids: [answer_1]}
              units_sold: {type: integer, value: 10, answer_output_ids: [answer_2]}
          - address: row.answer_2
            kind: row
            relation: relation.answer_rows
            identity: {product_id: prod-2}
            values:
              product_name: {type: string, value: Beta, answer_output_ids: [answer_1]}
              units_sold: {type: integer, value: 8, answer_output_ids: [answer_2]}
expect:
  result_contains:
    context_sources:
      - kind: prior_user_question
      - kind: prior_fervis_answer
        text: "Alpha: 10, Beta: 8."

