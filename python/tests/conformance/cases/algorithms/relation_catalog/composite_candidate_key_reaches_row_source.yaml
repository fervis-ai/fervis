id: composite_candidate_key_reaches_row_source
description: A declared alternate composite candidate key remains one key at its relation grain instead of becoming independently selectable fields.
kind: algorithm
algorithm: relation_catalog.row_source_projection
input:
  catalog:
    reads:
      - id: campaigns
        endpoint_name: list_campaigns
        resource_names: [campaign]
        row_paths:
          - {id: data, path: data, cardinality: many}
        fields:
          - {ref: field.account_id, path: data.account_id, row_path_id: data, type: uuid}
          - {ref: field.code, path: data.code, row_path_id: data, type: string}
          - {ref: field.name, path: data.name, row_path_id: data, type: string}
        candidate_keys:
          - id: campaign_code_per_account
            entity_kind: campaign
            components:
              - {id: account_id, field_ref: field.account_id}
              - {id: code, field_ref: field.code}
            primary: false
            stable: true
            context_field_refs: [field.name]
expect:
  result_contains:
    read_id: campaigns
    row_path_id: data
    candidate_keys:
      - id: campaign_code_per_account
        entity_kind: campaign
        components:
          - {id: account_id, field_id: account_id}
          - {id: code, field_id: code}
        primary: false
        stable: true
        context_field_ids: [name]
