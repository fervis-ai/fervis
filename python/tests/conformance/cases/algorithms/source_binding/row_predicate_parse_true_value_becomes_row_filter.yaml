id: row_predicate_parse_true_value_becomes_row_filter
description: A row predicate value classified as satisfying the population compiles into a row filter.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_source_binding_row_predicate_decision_becomes_bound_source_filter
kind: algorithm
algorithm: source_binding.row_predicate_parse
input:
  row_predicates:
    is_active:
      "true": SATISFIES_TEST
      "false": CONFLICTS_WITH_TEST
expect:
  result_contains:
    row_filters:
      - field_id: is_active
        operator: in
        values: ["true"]
    population_choices:
      - controller_kind: row_predicate
        controller_id: rp.source_1.row.root.is_active
        field_id: is_active
        included_values: ["true"]
        excluded_values: ["false"]
