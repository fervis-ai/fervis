id: review_scope_axis_owner_edges_are_axis_scoped
description: Source-binding review scope applies typed axis-owner edges per review axis, not at target level.
kind: algorithm
algorithm: source_binding.review_scope
input:
  request:
    mode: scoped_review_axis_owned_test
  finite_choice_axis_owners:
    sale_type:
      - explicit_user_constraint:sale_type_constraint
expect:
