id: finite_choice_not_realized_role_match_excludes_value
description: A NOT_REALIZED role match excludes a choice value that represents a draft or planned-only representation.
kind: algorithm
algorithm: source_binding.finite_choice_parse
input:
  choices:
    OPEN:
      subject_identity: SATISFIES_TEST
      normal_instance_guard: CONFLICTS_WITH_TEST
      normal_instance_match:
        matched_excluded_role: NOT_REALIZED
    CLOSED:
      subject_identity: SATISFIES_TEST
      normal_instance_guard: SATISFIES_TEST
expect:
  result_contains:
    source_invocation_param_values:
      - status: CLOSED
