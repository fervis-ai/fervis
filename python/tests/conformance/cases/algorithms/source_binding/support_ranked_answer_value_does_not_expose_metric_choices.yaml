id: support_ranked_answer_value_does_not_expose_metric_choices
description: Ranked-selection answer-value fulfillment exposes the group answer, while metrics remain fact-level measure evidence.
kind: algorithm
algorithm: source_binding.fulfillment_support
input:
  project_model_visible: true
  requested_fact:
    description: staff who earned the most compensation this month
    subject_text: staff
    answer_expression_family: grouped_aggregate
    group_key: {description: staff, domain: SOURCE_RESULT_VALUES}
  catalog:
    reads:
      - id: list_staff_list
        endpoint_name: list_staff_list
        resource_names: [staff]
        row_paths:
          - {id: data, path: data, cardinality: many}
        fields:
          - {ref: staff.id, path: data.staff_id, row_path_id: data, type: uuid}
        candidate_keys:
          - id: staff_primary
            entity_kind: staff
            components:
              - {id: staff_id, field_ref: staff.id}
            primary: true
      - id: list_shift_compensation_list
        endpoint_name: list_shift_compensation_list
        resource_names: [shift_compensation]
        row_paths:
          - id: data
            path: data
            cardinality: many
        fields:
          - ref: field.staff_id
            path: data.staff_id
            row_path_id: data
            type: uuid
          - ref: field.compensation_id
            path: data.compensation_id
            row_path_id: data
            type: uuid
          - ref: field.calculated_pay
            path: data.calculated_pay
            row_path_id: data
            type: decimal
        candidate_keys:
          - id: compensation_primary
            entity_kind: shift_compensation
            components:
              - {id: compensation_id, field_ref: field.compensation_id}
        entity_references:
          - id: staff_reference
            target_entity_kind: staff
            target_key_id: staff_primary
            components:
              - {target_component_id: staff_id, local_field_ref: field.staff_id}
  candidate:
    source_candidate_id: source_1
    kind: new_api_read
    read_id: list_shift_compensation_list
    result_grains:
      - row_path_id: data
        row_source_id: rs_source_1_data
        cardinality: many
        candidate_keys:
          - key_id: compensation_primary
            entity_kind: shift_compensation
            components:
              - {component_id: compensation_id, field_id: compensation_id}
        entity_references:
          - reference_id: staff_reference
            target_entity_kind: staff
            target_key_id: staff_primary
            components:
              - {component_id: staff_id, field_id: staff_id}
        evidence_items:
          - field_id: compensation_id
            type: uuid
          - field_id: staff_id
            type: uuid
          - field_id: calculated_pay
            type: decimal
expect:
  result_contains:
    entity_fields:
      staff_id: true
    metric_fields:
      calculated_pay: true
