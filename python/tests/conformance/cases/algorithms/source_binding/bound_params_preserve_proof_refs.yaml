id: bound_params_preserve_proof_refs
description: Source-binding candidate bound params preserve proof lineage across registry projection.
kind: algorithm
algorithm: source_binding.bound_params
input:
  candidate_id: source_1
  candidate_cards:
    requested_fact_sources:
      - requested_fact_id: fact_1
        source_contexts:
          - source_options:
              - candidate_id: source_1
                kind: new_api_read
                read_id: records
                row_source_id: records.data
                bound_params:
                  - param_id: area_id
                    value: area_1
                    proof_refs:
                      - known_input:area
expect:
  result_contains:
    applied_param_bindings:
      - param_id: area_id
        value: area_1
        proof_refs:
          - known_input:area
