id: parse_scopes_fulfillment_evidence_without_dropping_endpoint_fields
description: Source-binding parse keeps endpoint field availability while scoping fulfillment evidence to selected answer support.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_parse_source_binding_keeps_selected_endpoint_surface_but_not_unselected_fulfillment_evidence
kind: algorithm
algorithm: source_binding.parse
input:
  request:
    include_extra_field: true
  selected_field_id: amount
  choices:
    OPEN: SATISFIES_TEST
    CLOSED: CONFLICTS_WITH_TEST
expect:
  result_contains:
    available_field_ids:
      - amount
      - status
      - unrelated
    fulfillment_evidence_ids:
      - source_1.root.amount
