id: count_support_keeps_summary_scalar_as_metric
description: Scalar count support keeps many-row population count and one-row summary total as a metric, not as a row count.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_source_binding_scalar_count_options_are_executable_answer_options
kind: algorithm
algorithm: source_binding.fulfillment_support
input:
  requested_fact:
    description: sale count
    answer_output_role: ROW_COUNT
    subject_text: sales
  candidate:
    source_candidate_id: source_1
    result_grains:
      - grain_id: data
        row_path_id: data
        row_source_id: rs_source_1_data
        cardinality: many
        evidence_items:
          - field_id: sale_id
            type: uuid
      - grain_id: summary
        row_path_id: summary
        row_source_id: rs_source_1_summary
        cardinality: one
        evidence_items:
          - field_id: total_count
            type: integer
            roles: [output]
expect:
  result_contains:
    row_count_evidence_ids: [row_population.rs_source_1_data]
    metric_evidence_ids: [source_1.summary.total_count]
