id: prompt_surface_keeps_unbound_owned_input_tests
description: Source-binding review scope keeps an owned membership test in review when no selected source surface owns the input.
kind: algorithm
algorithm: source_binding.prompt_surface
input:
  request:
    mode: scoped_review_owned_input_unbound
expect:
  result_contains:
    finite_choice_review_param_ids: [status]
    row_predicate_field_ids: [is_deleted]
    schema_review_test_ids:
      finite_choice:
        status:
          - subject_identity
          - explicit_user_constraint:specified_staff
          - normal_instance_guard
      row_predicate:
        rp.source_1.row.root.is_deleted:
          - subject_identity
          - explicit_user_constraint:specified_staff
          - normal_instance_guard
    schema_review_test_id_counts:
      finite_choice:
        status: 3
      row_predicate:
        rp.source_1.row.root.is_deleted: 3
  result_exact_fields:
    schema_review_test_ids:
      finite_choice:
        status:
          - subject_identity
          - explicit_user_constraint:specified_staff
          - normal_instance_guard
      row_predicate:
        rp.source_1.row.root.is_deleted:
          - subject_identity
          - explicit_user_constraint:specified_staff
          - normal_instance_guard
