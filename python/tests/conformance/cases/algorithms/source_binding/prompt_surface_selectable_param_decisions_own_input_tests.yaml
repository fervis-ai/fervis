id: prompt_surface_selectable_param_decisions_own_input_tests
description: Source-binding prompt schema exposes only in-scope membership tests when selectable params own grounded inputs.
kind: algorithm
algorithm: source_binding.prompt_surface
input:
  request:
    mode: scoped_review_selectable_owned_inputs
expect:
  result_contains:
    finite_choice_review_param_ids: [status]
    row_predicate_field_ids: [is_deleted]
    schema_review_test_ids:
      finite_choice:
        status:
          - subject_identity
          - normal_instance_guard
      row_predicate:
        rp.source_1.row.root.is_deleted:
          - subject_identity
          - normal_instance_guard
    schema_review_test_id_counts:
      finite_choice:
        status: 2
      row_predicate:
        rp.source_1.row.root.is_deleted: 2
  result_exact_fields:
    schema_review_test_ids:
      finite_choice:
        status:
          - subject_identity
          - normal_instance_guard
      row_predicate:
        rp.source_1.row.root.is_deleted:
          - subject_identity
          - normal_instance_guard
