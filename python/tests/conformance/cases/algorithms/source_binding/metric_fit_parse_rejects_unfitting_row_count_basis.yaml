id: metric_fit_parse_rejects_unfitting_row_count_basis
description: Source-binding parser fails closed when the selected row-count basis was reviewed as not fitting the requested answer.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_parse_source_binding_rejects_ranked_count_basis_when_count_does_not_fit_requested_measure
kind: algorithm
algorithm: source_binding.metric_fit_parse
input:
  selected_basis: row_count
  selected_metric_field: data
  metric_decisions:
    amount: DOES_NOT_FIT_REQUESTED_ANSWER
    data: DOES_NOT_FIT_REQUESTED_ANSWER
expect:
  error_contains: selected row count basis does not fit
