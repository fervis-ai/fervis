id: parse_exposes_selected_relation_computation_fields
description: Source binding exposes the selected relation's computation fields while fulfillment remains tied to selected canonical evidence.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_parse_source_binding_keeps_selected_endpoint_surface_but_not_unselected_fulfillment_evidence
kind: algorithm
algorithm: source_binding.parse
input:
  request:
    include_extra_field: true
  selected_field_id: amount
  choices:
    OPEN: SATISFIES_TEST
    CLOSED: CONFLICTS_WITH_TEST
expect:
  result_contains:
    available_field_ids:
      - amount
      - status
      - unrelated
    fulfillment_evidence_ids:
      - source_1.root.amount
