id: finite_choice_rejects_normal_guard_conflict_without_role_match
description: A normal-instance guard conflict must include the role-match review that explains the conflict.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_parse_source_binding_rejects_normal_guard_conflict_without_role_match
kind: algorithm
algorithm: source_binding.finite_choice_parse
input:
  choices:
    OPEN:
      subject_identity: SATISFIES_TEST
      normal_instance_guard: SATISFIES_TEST
      include_normal_guard_result: false
    CLOSED:
      subject_identity: CONFLICTS_WITH_TEST
      normal_instance_guard: CONFLICTS_WITH_TEST
      include_normal_guard_result: false
expect:
  error_contains: not valid
