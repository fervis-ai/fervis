id: count_support_is_role_pure_per_many_row_grain
description: Count support exposes one row population basis per many-row grain without combining grains.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_source_binding_row_population_count_support_is_role_pure_per_grain
kind: algorithm
algorithm: source_binding.fulfillment_support
input:
  requested_fact:
    description: order count
    answer_output_role: ROW_COUNT
    subject_text: orders
  candidate:
    source_candidate_id: source_1
    result_grains:
      - grain_id: root
        row_path_id: root
        row_source_id: rs_source_1_root
        cardinality: many
        evidence_items:
          - field_id: order_id
            type: uuid
      - grain_id: data.line_items
        row_path_id: data.line_items
        row_source_id: rs_source_1_data_line_items
        cardinality: many
        evidence_items:
          - field_id: line_item_id
            type: uuid
expect:
  result_contains:
    row_count_evidence_ids: [row_population.rs_source_1_data_line_items, row_population.rs_source_1_root]
    row_count_evidence:
      - [data.line_items, rs_source_1_data_line_items]
      - [root, rs_source_1_root]
    row_count_slot_sizes: [1, 1]
