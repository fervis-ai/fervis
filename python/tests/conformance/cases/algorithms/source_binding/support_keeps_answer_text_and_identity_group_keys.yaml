id: support_keeps_candidate_key_and_excludes_display_field
description: Source-binding support exposes the declared staff key while keeping its display field out of computation choices.
migrates:
  - api/tests/fervis/lookup/test_source_binding_one_call.py::test_source_binding_keeps_answer_text_and_structural_identity_group_keys
kind: algorithm
algorithm: source_binding.fulfillment_support
input:
  requested_fact:
    description: staff with the highest compensation
    subject_text: staff
  candidate:
    source_candidate_id: source_1
    kind: new_api_read
    read_id: list_staff_list
    result_grains:
      - row_path_id: data
        row_source_id: rs_source_1_data
        cardinality: many
        candidate_keys:
          - key_id: staff_key
            entity_kind: staff
            components:
              - {component_id: staff_id, field_id: staff_id}
            context_field_ids: [staff_name]
        evidence_items:
          - evidence_id: source_1.data.staff_id
            field_id: staff_id
            row_path_id: data
            type: uuid
            roles: [identity]
          - evidence_id: source_1.data.staff_name
            field_id: staff_name
            row_path_id: data
            type: string
            answer_output_ids: [answer_1]
          - evidence_id: source_1.data.amount
            field_id: amount
            row_path_id: data
            type: decimal
    evidence_items:
      - evidence_id: source_1.data.staff_id
        field_id: staff_id
        row_path_id: data
        type: uuid
        roles: [identity]
      - evidence_id: source_1.data.staff_name
        field_id: staff_name
        row_path_id: data
        type: string
        answer_output_ids: [answer_1]
      - evidence_id: source_1.data.amount
        field_id: amount
        row_path_id: data
        type: decimal
expect:
  result_contains:
    entity_fields:
      staff_id: true
      staff_name: false
