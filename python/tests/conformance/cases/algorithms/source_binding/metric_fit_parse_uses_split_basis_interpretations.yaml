id: metric_fit_parse_uses_split_basis_interpretations
description: Source-binding parser derives executable metric fit from interpretations of already-written fit bases.
kind: algorithm
algorithm: source_binding.metric_fit_parse
input:
  split_metric_fit_contract: true
  include_secondary_metric: true
  selected_metric_field: amount
  choices:
    OPEN: SATISFIES_TEST
    CLOSED: CONFLICTS_WITH_TEST
  metric_decisions:
    amount: FITS_REQUESTED_ANSWER
    secondary_amount: DOES_NOT_FIT_REQUESTED_ANSWER
expect:
  result_contains:
    metric_measure_field_ids: [amount]
    row_count_basis_evidence_ids: []
