id: input_lineage_population_choice_view
kind: algorithm
algorithm: lineage.input_lineage
description: End-user input lineage shows finite-choice population decisions, including excluded values, without requiring a row filter.
input:
  root:
    kind: answer
    id: answer_1
  answer_output: count
  dataset:
    conversations:
      - conversation_id: conversation_1
        tenant_id: tenant_1
    questions:
      - question_id: question_1
        conversation_id: conversation_1
        conversation_sequence: 1
        original_question: How many current transfers exist?
    runs:
      - run_id: run_1
        question_id: question_1
        run_number: 1
        kind: model_assisted
        trigger_kind: initial
        integrated_question: How many current transfers exist?
    steps:
      - step_id: step_execute
        run_id: run_1
        sequence: 1
        step_key: execute
        kind: deterministic
    run_results:
      - run_result_id: run_result_1
        run_id: run_1
        result_kind: answered
    requested_facts:
      - requested_fact_id: fact_1
        run_id: run_1
        produced_by_step_id: step_execute
        fact_key: fact_1
        description: count of current transfers
        answer_expression_family: scalar_aggregate
    fact_results:
      - fact_result_id: fact_result_1
        run_id: run_1
        requested_fact_id: fact_1
        produced_by_step_id: step_execute
        result_kind: answered
    answers:
      - answer_id: answer_1
        run_id: run_1
        run_result_id: run_result_1
    answer_outputs:
      - answer_output_id: output_1
        run_id: run_1
        answer_id: answer_1
        fact_result_id: fact_result_1
        output_key: count
        value_kind: number
        value_json:
          value: 3
        proof_node_refs_json:
          - answer_output:fact_1:count
    catalog_endpoints:
      - catalog_endpoint_id: 33333333-3333-4333-8333-333333333333
        run_id: run_1
        catalog_endpoint_key: django_retail_ops_list_transfer_list:test
        endpoint_name: list_transfer_list
        framework_kind: django_drf
        source_namespace_kind: django_app
        source_namespace_path_json: [retail_ops]
        route_method: GET
        route_path_template: /v1/transfers/
        route_name: transfer-list
        handler_ref: apps.retail_ops.views.TransferListView
        domain_resource_names_json: [transfer]
    source_reads:
      - source_read_id: source_read_1
        run_id: run_1
        step_id: step_execute
        catalog_endpoint_id: 33333333-3333-4333-8333-333333333333
        args_json: {}
        status: succeeded
        row_count: 3
        completeness_json:
          complete: true
        response_hash: sha256:transfers
    proof_graphs:
      - proof_graph_id: proof_1
        run_id: run_1
        fact_result_id: fact_result_1
        compile_step_id: step_execute
        execute_step_id: step_execute
        payload_schema: fervis.execution_proof_graph
        payload_schema_rev: 1
        payload_json:
          nodes:
            - id: population_choice:source_1:row_predicate:status
              kind: population_choice
              proof_refs:
                - row_predicate:status
              label: "Included status values [ALLOCATED, IN_TRANSIT, RECEIVED]. Excluded: CANCELLED, SUPERSEDED"
              value:
                included_values: [ALLOCATED, IN_TRANSIT, RECEIVED]
                excluded_values: [CANCELLED, SUPERSEDED]
            - id: relation:source_1
              kind: relation
              proof_refs:
                - source_read:source_read_1
            - id: operation:op_1
              kind: operation
              proof_refs: []
            - id: answer_output:fact_1:count
              kind: answer_output
              proof_refs: []
          edges:
            - source: population_choice:source_1:row_predicate:status
              target: relation:source_1
              role: scopes
            - source: relation:source_1
              target: operation:op_1
              role: input
            - source: operation:op_1
              target: answer_output:fact_1:count
              role: produces
          contributions:
            - origin: contextual
              label: "Included status values [ALLOCATED, IN_TRANSIT, RECEIVED]. Excluded: CANCELLED, SUPERSEDED"
              node_refs:
                - population_choice:source_1:row_predicate:status
              proof_refs:
                - row_predicate:status
expect:
  result_contains:
    lines:
      - "Inputs used for fact_1"
      - "Fact: count of current transfers"
      - "Contextual"
      - "- Included status values [ALLOCATED, IN_TRANSIT, RECEIVED]. Excluded: CANCELLED, SUPERSEDED"
      - "Applied in execution"
      - "- Included status values [ALLOCATED, IN_TRANSIT, RECEIVED]. Excluded: CANCELLED, SUPERSEDED was reviewed as a population choice."
