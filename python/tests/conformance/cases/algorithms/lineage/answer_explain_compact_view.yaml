id: answer_explain_compact_view
kind: algorithm
algorithm: lineage.explain
description: Answer lineage compact view keeps hierarchy, canonical output, proof, source read, and decision basis readable.
input:
  root:
    kind: answer
    id: answer_1
  dataset:
    conversations:
      - conversation_id: conversation_1
        tenant_id: tenant_1
    questions:
      - question_id: question_1
        conversation_id: conversation_1
        conversation_sequence: 1
        original_question: Which staff earned the most this month?
    runs:
      - run_id: run_1
        question_id: question_1
        run_number: 1
        kind: model_assisted
        trigger_kind: initial
    steps:
      - step_id: step_contract
        run_id: run_1
        sequence: 1
        step_key: question_contract
        kind: model_turn
        output_summary_json:
          requested_fact: staff member who earned the most compensation this month
      - step_id: step_source_binding
        run_id: run_1
        sequence: 2
        step_key: source_binding
        kind: model_turn
        output_summary_json:
          requested_fact: staff member who earned the most compensation this month
          source: list_shift_compensation_list
          step_summary_items:
            - text: "calculated_pay: row-level payroll amount that can be summed by staff -> fits_requested_answer"
              detail: compact
              is_explanation: true
              path: [outcome, metric_fit_bases, fact_1, calculated_pay, fit_basis]
            - text: "commission: one compensation component, not total earned compensation -> does_not_fit_requested_answer"
              detail: compact
              is_explanation: true
              path: [outcome, metric_fit_bases, fact_1, commission, fit_basis]
            - text: "Binding: group=staff_id metric=calculated_pay function=sum"
              detail: compact
              is_explanation: false
              path: []
      - step_id: step_compile
        run_id: run_1
        sequence: 3
        step_key: compile
        kind: deterministic
      - step_id: step_execute
        run_id: run_1
        sequence: 4
        step_key: execute
        kind: deterministic
      - step_id: step_render
        run_id: run_1
        sequence: 5
        step_key: render
        kind: deterministic
    run_results:
      - run_result_id: run_result_1
        run_id: run_1
        result_kind: answered
    requested_facts:
      - requested_fact_id: fact_1
        run_id: run_1
        produced_by_step_id: step_contract
        fact_key: fact_1
        description: staff member who earned the most compensation this month
        answer_expression_family: grouped_aggregate
    fact_results:
      - fact_result_id: fact_result_1
        run_id: run_1
        requested_fact_id: fact_1
        produced_by_step_id: step_execute
        result_kind: answered
    memory_artifacts:
      - memory_artifact_id: memory_requested_fact_1
        run_id: run_1
        produced_by_step_id: step_contract
        source_kind: requested_fact
        requested_fact_id: fact_1
        payload_schema: fervis.memory_artifact
        payload_schema_rev: 1
        payload_json:
          artifactId: memory_requested_fact_1
          sourceKind: requested_fact
          outcome: answered
          provenance:
            question_contract:
              answer_requests:
                - id: fact_1
                  answer_fact: staff member who earned most
      - memory_artifact_id: memory_fact_result_1
        run_id: run_1
        produced_by_step_id: step_execute
        source_kind: fact_result
        fact_result_id: fact_result_1
        payload_schema: fervis.memory_artifact
        payload_schema_rev: 1
        payload_json:
          artifactId: memory_fact_result_1
          sourceKind: fact_result
          outcome: answered
          provenance:
            conversation_resolution_activation:
              activated_memory_ids:
                - prior_turn.entity.staff_9393
          addresses:
            - address: entity.answer_1
              kind: entity
              resource: staff
              keyId: primary_key
              identity:
                staff_id: staff_9393
      - memory_artifact_id: memory_known_input_1
        run_id: run_1
        produced_by_step_id: step_contract
        source_kind: known_input
        payload_schema: fervis.memory_artifact
        payload_schema_rev: 1
        payload_json:
          artifactId: memory_known_input_1
          sourceKind: known_input
          outcome: answered
          addresses:
            - address: value.month_1
              kind: value
              value:
                type: string
                value: "2026-06"
    answers:
      - answer_id: answer_1
        run_id: run_1
        run_result_id: run_result_1
    answer_outputs:
      - answer_output_id: answer_output_1
        run_id: run_1
        answer_id: answer_1
        fact_result_id: fact_result_1
        output_key: answer_1
        value_kind: entity
        value_json:
          kind: entity
          entity_kind: staff
          key_id: primary_key
          components:
            staff_id: staff_9393
        proof_node_refs_json:
          - answer_output:fact_1:answer_1
        role: ANSWER_VALUE
    answer_presentations:
      - presentation_id: presentation_1
        run_id: run_1
        answer_id: answer_1
        client_key: default
        locale: default
        presentation_kind: text
        render_step_id: step_render
        rendered_value: "Staff staff_9393 earned the most this month."
    catalog_endpoints:
      - catalog_endpoint_id: 22222222-2222-4222-8222-222222222222
        run_id: run_1
        catalog_endpoint_key: django_retail_ops_list_shift_compensation_list:test
        endpoint_name: list_shift_compensation_list
        framework_kind: django_drf
        source_namespace_kind: django_app
        source_namespace_path_json: [retail_ops]
        route_method: GET
        route_path_template: /v1/shift-compensations/
        route_name: shift-compensation-list
        handler_ref: apps.retail_ops.views.ShiftCompensationListView
        domain_resource_names_json: [shift compensation]
    source_reads:
      - source_read_id: source_read_1
        run_id: run_1
        step_id: step_execute
        catalog_endpoint_id: 22222222-2222-4222-8222-222222222222
        args_json:
          month: 2026-06
        status: succeeded
        row_count: 3
        completeness_json:
          complete: true
        response_hash: sha256:source
    proof_graphs:
      - proof_graph_id: proof_1
        run_id: run_1
        fact_result_id: fact_result_1
        compile_step_id: step_compile
        execute_step_id: step_execute
        payload_schema: fervis.execution_proof_graph
        payload_schema_rev: 2
        payload_json:
          nodes:
            - id: relation:source_1
              kind: relation
              population_coverage: {row_tests: [], condition_tests: []}
              proof_refs:
                - source_read:source_read_1
            - id: endpoint_arg:source_1:month
              kind: endpoint_arg
              population_coverage: {row_tests: [], condition_tests: []}
              proof_refs:
                - known_input:month_1
              label: month=2026-06
              value: "2026-06"
            - id: operation:op_1
              kind: operation
              population_coverage: {row_tests: [], condition_tests: []}
              proof_refs: []
            - id: answer_output:fact_1:answer_1
              kind: answer_output
              population_coverage: {row_tests: [], condition_tests: []}
              proof_refs: []
          edges:
            - source: endpoint_arg:source_1:month
              target: relation:source_1
              role: scopes
            - source: relation:source_1
              target: operation:op_1
              role: input
            - source: operation:op_1
              target: answer_output:fact_1:answer_1
              role: produces
          contributions:
            - origin: explicit
              label: June 2026
              node_refs:
                - endpoint_arg:source_1:month
              proof_refs:
                - known_input:month_1
            - origin: derived
              label: month=2026-06
              node_refs:
                - endpoint_arg:source_1:month
              proof_refs:
                - known_input:month_1
expect:
  result_contains:
    view:
      runs:
        run_1:
          activated_memory_ids:
            - prior_turn.entity.staff_9393
    lines:
      - "Question question_1: Which staff earned the most this month?"
      - "Run run_1 (#1): answered"
      - "Activated memory: prior_turn.entity.staff_9393"
      - "outcome=answered; addresses=value:value.month_1"
      - "Answer presentation (default/text): Staff staff_9393 earned the most this month."
      - "Requested fact fact_1: staff member who earned the most compensation this month"
      - "outcome=answered"
      - "outcome=answered; addresses=entity:entity.answer_1"
      - "Answer output answer_1: entity staff:staff_id=staff_9393"
      - "Source read: retail_ops/list_shift_compensation_list rows=3"
      - "Args: month=2026-06"
      - "Step 2: source_binding"
      - "calculated_pay: row-level payroll amount that can be summed by staff -> fits_requested_answer"
      - "commission: one compensation component, not total earned compensation -> does_not_fit_requested_answer"
      - "Binding: group=staff_id metric=calculated_pay function=sum"
      - "Explicit inputs: June 2026"
      - "Derived inputs: month=2026-06"
    excludes:
      "{": true
      payload_json: true
