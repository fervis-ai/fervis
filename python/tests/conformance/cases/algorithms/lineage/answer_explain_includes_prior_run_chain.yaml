id: answer_explain_includes_prior_run_chain
kind: algorithm
algorithm: lineage.explain
description: Answer-rooted lineage includes prerequisite run chain while run-rooted views remain scoped.
input:
  root:
    kind: answer
    id: answer_2
  dataset:
    conversations:
      - conversation_id: conversation_1
        tenant_id: tenant_1
    questions:
      - question_id: question_1
        conversation_id: conversation_1
        conversation_sequence: 1
        original_question: How many stores are open?
    runs:
      - run_id: run_1
        question_id: question_1
        run_number: 1
        kind: model_assisted
        trigger_kind: initial
      - run_id: run_2
        question_id: question_1
        run_number: 2
        kind: model_assisted
        trigger_kind: retry
        base_run_id: run_1
    steps:
      - step_id: step_fact_2
        run_id: run_2
        sequence: 1
        step_key: question_contract
        kind: model_turn
    run_results:
      - run_result_id: result_1
        run_id: run_1
        result_kind: runtime_error
      - run_result_id: result_2
        run_id: run_2
        result_kind: answered
    requested_facts:
      - requested_fact_id: fact_2
        run_id: run_2
        produced_by_step_id: step_fact_2
        fact_key: fact_1
        description: count of open stores
        answer_expression_family: scalar_aggregate
    fact_results:
      - fact_result_id: fact_result_2
        run_id: run_2
        requested_fact_id: fact_2
        produced_by_step_id: step_fact_2
        result_kind: answered
    answers:
      - answer_id: answer_2
        run_id: run_2
        run_result_id: result_2
    answer_outputs:
      - answer_output_id: output_2
        run_id: run_2
        answer_id: answer_2
        fact_result_id: fact_result_2
        output_key: count
        value_kind: number
        value_json:
          value: 2
        role: ANSWER_VALUE
    source_reads: []
    proof_graphs: []
expect:
  result_contains:
    lines:
      - "Question question_1: How many stores are open?"
      - "Run run_1 (#1): runtime_error"
      - "Run run_2 (#2): answered"
      - "Answer output count: number 2"
