id: computed_scalar_expression_has_only_declared_origins
description: Computed-scalar model output accepts declared input and operator tokens but rejects hidden literal tokens and raw expressions.
kind: algorithm
algorithm: planning.fact_plan_schema
input:
  requested_fact_ids: [fact_1]
  pattern_names: [computed_scalar]
  selected_plan_shapes_by_requested_fact_id:
    fact_1: [computed_scalar]
  source_binding_ids_by_requested_fact_id:
    fact_1: [sb_current, sb_previous]
  answer_output_ids_by_requested_fact_id:
    fact_1: [answer_1]
  answer_output_ids_by_source_binding_id:
    sb_current: [answer_1]
    sb_previous: [answer_1]
  source_binding_ids_by_requirement_by_requested_fact_id: {}
  grouped_aggregate_choices_by_requested_fact_id: {}
  scalar_aggregate_choices_by_requested_fact_id: {}
  field_ids_by_source_binding_id:
    sb_current: [amount]
    sb_previous: [amount]
  validations:
    - id: declared_inputs
      payload:
        outcome:
          kind: fact_plan
          answers:
            - requested_fact_id: fact_1
              answer_output_ids: [answer_1]
              pattern: computed_scalar
              scalar_inputs:
                - {input_id: current, source_binding_id: sb_current}
                - {input_id: previous, source_binding_id: sb_previous}
              expression:
                - {input_id: current}
                - {input_id: previous}
                - {operator: subtract}
              output: {scalar_id: difference}
    - id: raw_expression
      payload:
        outcome:
          kind: fact_plan
          answers:
            - requested_fact_id: fact_1
              answer_output_ids: [answer_1]
              pattern: computed_scalar
              scalar_inputs:
                - {input_id: current, source_binding_id: sb_current}
              expression: current - 1
              output: {scalar_id: difference}
    - id: numeric_literal_token
      payload:
        outcome:
          kind: fact_plan
          answers:
            - requested_fact_id: fact_1
              answer_output_ids: [answer_1]
              pattern: computed_scalar
              scalar_inputs:
                - {input_id: current, source_binding_id: sb_current}
              expression:
                - {input_id: current}
                - 1
                - {operator: subtract}
              output: {scalar_id: difference}
    - id: literal_object_token
      payload:
        outcome:
          kind: fact_plan
          answers:
            - requested_fact_id: fact_1
              answer_output_ids: [answer_1]
              pattern: computed_scalar
              scalar_inputs:
                - {input_id: current, source_binding_id: sb_current}
              expression:
                - {input_id: current}
                - {literal: 1}
                - {operator: subtract}
              output: {scalar_id: difference}
expect:
  result_contains:
    accepts:
      declared_inputs: true
      raw_expression: false
      numeric_literal_token: false
      literal_object_token: false
