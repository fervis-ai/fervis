id: resource_name_expansion_keeps_specific_match
description: Catalog selection expands matched resource names to include more specific catalog resources.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_expands_resource_names_by_catalog_tokens
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: compensation_detail_read
        endpoint_name: get_shift_record_compensation
        resource_names: [compensation]
      - id: shift_compensation_read
        endpoint_name: list_shift_compensation_list
        resource_names: [shift compensation]
      - id: location_read
        endpoint_name: list_location_list
        resource_names: [location]
  requested_facts:
    - id: fact_1
      description: which location had highest total payroll spend
      answer_outputs:
        - id: answer_1
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: payroll spend
          matching_resource_names: [compensation]
  max_reads_per_fact: 2
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [compensation_detail_read, shift_compensation_read]
