id: generated_ids_and_boilerplate_are_not_query_terms
description: Catalog selection ignores generated IDs, boilerplate request text, and generic output descriptions.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_ignores_generated_ids_and_boilerplate_query_terms
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: generic_read
        endpoint_name: list_records
        resource_names: [generic]
        facts:
          - ref: fact.answer.output
          - ref: question.user.request
      - id: payment_read
        endpoint_name: list_records
        resource_names: [payment card full number]
        facts:
          - ref: payment.card.full_number
  requested_facts:
    - id: rf1
      description: Identify the full card numbers used in buyer payments
      required_for: Answering the user's requested question
      answer_outputs:
        - id: answer_1
          description: The requested answer output
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: rf1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: full card numbers used in buyer payments
          matching_resource_names: [payment card full number]
  max_reads_per_fact: 2
expect:
  result_contains:
    selected_read_ids: [payment_read]
    requested_fact_selections:
      - requested_fact_id: rf1
        selected_read_ids: [payment_read]
        query_terms: [payment, card, full, number]
