id: output_descriptions_and_literals_do_not_contaminate_terms
description: Catalog selection ignores required_for text, output descriptions, and literal numeric input descriptions.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_ignores_required_for_output_and_literal_descriptions
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: sales_read
        endpoint_name: list_records
        resource_names: [sales]
        facts: [{ref: sales.total}]
      - id: inventory_read
        endpoint_name: list_records
        resource_names: [inventory]
        facts: [{ref: inventory.quantity}]
  requested_facts:
    - id: fact_1
      description: sales total
      required_for: Compare against inventory quantity
      answer_outputs:
        - id: answer_1
          description: Inventory quantity output
      known_inputs:
        - id: literal_1
          kind: number_text
          source: question_context
          description: inventory quantity context
          text: "125"
          numeric_value: 125
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: sales total
          matching_resource_names: [sales]
  max_reads_per_fact: 2
expect:
  result_contains:
    selected_read_ids: [sales_read]
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [sales_read]
        query_terms: [sale]

