id: item_is_preserved_as_resource_term
description: Catalog selection keeps item as a resource term when it is part of the matched resource.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_does_not_treat_item_as_generic_api_term
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: payment_items_read
        endpoint_name: list_payment_item_list
        resource_names: [payment item]
        facts: [{ref: payment_item.count}]
  requested_facts:
    - id: fact_1
      description: payment items count
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: payment items count
          matching_resource_names: [payment item]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        query_terms: [payment, item]
