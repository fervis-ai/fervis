id: month_names_are_not_generic_terms
description: Catalog selection removes month names as time context rather than API resource terms.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_does_not_treat_month_names_as_generic_terms
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: sales_read
        endpoint_name: list_sales
        resource_names: [sales]
        facts: [{ref: sales.total}]
  requested_facts:
    - id: fact_1
      description: September sales total
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: sales total
          matching_resource_names: [sales]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        query_terms: [sale]
