id: one_term_match_kept_when_no_stronger_match_exists
description: Catalog selection keeps a one-term positive read when no stronger match exists.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_keeps_one_term_matches_when_no_stronger_match_exists
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: sales_read
        endpoint_name: list_records
        resource_names: [sales]
        facts: [{ref: sales.total}]
      - id: inventory_read
        endpoint_name: list_records
        resource_names: [inventory]
        facts: [{ref: inventory.quantity}]
  requested_facts:
    - id: fact_1
      description: sales
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: sales
          matching_resource_names: [sales]
  max_reads_per_fact: 1
expect:
  result_contains:
    selected_read_ids: [sales_read]
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [sales_read]
