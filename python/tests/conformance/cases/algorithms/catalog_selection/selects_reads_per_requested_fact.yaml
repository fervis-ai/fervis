id: selects_reads_per_requested_fact
description: Catalog selection chooses matching reads independently for each requested fact.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_selects_reads_per_requested_fact
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: sales_read
        endpoint_name: list_records
        resource_names: [sales]
        facts:
          - ref: sales.amount
      - id: staff_read
        endpoint_name: list_records
        resource_names: [staff]
        facts:
          - ref: staff.last_name
  requested_facts:
    - id: sales_amount
      description: sales amount
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
    - id: staff_last_name
      description: staff last name
      answer_outputs:
        - id: answer_2
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: sales_amount
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: sales amount
          matching_resource_names: [sales]
    - requested_fact_id: staff_last_name
      answer_output_resource_lineage:
        - answer_output_id: answer_2
          support_role: MEASURED_VALUE
          source_text: staff last name
          matching_resource_names: [staff]
  max_reads_per_fact: 1
expect:
  result_contains:
    selected_read_ids: [sales_read, staff_read]
    requested_fact_selections:
      - requested_fact_id: sales_amount
        selected_read_ids: [sales_read]
        rankings:
          - read_id: sales_read
            matched_terms: [sale]
      - requested_fact_id: staff_last_name
        selected_read_ids: [staff_read]
        rankings:
          - read_id: staff_read
            matched_terms: [staff]
