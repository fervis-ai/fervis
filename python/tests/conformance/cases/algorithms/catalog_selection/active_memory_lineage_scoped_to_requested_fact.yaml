id: active_memory_lineage_scoped_to_requested_fact
description: Active memory lineage affects only the requested fact it is scoped to.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_active_memory_lineage_is_scoped_to_selected_fact
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: sale_read
        endpoint_name: list_sales
        resource_names: [sale]
        fields:
          - {ref: sale_read.field.sale_id, type: uuid}
      - id: ticket_read
        endpoint_name: list_support_tickets
        resource_names: [support ticket]
        fields:
          - {ref: ticket_read.field.ticket_id, type: uuid}
  requested_facts:
    - id: fact_1
      description: support tickets count
      answer_outputs:
        - id: answer_1
    - id: fact_2
      description: sales count
      answer_outputs:
        - id: answer_2
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: support tickets count
          matching_resource_names: [support ticket]
    - requested_fact_id: fact_2
      answer_output_resource_lineage:
        - answer_output_id: answer_2
          support_role: MEASURED_VALUE
          source_text: sales count
          matching_resource_names: [sale]
  active_memory_signals:
    - memory_id: turn_1.entity.staff.alice
      requested_fact_id: fact_2
      related_identity_types: [sale]
      field_names: [sale_id]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [ticket_read]
      - requested_fact_id: fact_2
        selected_read_ids: [sale_read]

