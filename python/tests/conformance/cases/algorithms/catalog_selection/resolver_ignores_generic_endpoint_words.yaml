id: resolver_ignores_generic_endpoint_words
description: Resolver catalog selection ignores generic endpoint words such as get/detail/list when matching entity terms.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_resolver_selection_ignores_generic_endpoint_words
kind: algorithm
algorithm: catalog_selection.resolver_select
input:
  catalog:
    reads:
      - id: staff_detail
        endpoint_name: get_staff_detail
        resource_names: [staff]
        fields: [{ref: staff_detail.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: staff, primary: true, components: [{id: staff_id, field_ref: staff_detail.field.id}]}]
      - id: area_detail
        endpoint_name: get_area_detail
        resource_names: [area]
        fields: [{ref: area_detail.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: area, primary: true, components: [{id: area_id, field_ref: area_detail.field.id}]}]
      - id: cash_deposit_detail
        endpoint_name: get_cash_deposit_detail
        resource_names: [cash_deposit]
        fields: [{ref: cash_deposit_detail.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: cash_deposit, primary: true, components: [{id: cash_deposit_id, field_ref: cash_deposit_detail.field.id}]}]
      - id: deal_detail
        endpoint_name: get_deal_detail
        resource_names: [deal]
        fields: [{ref: deal_detail.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: deal, primary: true, components: [{id: deal_id, field_ref: deal_detail.field.id}]}]
      - id: look_detail
        endpoint_name: get_look_detail
        resource_names: [look]
        fields: [{ref: look_detail.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: look, primary: true, components: [{id: look_id, field_ref: look_detail.field.id}]}]
      - id: staff_list
        endpoint_name: list_staff_list
        resource_names: [staff]
        fields: [{ref: staff_list.field.id, type: uuid}]
        candidate_keys: [{id: primary_key, entity_kind: staff, primary: true, components: [{id: staff_id, field_ref: staff_list.field.id}]}]
  entity_targets:
    - target_id: entity_1
      catalog_search_terms: [staff, staff profile, staff detail]
  max_reads_per_target: 5
expect:
  result_contains:
    selected_read_ids: [staff_detail, staff_list]
    entity_target_selections:
      - target_id: entity_1
        catalog_search_terms: [staff, staff profile, staff detail]
        selected_read_ids: [staff_detail, staff_list]
