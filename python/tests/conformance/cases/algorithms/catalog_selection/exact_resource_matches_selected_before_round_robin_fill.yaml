id: exact_resource_matches_selected_before_round_robin_fill
description: Catalog selection selects exact resource-name matches before filling the remaining recall budget by round-robin.
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - {id: expanded_01, endpoint_name: list_expanded_01, resource_names: [compensation alpha report]}
      - {id: expanded_02, endpoint_name: list_expanded_02, resource_names: [compensation beta report]}
      - {id: expanded_03, endpoint_name: list_expanded_03, resource_names: [compensation gamma report]}
      - {id: expanded_04, endpoint_name: list_expanded_04, resource_names: [compensation delta report]}
      - {id: expanded_05, endpoint_name: list_expanded_05, resource_names: [compensation epsilon report]}
      - {id: expanded_06, endpoint_name: list_expanded_06, resource_names: [compensation zeta report]}
      - {id: expanded_07, endpoint_name: list_expanded_07, resource_names: [compensation eta report]}
      - {id: expanded_08, endpoint_name: list_expanded_08, resource_names: [compensation theta report]}
      - {id: expanded_09, endpoint_name: list_expanded_09, resource_names: [compensation iota report]}
      - {id: expanded_10, endpoint_name: list_expanded_10, resource_names: [compensation kappa report]}
      - {id: shift_compensation_read, endpoint_name: list_shift_compensation_list, resource_names: [shift compensation]}
  requested_facts:
    - id: fact_1
      description: which location had highest total payroll spend
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: payroll spend
          matching_resource_names:
            - compensation alpha
            - compensation beta
            - compensation gamma
            - compensation delta
            - compensation epsilon
            - compensation zeta
            - compensation eta
            - compensation theta
            - compensation iota
            - compensation kappa
            - shift compensation
  max_reads_per_fact: 10
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [shift_compensation_read]
        selected_read_membership:
          shift_compensation_read: true
