id: exact_resource_name_match_beats_raw_terms
description: Catalog selection uses exact resource-name match evidence without raw query-term crowdout.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_uses_exact_resource_name_matches_without_raw_term_crowdout
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: location_payroll_report_read
        endpoint_name: list_location_payroll_spend_report
        resource_names: [location payroll report]
        facts: [{ref: location.payroll.spend}]
      - id: shift_compensation_read
        endpoint_name: list_shift_compensation_list
        resource_names: [shift compensation]
  requested_facts:
    - id: fact_1
      description: which location had highest total payroll spend
      answer_outputs:
        - id: answer_1
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: payroll spend
          matching_resource_names: [shift compensation]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [shift_compensation_read]
