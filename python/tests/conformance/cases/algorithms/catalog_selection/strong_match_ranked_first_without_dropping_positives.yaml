id: strong_match_ranked_first_without_dropping_positives
description: Catalog selection ranks the strongest resource match first while retaining positive candidates.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_ranks_strong_matches_without_hiding_positive_candidates
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: payment_read
        endpoint_name: list_records
        resource_names: [payment card full number]
        facts: [{ref: payment.card.full_number}]
      - id: partial_payment_read
        endpoint_name: list_records
        resource_names: [payment card]
        facts: [{ref: payment.card}]
      - id: buyer_profile_read_0
        endpoint_name: list_records
        resource_names: [buyer profile]
        facts: [{ref: buyer.profile.0}]
      - id: buyer_profile_read_1
        endpoint_name: list_records
        resource_names: [buyer profile]
        facts: [{ref: buyer.profile.1}]
  requested_facts:
    - id: fact_1
      description: full card numbers used in buyer payments
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: full card numbers used in buyer payments
          matching_resource_names: [payment card full number, payment card, buyer profile]
  max_reads_per_fact: 24
expect:
  result_contains:
    selected_read_ids: [payment_read, partial_payment_read, buyer_profile_read_0, buyer_profile_read_1]
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [payment_read, partial_payment_read, buyer_profile_read_0, buyer_profile_read_1]
        unselected_positive_read_ids: []

