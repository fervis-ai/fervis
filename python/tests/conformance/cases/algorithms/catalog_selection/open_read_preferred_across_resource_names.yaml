id: open_read_preferred_across_resource_names
description: Catalog recall prefers an open read over required-input reads matched through earlier resource names.
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - id: detail_measure
        endpoint_name: get_measure_detail
        resource_names: [measure]
        params:
          - {ref: detail_measure.path.id, name: id, source: path, type: uuid, required: true}
      - id: detail_ledger
        endpoint_name: get_ledger_detail
        resource_names: [ledger]
        params:
          - {ref: detail_ledger.path.id, name: id, source: path, type: uuid, required: true}
      - id: detail_history
        endpoint_name: get_history_detail
        resource_names: [history]
        params:
          - {ref: detail_history.path.id, name: id, source: path, type: uuid, required: true}
      - {id: open_measure_rows, endpoint_name: list_measure_rows, resource_names: [measured rows]}
  requested_facts:
    - id: fact_1
      description: aggregate a measure over qualifying rows
      answer_outputs:
        - {id: answer_1, role: MEASURED_VALUE}
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: measured total
          matching_resource_names: [measure, ledger, history, measured rows]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [open_measure_rows, detail_measure, detail_ledger]
        unselected_positive_read_ids: [detail_history]
