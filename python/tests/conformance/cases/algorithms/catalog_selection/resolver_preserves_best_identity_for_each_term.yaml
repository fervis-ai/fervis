id: resolver_preserves_best_identity_for_each_term
description: Resolver catalog selection preserves the best identity resolver for each requested term under a cap.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_resolver_selection_preserves_best_identity_resolver_for_each_term
kind: algorithm
algorithm: catalog_selection.resolver_select
input:
  catalog:
    reads:
      - id: shade_store_availability
        endpoint_name: get_merch_shade_store_availability
        resource_names: [store]
        fields:
          - {ref: shade_store_availability.field.store_id, type: uuid, identity: {entity_ref: store, identity_field: store_id, primary_key: true, stable: true}}
          - {ref: shade_store_availability.field.location_id, type: uuid, identity: {entity_ref: location, identity_field: location_id, primary_key: true, stable: true}}
      - id: store_list
        endpoint_name: list_store_list
        resource_names: [store]
        fields:
          - {ref: store_list.field.store_id, type: uuid, identity: {entity_ref: store, identity_field: store_id, primary_key: true, stable: true}}
      - id: deal_location_limits
        endpoint_name: get_deal_location_limits
        resource_names: [deal location limit]
        fields:
          - {ref: deal_location_limits.field.deal_location_limit_id, type: uuid, identity: {entity_ref: deal_location_limit, identity_field: deal_location_limit_id, primary_key: true, stable: true}}
          - {ref: deal_location_limits.field.deal_id, type: uuid, identity: {entity_ref: deal, identity_field: deal_id, primary_key: true, stable: true}}
          - {ref: deal_location_limits.field.location_id, type: uuid, identity: {entity_ref: location, identity_field: location_id, primary_key: true, stable: true}}
      - id: location_list
        endpoint_name: list_location_list
        resource_names: [location]
        fields:
          - {ref: location_list.field.location_id, type: uuid, identity: {entity_ref: location, identity_field: location_id, primary_key: true, stable: true}}
      - id: location_deal_limits
        endpoint_name: get_location_deal_limits
        resource_names: [deal location limit]
        fields:
          - {ref: location_deal_limits.field.deal_location_limit_id, type: uuid, identity: {entity_ref: deal_location_limit, identity_field: deal_location_limit_id, primary_key: true, stable: true}}
          - {ref: location_deal_limits.field.deal_id, type: uuid, identity: {entity_ref: deal, identity_field: deal_id, primary_key: true, stable: true}}
          - {ref: location_deal_limits.field.location_id, type: uuid, identity: {entity_ref: location, identity_field: location_id, primary_key: true, stable: true}}
  entity_targets:
    - target_id: entity_1
      catalog_search_terms: [store, location]
  max_reads_per_target: 3
expect:
  result_contains:
    selected_read_membership:
      location_list: true

