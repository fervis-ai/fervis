id: positive_candidates_kept_until_configured_budget
description: Catalog selection keeps positive candidates until the configured per-fact read budget.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_keeps_positive_candidates_until_configured_budget
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - {id: read_alpha_beta_gamma, endpoint_name: list_alpha_beta_gamma_records, resource_names: [alpha beta gamma]}
      - {id: read_delta, endpoint_name: list_delta_records, resource_names: [delta]}
      - {id: read_epsilon, endpoint_name: list_epsilon_records, resource_names: [epsilon]}
      - {id: read_zeta, endpoint_name: list_zeta_records, resource_names: [zeta]}
  requested_facts:
    - id: fact_1
      description: alpha beta gamma delta epsilon zeta
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: alpha beta gamma delta epsilon zeta
          matching_resource_names: [alpha beta gamma, delta, epsilon, zeta]
  max_reads_per_fact: 4
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [read_alpha_beta_gamma, read_delta, read_epsilon, read_zeta]

