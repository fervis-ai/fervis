id: at_least_three_positive_candidates_kept
description: Catalog selection keeps at least three positive candidates even when the configured budget is one.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_keeps_at_least_three_positive_candidates_per_fact
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - {id: sales_read, endpoint_name: list_sales, resource_names: [sale]}
      - {id: payments_read, endpoint_name: list_payments, resource_names: [payment]}
      - {id: staff_read, endpoint_name: list_staff, resource_names: [staff]}
      - {id: inventory_read, endpoint_name: list_inventory, resource_names: [inventory]}
  requested_facts:
    - id: fact_1
      description: sales payments staff inventory
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: sales payments staff inventory
          matching_resource_names: [inventory, payment, sale, staff]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [inventory_read, payments_read, sales_read]

