id: resource_recall_budget_preserved_per_source_text
description: Catalog selection preserves recall for separate source-text resource groups under a small budget.
migrates:
  - api/tests/fervis/lookup/catalog_selection/test_selector.py::test_catalog_selection_preserves_per_source_text_resource_name_recall_budget
kind: algorithm
algorithm: catalog_selection.select
input:
  catalog:
    reads:
      - {id: payout_read_1, endpoint_name: list_staff_payouts, resource_names: [staff payout, payment item]}
      - {id: payout_read_2, endpoint_name: list_payouts, resource_names: [staff payout, payment item]}
      - {id: payout_read_3, endpoint_name: list_payment_items, resource_names: [staff payout, payment item]}
      - {id: shift_compensation_read, endpoint_name: list_shift_compensations, resource_names: [shift compensation, staff earning]}
  requested_facts:
    - id: fact_1
      description: which staff has been paid the most this month
      answer_outputs:
        - id: answer_1
          role: ANSWER_VALUE
  resource_name_matches:
    - requested_fact_id: fact_1
      answer_output_resource_lineage:
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: paid
          matching_resource_names: [staff payout, payment item]
        - answer_output_id: answer_1
          support_role: MEASURED_VALUE
          source_text: earned
          matching_resource_names: [shift compensation, staff earning]
  max_reads_per_fact: 1
expect:
  result_contains:
    requested_fact_selections:
      - requested_fact_id: fact_1
        selected_read_ids: [payout_read_1, shift_compensation_read, payout_read_2]

