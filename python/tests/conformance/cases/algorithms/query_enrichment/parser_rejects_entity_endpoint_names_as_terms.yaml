id: parser_rejects_entity_endpoint_names_as_terms
description: Entity catalog search terms must not contain endpoint names.
migrates:
  - api/tests/fervis/lookup/query_enrichment/test_query_enrichment.py::test_query_enrichment_parser_rejects_entity_endpoint_names_as_terms
kind: algorithm
algorithm: query_enrichment.parse
input:
  request_fixture: booked_money
  request:
    requested_facts:
      - id: fact_1
        description: booked money total
        answer_outputs: [{id: answer_1}]
        known_inputs:
          - id: entity_1
            kind: named_reference_text
            source: question_context
            text: Jane Doe
            lookup_text: Jane Doe
            description: staff member named Jane Doe
  payload:
    requested_fact_resource_name_matches:
      - requested_fact_id: fact_1
        answer_output_resource_lineage: []
    entity_target_catalog_search_terms:
      - target_id: entity_1
        catalog_search_terms:
          - {basis: "list_staff_list can identify Jane Doe because target_meaning is staff member.", term: list_staff_list}
expect:
  error_contains: catalog_search_terms must not contain endpoint names
