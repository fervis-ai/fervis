id: parser_accepts_answer_output_resource_lineage
description: Query-enrichment parser accepts answer-output resource lineage rows.
migrates:
  - api/tests/fervis/lookup/query_enrichment/test_query_enrichment.py::test_query_enrichment_parser_accepts_answer_output_resource_lineage
kind: algorithm
algorithm: query_enrichment.parse
input:
  request_fixture: booked_money
  payload:
    requested_fact_resource_name_matches:
      - requested_fact_id: fact_1
        answer_output_resource_lineage:
          - answer_output_id: answer_1
            support_role: MEASURED_VALUE
            source_text: booked money
            matching_resource_names: [sale, staff]
          - answer_output_id: answer_1
            support_role: GROUP_KEY
            source_text: seller
            matching_resource_names: [staff]
    entity_target_catalog_search_terms: []
expect:
  result_contains:
    requested_fact_resource_name_matches:
      - requested_fact_id: fact_1
        answer_output_resource_lineage:
          - answer_output_id: answer_1
            support_role: MEASURED_VALUE
            source_text: booked money
            matching_resource_names: [sale, staff]
          - matching_resource_names: [staff]
