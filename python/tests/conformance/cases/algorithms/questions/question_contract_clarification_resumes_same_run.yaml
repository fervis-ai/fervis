id: question_contract_clarification_resumes_same_run
description: A question-contract response is attributed only to its declared model turn while the original question and run remain unchanged.
kind: algorithm
algorithm: questions.lifecycle
input:
  scenario: clarification_resume
  tenant_id: tenant_1
  principal_id: user_1
  question: Show me the performance for this quarter.
  clarification:
    id: clarify_question_contract_1
    need: answer_metric
    reason: missing_answer_metric
    owner: question_contract
    continuation:
      kind: question_contract
      missingItemId: clarify_question_contract_1
      expectedValueKind: answer_definition
