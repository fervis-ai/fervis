id: question_run_ask_idempotent_returns_existing_without_memory_read
description: Idempotent retry returns the existing run without reading mutable conversation memory again.
kind: algorithm
algorithm: questions.lifecycle
input:
  scenario: ask
  execution_mode: inline
  tenant_id: tenant_1
  principal_id: user_1
  conversation_id: conversation_existing
  question: "How many orders came in today?"
  idempotency_key: same-key
  repeat_count: 2
  fail_memory_after_calls: 1
  model:
    provider: anthropic
    model_key: HAIKU
  lookup_result:
    status: COMPLETED
    answer: "42"
    result_data:
      value: 42
expect:
  result_contains:
    ask_result:
      status: COMPLETED
      answer: "42"
    repeated_ask_result:
      status: COMPLETED
      answer: "42"
    lineage:
      question_count: 1
      run_count: 1
      memory_call_count: 1
    queue:
      enqueued_count: 1
      terminal_count: 1
    lookup:
      call_count: 1
