id: question_run_ask_inline_idempotent_replays_answer
description: Idempotent inline retry returns the same terminal answer without duplicate lineage.
kind: algorithm
algorithm: questions.lifecycle
input:
  scenario: ask
  execution_mode: inline
  tenant_id: tenant_1
  principal_id: user_1
  conversation_id: conversation_existing
  question: "How many orders came in today?"
  idempotency_key: same-key
  repeat_count: 2
  model:
    provider: anthropic
    model_key: HAIKU
  lookup_result:
    status: COMPLETED
    answer: "42"
    result_data:
      value: 42
expect:
  result_contains:
    ask_result:
      status: COMPLETED
      answer: "42"
      result_data:
        value: 42
    repeated_ask_result:
      status: COMPLETED
      answer: "42"
      result_data:
        value: 42
    lineage:
      question_count: 1
      run_count: 1
      failed_runtime_fallback_count: 0
    queue:
      enqueued_count: 1
      terminal_count: 1
    lookup:
      call_count: 1
