id: rerun_uses_current_authority
kind: algorithm
algorithm: questions.lifecycle
description: A queued deterministic rerun rechecks question access under current authority before invoking its program.
input:
  schema_revision: 1
  operation: rerun
  state:
    question_count: 1
    run_count: 1
    questions:
      - question_id: question_1
        conversation_id: conversation_1
        original_question: How many sales did we make today?
        principal: &principal {principal_id: user_1, tenant_id: tenant_1}
    program_invocations:
      - run_id: run_base
        kind: compiled_question
        program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/invocation}
        bindings:
          - parameter_id: question.store_ids
            value: {kind: identity_set, entity_kind: store, key_id: primary_key, key_component_id: store_id, values: [store_1]}
            provenance: {kind: question_input}
          - parameter_id: semantic.sale_states
            value: {kind: string_set, values: [COMPLETED]}
            provenance: {kind: semantic_choice}
    program_result: {status: COMPLETED, answer: '1'}
  command:
    question_id: question_1
    base_run_id: run_base
    principal: *principal
  after_enqueue: {revoke_question: true, process: true}
expect:
  result_contains:
    result: {status: QUEUED}
    execution_result:
      status: FAILED
      error: deterministic run question is not authorized
    program_call_count: 0
    model_call_count: 0
    base_run_unchanged: true
