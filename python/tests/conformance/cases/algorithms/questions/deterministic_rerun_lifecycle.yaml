id: deterministic_rerun_lifecycle
kind: algorithm
algorithm: questions.lifecycle
description: A typed patch creates and executes one deterministic child run under the answered base question.
input:
  schema_revision: 1
  operation: rerun
  state:
    question_count: 1
    run_count: 1
    questions:
      - question_id: question_1
        conversation_id: conversation_1
        original_question: How many sales did we make today?
        principal: &principal {principal_id: user_1, tenant_id: tenant_1}
    program_invocations:
      - run_id: run_base
        program_id: ap_9e378ea04b6f0327b21dd9de0a49d1373d065783b427769ad24195afbf0f17b2
        program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/invocation}
        bindings: &bindings
          - parameter_id: question.store_ids
            value: {kind: identity_set, identity_type: store, identity_field: store_id, values: [store_1]}
            provenance: {kind: question_input}
          - parameter_id: semantic.sale_states
            value: {kind: string_set, values: [COMPLETED]}
            provenance: {kind: semantic_choice}
    program_result:
      status: COMPLETED
      answer: '2'
      result_data: {count: 2}
      terminal_lineage_recorded: true
  command:
    question_id: question_1
    base_run_id: run_base
    principal: *principal
    idempotency_key: rerun_sales_states
    patch:
      operations:
        - kind: set
          parameter_id: semantic.sale_states
          value: {kind: string_set, values: [COMPLETED, PLACED]}
  after_enqueue: {process: true, worker_id: worker_1, active_attempt: 1}
expect:
  result_contains:
    result:
      status: QUEUED
      conversation_id: conversation_1
      question_id: question_1
      run_id: run_1
    execution_result:
      status: COMPLETED
      answer: '2'
      result_data: {count: 2}
    question_count: 1
    run_count: 2
    run:
      kind: deterministic
      lineage_kind: deterministic
      trigger_kind: rerun
      base_run_id: run_base
      patch_id_present: true
      binding_ids: [question.store_ids, semantic.sale_states]
    memory_call_count: 0
    model_call_count: 0
    program_call_count: 1
    base_run_unchanged: true
