id: population_choice_requires_string_set_parameter
kind: algorithm
algorithm: answer_program.compile
description: A population-choice sink rejects a scalar parameter instead of iterating its characters as selected values.
input:
  schema_revision: 1
  program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/population_scalar_invalid}
  question_contract: {$ref: ../../../fixtures/answer_program_v1.yaml#/question_contracts/sales_for_store}
  catalog: {$ref: ../../../fixtures/answer_program_v1.yaml#/catalogs/sales}
  bindings:
    - parameter_id: question.store_ids
      value:
        kind: identity_set
        entity_kind: store
        key_id: primary_key
        key_component_id: store_id
        values: [store_1, store_2]
      provenance: {kind: question_input}
    - parameter_id: semantic.store_population
      value: {kind: string, value: store_1}
      provenance: {kind: semantic_choice}
expect:
  result_contains:
    status: rejected
    code: invalid_population_choice_parameter
    reads: 0
    reusable: false
