id: joined_query_param_constraint_reaches_result
description: Applying a resolved input through a request parameter has the same joined-result coverage as an exact returned-field filter.
kind: algorithm
algorithm: answer_program.population_coverage
input:
  question_contract: {$ref: ../../../fixtures/population_constraint_coverage.yaml#/question_contracts/sales_in_nairobi}
  inputs: [{id: nairobi, value: Nairobi, entity_kind: area, key_component_id: area_id, canonical_value: area-nairobi}]
  relations:
    - id: sales
      fields: [sale_id, sale_location_id, amount]
      identity_fields: [sale_id]
      entity_references:
        - id: sale_location
          target_entity_kind: locations
          components: [{target_component_id: location_id, local_field_id: sale_location_id}]
    - id: locations
      fields: [location_id, area_id]
      identity_fields: [location_id]
      param_inputs: [{input_id: nairobi, param_id: area_id}]
      coverage_claims: [{membership_test_id: in_nairobi, role: row_population, proof_ref: source_param:area_id}]
  operations:
    - id: join_sales_locations
      output_relation: joined
      spec:
        kind: join
        left: sales
        right: locations
        join_keys: [{left: sale_location_id, right: location_id}]
  result: {relation_id: joined, field_id: amount}
expect:
  result_contains: {status: accepted}
