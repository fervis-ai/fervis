id: source_claim_requires_mechanical_proof
description: A source cannot certify population coverage with proof absent from its selected mechanics.
kind: algorithm
algorithm: answer_program.population_coverage
input:
  question_contract: {$ref: ../../../fixtures/population_constraint_coverage.yaml#/question_contracts/stores_in_nairobi}
  inputs: [{id: nairobi, value: Nairobi, entity_kind: area, key_component_id: area_id, canonical_value: area-nairobi}]
  relations:
    - id: stores
      fields: [store_id]
      identity_fields: [store_id]
      source_proof_refs: [known_input:nairobi, invented:nairobi]
      coverage_claims:
        - membership_test_id: in_nairobi
          role: row_population
          proof_ref: invented:nairobi
  operations:
    - id: project_store
      output_relation: projected
      spec:
        kind: project
        input_relation: stores
        fields: [{source: store_id, output: store_id}]
  result: {relation_id: projected, field_id: store_id}
expect:
  result_contains: {status: rejected}
