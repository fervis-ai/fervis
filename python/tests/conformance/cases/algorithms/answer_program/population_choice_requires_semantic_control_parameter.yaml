id: population_choice_requires_semantic_control_parameter
kind: algorithm
algorithm: answer_program.compile
description: A parameter that changes a fact population must be declared as a semantic control.
input:
  schema_revision: 1
  program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/population_plan_control_invalid}
  question_contract: {$ref: ../../../fixtures/answer_program_v1.yaml#/question_contracts/sales_for_store}
  catalog: {$ref: ../../../fixtures/answer_program_v1.yaml#/catalogs/sales}
  bindings:
    - parameter_id: question.store_ids
      value:
        kind: identity_set
        entity_kind: store
        key_id: primary_key
        key_component_id: store_id
        values: [store_1, store_2]
      provenance: {kind: question_input}
    - parameter_id: semantic.store_population
      value: {kind: string_set, values: [store_1]}
      provenance: {kind: plan_choice}
expect:
  result_contains:
    status: rejected
    code: invalid_population_choice_parameter
    reads: 0
    reusable: false
