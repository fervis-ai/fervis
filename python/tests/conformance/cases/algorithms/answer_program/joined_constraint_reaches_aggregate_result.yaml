id: joined_constraint_reaches_aggregate_result
description: A resolved input applied to one side of a declared inner join constrains the projected aggregate result.
kind: algorithm
algorithm: answer_program.population_coverage
input:
  question_contract: {$ref: ../../../fixtures/population_constraint_coverage.yaml#/question_contracts/sales_in_nairobi}
  inputs: [{id: nairobi, value: Nairobi, entity_kind: area, key_component_id: area_id, canonical_value: area-nairobi}]
  relations:
    - id: sales
      fields: [sale_id, sale_location_id, amount]
      identity_fields: [sale_id]
      entity_references:
        - id: location_reference
          target_entity_kind: locations
          target_key_id: primary_key
          components: [{target_component_id: location_id, local_field_id: sale_location_id}]
    - id: locations
      fields: [location_id, area_id]
      identity_fields: [location_id]
      applied_inputs: [{input_id: nairobi, field_id: area_id}]
      coverage_claims: [{membership_test_id: in_nairobi, role: row_population, proof_ref: returned_filter:locations.area_id}]
  operations:
    - id: join_sales_locations
      output_relation: joined
      spec:
        kind: join
        left: sales
        right: locations
        join_keys: [{left: sale_location_id, right: location_id}]
    - id: project_amount
      output_relation: projected
      spec:
        kind: project
        input_relation: joined
        fields: [{source: amount, output: amount}]
    - id: total_sales
      output_relation: totals
      spec:
        kind: aggregate
        input_relation: projected
        aggregations: [{function: sum, input_field: amount, output_field: total}]
  result: {relation_id: totals, field_id: total}
expect:
  result_contains: {status: accepted}
