id: join_without_required_constraint_fails_closed
description: Joining a relevant dimension does not discharge a required input that was applied nowhere.
kind: algorithm
algorithm: answer_program.population_coverage
input:
  question_contract: {$ref: ../../../fixtures/population_constraint_coverage.yaml#/question_contracts/sales_in_nairobi}
  inputs: [{id: nairobi, value: Nairobi, entity_kind: area, key_component_id: area_id, canonical_value: area-nairobi}]
  relations:
    - id: sales
      fields: [sale_id, sale_location_id, amount]
      identity_fields: [sale_id]
    - id: locations
      fields: [location_id, area_id]
      identity_fields: [location_id]
  operations:
    - id: join_sales_locations
      output_relation: joined
      spec:
        kind: join
        left: sales
        right: locations
        join_keys: [{left: sale_location_id, right: location_id}]
  result: {relation_id: joined, field_id: amount}
expect:
  result_contains: {status: rejected}
