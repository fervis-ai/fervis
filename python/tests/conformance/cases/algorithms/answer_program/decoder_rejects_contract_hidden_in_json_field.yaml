        result_projection: null
        compatibility:
          $type: ProgramCompatibility
          fields:
            schema_revision: 6
            compiler_version: ""
            function_semantics: {$tuple: []}
            source_contracts: {$tuple: []}
expect:
  result_equals:
    status: rejected
    code: invalid_answer_program
