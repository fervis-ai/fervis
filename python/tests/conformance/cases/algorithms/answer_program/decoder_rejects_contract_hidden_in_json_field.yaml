        parameters: {$tuple: []}
        capabilities: {$tuple: []}
        relations: {$tuple: []}
        operations:
          $tuple:
            - $type: Operation
              fields:
                id: order_1
                spec:
                  $type: OrderSpec
                  fields:
                    input_relation: r
                    order_by: {$tuple: []}
                    selection:
                      $type: Take
                      fields:
                        limit:
                          $type: ConstantRef
                          fields:
                            constant_id: time_1
                            version_ref: "1"
                            value:
                              $type: FactValue
                              fields:
                                id: time_1
                                payload:
                                  $type: TimeValuePayload
                                  fields:
                                    expression: today
                                    intent:
