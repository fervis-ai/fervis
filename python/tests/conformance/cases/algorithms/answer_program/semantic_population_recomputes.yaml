id: semantic_population_recomputes
kind: algorithm
algorithm: answer_program.invoke
description: Changing a typed predicate binding recomputes FilterSpec and the answer without changing the program.
input:
  schema_revision: 1
  program: {$ref: ../../../fixtures/answer_program_v1.yaml#/programs/population_required}
  catalog: {$ref: ../../../fixtures/answer_program_v1.yaml#/catalogs/sales}
  environment: {$ref: ../../../fixtures/answer_program_v1.yaml#/environments/population_required}
  invocations:
    - id: base
      bindings:
        - &stores
          parameter_id: question.store_ids
          value:
            kind: identity_set
            entity_kind: store
            key_id: primary_key
            key_component_id: store_id
            values: [store_1, store_2]
          provenance: {kind: question_input}
        - parameter_id: semantic.store_population
          value: {kind: string_set, values: [store_1]}
          provenance: {kind: semantic_choice, refs: [semantic:store_population]}
      evidence: &evidence
        - request:
            endpoint_name: list_sale_list
            args: {sales.query.store_id: store_1}
          response:
            body:
              results:
                - {sale_id: sale_1, store_id: store_1}
        - request:
            endpoint_name: list_sale_list
            args: {sales.query.store_id: store_2}
          response:
            body:
              results:
                - {sale_id: sale_2, store_id: store_2}
    - id: revised
      bindings:
        - *stores
        - parameter_id: semantic.store_population
          value: {kind: string_set, values: [store_1, store_2]}
          provenance: {kind: semantic_choice, refs: [semantic:store_population]}
      evidence: *evidence
expect:
  result_contains:
    same_program_id: true
    invocations:
      - id: base
        status: completed
        relations:
          - id: sales_rows__source
          - id: sales_rows
            rows:
              - {sale_id: sale_1, store_id: store_1}
          - id: answer_rows
            rows:
              - {store_id: store_1}
        requests:
          - {endpoint_name: list_sale_list, args: {sales.query.store_id: store_1}}
          - {endpoint_name: list_sale_list, args: {sales.query.store_id: store_2}}
      - id: revised
        status: completed
        relations:
          - id: sales_rows__source
          - id: sales_rows
            rows:
              - {sale_id: sale_1, store_id: store_1}
              - {sale_id: sale_2, store_id: store_2}
          - id: answer_rows
            rows:
              - {store_id: store_1}
              - {store_id: store_2}
        requests:
          - {endpoint_name: list_sale_list, args: {sales.query.store_id: store_1}}
          - {endpoint_name: list_sale_list, args: {sales.query.store_id: store_2}}
