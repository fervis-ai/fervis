id: paginated_projection_anchors_fields_under_data_envelope
description: Paginated response fields are anchored under the data envelope.
migrates:
  - api/tests/fervis/host_api/test_relation_catalog_projection.py::test_paginated_projection_anchors_row_paths_under_response_envelope
kind: adapter
adapter: host_api.endpoint_contract_projection
input:
  contracts:
    - endpoint_name: list_records
      url_name: records
      method: GET
      path_template: /records/
      view_class: tests.RecordListView
      resource_names: [record]
      pagination:
        kind: offset
        position_query_param: after
        page_size_query_param: batch
        results_path: data
        page_size: 25
        max_page_size: 100
        continuation_path: pagination.has_more
      candidate_keys:
        - key_id: primary_key
          entity_kind: record
          primary: true
          components:
            - component_id: id
              field_path: id
      response_fields:
        - name: id
          type: uuid
          path: id
        - name: items
          type: array
          path: items
        - name: item_name
          type: string
          path: items.name
expect:
  result_contains:
    reads:
      list_records:
        row_paths:
          - id: data
            path: data
            cardinality: many
          - id: data_items
            path: data.items
            cardinality: many
          - id: root
            path: ""
            cardinality: one
        fields:
          data.id:
            row_path_id: data
          data.items.name:
            row_path_id: data_items
        candidate_keys:
          - key_id: primary_key
            entity_kind: record
            primary: true
            components:
              - component_id: id
                field_ref: field.data.id
