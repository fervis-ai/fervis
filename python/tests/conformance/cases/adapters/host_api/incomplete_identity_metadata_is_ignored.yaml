id: incomplete_identity_metadata_is_ignored
description: Projection ignores incomplete framework identity metadata.
migrates:
  - api/tests/fervis/host_api/test_relation_catalog_projection.py::test_projection_copies_only_complete_framework_identity_metadata
kind: adapter
adapter: host_api.endpoint_contract_projection
input:
  contracts:
    - endpoint_name: list_records
      url_name: records
      method: GET
      path_template: /records/
      view_class: tests.RecordView
      resource_names: [record]
      response_fields:
        - name: id
          type: uuid
          path: data.id
          identity:
            displayFields: [data.name]
expect:
  result_contains:
    reads:
      list_records:
        fields:
          data.id:
            identity: null
