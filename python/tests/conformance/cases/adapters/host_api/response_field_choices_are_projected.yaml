id: response_field_choices_are_projected
description: Response field choices survive endpoint-contract projection.
migrates:
  - api/tests/fervis/host_api/test_relation_catalog_projection.py::test_endpoint_contracts_project_to_framework_neutral_relation_catalog
kind: adapter
adapter: host_api.endpoint_contract_projection
input:
  contracts:
    - endpoint_name: list_records
      url_name: records
      method: GET
      path_template: /records/
      view_class: tests.RecordView
      resource_names: [record]
      paginated: true
      response_fields:
        - name: data
          type: array
          path: data
        - name: state
          type: choice
          path: data.state
          choices: [open, closed]
expect:
  result_contains:
    reads:
      list_records:
        fields:
          data.state:
            choices: [open, closed]
