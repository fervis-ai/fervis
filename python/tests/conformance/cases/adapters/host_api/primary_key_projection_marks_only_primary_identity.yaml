id: primary_key_projection_marks_only_primary_identity
description: Primary-key field metadata marks only the primary identity field.
migrates:
  - api/tests/fervis/host_api/test_relation_catalog_projection.py::test_endpoint_contracts_project_to_framework_neutral_relation_catalog
kind: adapter
adapter: host_api.endpoint_contract_projection
input:
  contracts:
    - endpoint_name: list_records
      url_name: records
      method: GET
      path_template: /records/
      view_class: tests.RecordView
      resource_names: [record]
      paginated: true
      primary_key_fields: [data.id]
      response_fields:
        - name: data
          type: array
          path: data
        - name: id
          type: uuid
          path: data.id
        - name: owner_id
          type: uuid
          path: data.owner_id
expect:
  result_contains:
    reads:
      list_records:
        fields:
          data.id:
            identity:
              primary_key: true
          data.owner_id:
            identity: null
