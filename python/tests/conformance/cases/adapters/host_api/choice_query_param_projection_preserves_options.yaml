id: choice_query_param_projection_preserves_options
description: Endpoint contract projection preserves query-param choice values and labels.
migrates:
  - api/tests/fervis/host_api/test_relation_catalog_projection.py::test_endpoint_contracts_project_to_framework_neutral_relation_catalog
kind: adapter
adapter: host_api.endpoint_contract_projection
input:
  contracts:
    - endpoint_name: list_records
      url_name: records
      method: GET
      path_template: /records/
      view_class: tests.RecordView
      resource_names: [record, activity record]
      paginated: true
      primary_key_fields: [data.id]
      query_params:
        - name: status
          type: choice
          choices: [active, inactive]
          choice_labels:
            active: Active records
            inactive: Inactive records
      response_fields:
        - name: data
          type: array
          path: data
expect:
  result_contains:
    reads:
      list_records:
        params:
          status:
            choices: [active, inactive]
            choice_labels:
              active: Active records
              inactive: Inactive records
