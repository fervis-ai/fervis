question_contracts:
  sales_in_nairobi:
    requested_facts:
      - id: fact_1
        description: total sales in Nairobi
        answer_subject: {subject_text: sales}
        answer_expression: {family: scalar_aggregate}
        answer_outputs:
          - {id: answer_1, description: total sales, role: MEASURED_VALUE}
        known_inputs:
          - id: nairobi
            kind: literal_text
            role: reference_value
            text: Nairobi
            resolved_value_text: Nairobi
            value_meaning_hint: area
        input_refs: [nairobi]
        answer_population:
          population_label: sales in Nairobi
          counted_unit: sale
          membership_tests:
            - id: sale_subject
              kind: SUBJECT_IDENTITY
              polarity: MUST_PASS
              test_question: Does this row represent a sale?
            - id: in_nairobi
              kind: EXPLICIT_USER_CONSTRAINT
              polarity: MUST_PASS
              test_question: Did this sale occur in Nairobi?
              owned_question_input_refs: [nairobi]

